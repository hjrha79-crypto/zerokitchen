в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'order') loadOrderList();
  if (name === 'new')   loadNewItems();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   нҶ мҠӨнҠё
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   мқҢм„ұ мһ…л Ҙ (Web Speech API)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let recognition = null;
let isRecording = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'ko-KR';
  r.continuous = false;
  r.interimResults = false;

  r.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('textInput').value = transcript;
    stopMic();
    handleSend();
  };
  r.onerror = () => { stopMic(); showToast('мқҢм„ұ мқёмӢқ мӢӨнҢЁ. м§Ғм ‘ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); };
  r.onend   = () => { stopMic(); };
  return r;
}

function toggleMic() {
  if (isRecording) { stopMic(); return; }
  recognition = initSpeech();
  if (!recognition) { showToast('мқҙ лёҢлқјмҡ°м ҖлҠ” мқҢм„ұ мқёмӢқмқ„ м§Җмӣҗн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.'); return; }
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micStatus').textContent = 'л“ЈлҠ” мӨ‘...';
  document.getElementById('micStatus').classList.add('recording');
  recognition.start();
}

function stopMic() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = 'нғӯн•ҳл©ҙ мқҢм„ұ мһ…л Ҙ';
  document.getElementById('micStatus').classList.remove('recording');
  if (recognition) { try { recognition.stop(); } catch(_) {} }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   м „мІҳлҰ¬ & нҢҢм„ң (Apps Scriptм—җм„ң мқҙмӢқ)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const QTY_TINY        = 0.1;
const QTY_ALMOST_NONE = 0.2;

function preprocessInput(t) {
  let s = String(t || '');
  s = s.replace(/[.,В·вҖў:;!?'"()\[\]{}<>\\/|@#%^&*_+=~`]/g, ' ');
  s = s.replace(/\s+/g, ' ').trim();
  s = s.replace(/(н•ҳлӮҳ|н•ң|л‘ҳ|л‘җ|м…Ӣ|м„ё|л„·|л„Ө|лӮҙ|лӢӨм„Ҝ|м—¬м„Ҝ|мқјкіұ|м—¬лҚҹ|м•„нҷү|м—ҙ)(к°ң|кІҢ)(мҡ”|лҘј|мқ„|к°Җ|мқҙ|л§Ң|лһ‘|н•ҳкі |лҸ„)?/g, '$1 $2');
  s = s.replace(/\bл°ҳ\s*(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '0.5$1');
  s = s.replace(/([к°Җ-нһЈA-Za-z])\s*л°ҳ\s*(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '$1 0.5$2');
  s = s.replace(/([к°Җ-нһЈA-Za-z])л°ҳ(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '$1 0.5$2');
  s = s.replace(/мӮјл¶„мқҳмқј\s*(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '0.333$1');
  s = s.replace(/мӮ¬л¶„мқҳмқј\s*(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '0.25$1');
  s = s.replace(/мҳӨл¶„мқҳмқј\s*(лҙүм§Җ|лҙү|л°•мҠӨ|нҢ©|мә”|лі‘|к°ң|kg|g|нҶө)\b/g, '0.2$1');
  s = s.replace(/\bм•„мЈјм•Ҫк°„\b/g, String(QTY_TINY));
  s = s.replace(/\bкұ°мқҳм—ҶмқҢ\b/g, String(QTY_ALMOST_NONE));
  s = s.replace(/\bм—ҶмқҢ\b/g, '0');
  return s;
}

function parseEntries(text) {
  let s = String(text || '').replace(/\s+/g, '');
  const numMap = {
    'н•ң':1,'н•ҳлӮҳ':1,'л‘җ':2,'л‘ҳ':2,'м„ё':3,'м…Ӣ':3,'л„Ө':4,'л„·':4,'лӮҙ':4,
    'лӢӨм„Ҝ':5,'м—¬м„Ҝ':6,'мқјкіұ':7,'м—¬лҚҹ':8,'м•„нҷү':9,'м—ҙ':10,
    'м—ҙн•ң':11,'м—ҙл‘җ':12,'м—ҙм„ё':13,'м—ҙл„Ө':14,'м—ҙлӢӨм„Ҝ':15,'мҠӨл¬ҙ':20,'мҠӨл¬ј':20
  };
  const unitRe  = '(?:kg|g|лҙүм§Җ|лҙү|к°ң|нҢ©|нҶө|л°•мҠӨ|лі‘|мә”|к¶Ң)';
  const kwordRe = '(?:м—ҙн•ң|м—ҙл‘җ|м—ҙм„ё|м—ҙл„Ө|м—ҙлӢӨм„Ҝ|мҠӨл¬ҙ|мҠӨл¬ј|н•ҳлӮҳ|л‘ҳ|м…Ӣ|л„·|лӢӨм„Ҝ|м—¬м„Ҝ|мқјкіұ|м—¬лҚҹ|м•„нҷү|м—ҙ|н•ң|л‘җ|м„ё|л„Ө|лӮҙ)';
  const qtyRe   = '(?:\\d+(?:\\.\\d+)?|' + kwordRe + ')';
  const cmdRe   = '(?:л°ңмЈј|мЈјл¬ё|кө¬л§Ө|мӢңмјңмӨҳ|мһ…кі |мһ…кө¬|мһ…кі мҳӨ|мһ…кі мҡ”|мһ…кі лЎң|кө¬л§Өмҷ„лЈҢ|мӮ¬мҡ©|м¶ңкі )';
  const addRe   = '(?:м¶”к°ҖлЎң|м¶”к°Җ|лҚ”н•ҙ|лҚ”|н•ңлІҲлҚ”)';
  // мҲҳм • нҢЁн„ҙ: "лёҢлЎңмҪңлҰ¬ л‘җ лҙүм§ҖлЎң мҲҳм •" / "лёҢлЎңмҪңлҰ¬ л‘җ лҙүм§Җ мҲҳм •"
  const fixRe   = '(?:лЎңмҲҳм •|мҲҳм •|мңјлЎңмҲҳм •|лЎңл°”кҝ”|лЎңліҖкІҪ)';
  const cmdAlias = {
    'л°ңмЈј':'л°ңмЈј','мЈјл¬ё':'л°ңмЈј','кө¬л§Ө':'л°ңмЈј','мӢңмјңмӨҳ':'л°ңмЈј',
    'мһ…кі ':'мһ…кі ','мһ…кө¬':'мһ…кі ','мһ…кі мҳӨ':'мһ…кі ','мһ…кі мҡ”':'мһ…кі ','мһ…кі лЎң':'мһ…кі ','кө¬л§Өмҷ„лЈҢ':'мһ…кі ',
    'мӮ¬мҡ©':'мӮ¬мҡ©','м¶ңкі ':'мӮ¬мҡ©'
  };
  const reNorm = new RegExp('^([к°Җ-нһЈA-Za-z]+?)(' + qtyRe + ')(' + unitRe + ')?(' + fixRe + '|' + cmdRe + ')?(' + addRe + ')?');
  const results = [];
  let iter = 0;
  while (s.length > 0) {
    if (++iter > 400) break;
    const addMatch = s.match(new RegExp('^' + addRe));
    if (addMatch) { s = s.slice(addMatch[0].length); continue; }
    const mm = s.match(reNorm);
    if (mm) {
      const item   = mm[1];
      const qtyRaw = mm[2];
      const unit   = mm[3] || 'к°ң';
      const cmdRaw = mm[4] || '';  // fixRe | cmdRe
      const addRaw = mm[5] || '';  // addRe (м¶”к°Җ/м¶”к°ҖлЎң/лҚ” л“ұ)
      // мҲҳм • нӮӨмӣҢл“ң к°җм§Җ (mm[4]м—җ мһЎнһҳ)
      const isFix = /мҲҳм •|л°”кҝ”|ліҖкІҪ/.test(cmdRaw);
      // м¶”к°Җ нӮӨмӣҢл“ң к°җм§Җ (mm[5]м—җ мһЎнһҳ)
      const isAdd = /м¶”к°Җ|лҚ”н•ҙ|лҚ”|н•ңлІҲлҚ”/.test(addRaw);
      const cmd    = isFix ? 'мһ¬кі ' : (cmdAlias[cmdRaw] || 'мһ¬кі ');
      const mode   = isFix ? 'FIX' : isAdd ? 'ADD' : 'SET';
      let qty = /^\d+(\.\d+)?$/.test(qtyRaw) ? Number(qtyRaw) : (numMap[qtyRaw] || 0);
      if (!item || (qty === 0 && qtyRaw !== '0')) { s = s.slice(mm[0].length || 1); continue; }
      results.push({ item, qty, unit, cmd, mode });
      s = s.slice(mm[0].length);
      continue;
    }
    s = s.slice(1);
  }
  return results;
}


// к°ҷмқҖ л°ңнҷ” лӮҙ лҸҷмқј н’ҲлӘ© н•©мӮ°
// - SET лӘЁл“ң: к°ҷмқҖ н’ҲлӘ© м—¬лҹ¬ лІҲ вҶ’ н•©мӮ° (мҷёл¶Җ лғүмһҘкі  + лӮҙл¶Җ лғүмһҘкі )
// - FIX лӘЁл“ң: л§Ҳм§Җл§ү к°’мңјлЎң лҚ®м–ҙм“°кё°
// - ADD лӘЁл“ң: к·ёлҢҖлЎң мң м§Җ (лӮҳмӨ‘м—җ DBк°’м—җ н•©мӮ°)
function mergeSameUtterance(entries) {
  const map = new Map();
  for (const e of entries) {
    const key = normalizeKey(e.item) + '|||' + e.cmd + '|||' + e.unit;
    const prev = map.get(key);
    if (!prev) {
      map.set(key, { ...e });
    } else {
      if (e.mode === 'FIX') {
        // мҲҳм •мқҖ л§Ҳм§Җл§ү к°’мңјлЎң
        prev.qty  = e.qty;
        prev.mode = 'FIX';
      } else if (e.mode === 'SET') {
        // мһ¬кі  мЎ°мӮ¬ мӨ‘ к°ҷмқҖ н’ҲлӘ© лӢӨмӢң лӮҳмҳӨл©ҙ н•©мӮ°
        prev.qty += e.qty;
      } else if (e.mode === 'ADD') {
        prev.qty += e.qty;
      }
    }
  }
  return Array.from(map.values());
}

// нҺём§‘ кұ°лҰ¬(Levenshtein Distance)
function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = new Array(n + 1).fill(0);
    dp[i][0] = i;
  }
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function normalizeKey(x) {
  return String(x || '').replace(/\s+/g, '').trim().toLowerCase();
}

function applyTypoRules(text, rules) {
  let s = String(text || '');
  for (const rule of rules) {
    if (!rule.enabled) continue;
    if (rule.rule_type === 'EXACT') {
      const f = rule.from_text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      s = s.replace(new RegExp('(^|\\s)' + f + '(?=\\s|$)', 'g'), '$1' + rule.to_text);
    } else if (rule.rule_type === 'CONTAINS') {
      s = s.split(rule.from_text).join(rule.to_text);
    }
  }
  return s;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   л©”мқё мһ…л Ҙ мІҳлҰ¬
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function handleSend() {
  const input = document.getElementById('textInput');
  const rawText = input.value.trim();
  if (!rawText) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';

  try {
    // мҳӨнғҖмӮ¬м „ лЎңл“ң
    const { data: typoRules } = await db
      .from('typo_dict')
      .select('*')
      .eq('enabled', true)
      .order('priority');

    // м „мІҳлҰ¬ + мҳӨнғҖ көҗм •
    const corrected = applyTypoRules(rawText, typoRules || []);
    const cleaned   = preprocessInput(corrected);

    // нҢҢмӢұ
    const entries = parseEntries(cleaned);
    if (entries.length === 0) {
      addResult(rawText, 'вқҢ л¶„лҰ¬ мӢӨнҢЁ вҖ” н’ҲлӘ©лӘ…кіј мҲҳлҹүмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”', 'err');
      return;
    }

    // к°ҷмқҖ л°ңнҷ” лӮҙ лҸҷмқј н’ҲлӘ© н•©мӮ°
    // к·ңм№ҷ: SET лӘЁл“ңм—җм„ң к°ҷмқҖ н’ҲлӘ©мқҙ м—¬лҹ¬ лІҲ лӮҳмҳӨл©ҙ н•©мӮ° (лғүмһҘкі  л‘җ кіім—җм„ң л°ңкІ¬н•ң кІҪмҡ°)
    // FIX лӘЁл“ңлҠ” л§Ҳм§Җл§ү к°’мңјлЎң лҚ®м–ҙм“°кё°
    const mergedEntries = mergeSameUtterance(entries);

    // н’ҲлӘ© лӘ©лЎқ к°Җм ёмҳӨкё°
    const { data: items } = await db.from('items').select('*');
    const itemMap = new Map();
    (items || []).forEach(it => itemMap.set(normalizeKey(it.item_name), it));

    // мІҳлҰ¬
    const msgs = [];
    for (const ent of mergedEntries) {
      const key      = normalizeKey(ent.item);
      const matched  = itemMap.get(key);

      if (!matched) {
        // в”Җв”Җ мң мӮ¬ н’ҲлӘ© мІҙнҒ¬ (мҳӨнғҖ мқҳмӢ¬ мӢңм—җл§Ң NEW_ITEMSлЎң ліҙлғ„) в”Җв”Җ
        // кё°мЎҙ н’ҲлӘ©лӘ… мӨ‘ мһ…л Ҙк°’мқ„ нҸ¬н•Ён•ҳкұ°лӮҳ, мһ…л Ҙк°’мқҙ кё°мЎҙ н’ҲлӘ©лӘ…мқ„ нҸ¬н•Ён•ҳлҠ” кІҪмҡ° вҶ’ мҳӨнғҖ мқҳмӢ¬
        const similar = (items || []).find(it => {
          const a = normalizeKey(it.item_name);
          const b = normalizeKey(ent.item);
          if (a === b) return false;
          if (Math.abs(a.length - b.length) >= 3) return false;
          if (a.includes(b) || b.includes(a)) return true;
          return editDistance(a, b) <= 2;
        });

        if (similar) {
          // мҳӨнғҖ мқҳмӢ¬ вҶ’ NEW_ITEMSлЎң ліҙлӮҙм„ң нҷ•мқё
          const { data: existingQ } = await db
            .from('new_items_queue')
            .select('id')
            .eq('candidate_item', ent.item)
            .eq('status', 'PENDING')
            .limit(1);

          if (!existingQ || existingQ.length === 0) {
            await db.from('new_items_queue').insert({
              raw_text:       rawText,
              candidate_item: ent.item,
              parsed_qty:     ent.qty,
              unit:           ent.unit,
              cmd:            ent.cmd,
              status:         'PENDING'
            });
          }
          msgs.push({
            text: `рҹ”Қ "${ent.item}" вҶ’ нҳ№мӢң "${similar.item_name}"? мӢ к·ң нғӯм—җм„ң нҷ•мқё`,
            type: 'warn'
          });
          continue;
        }

        // мҷ„м „нһҲ мғҲлЎңмҡҙ н’ҲлӘ© вҶ’ л°”лЎң л“ұлЎқ + мһ¬кі  л°ҳмҳҒ
        const initQty = ent.cmd === 'мһ…кі ' ? ent.qty
                      : ent.cmd === 'мӮ¬мҡ©' ? -ent.qty
                      : ent.cmd === 'л°ңмЈј' ? 0
                      : ent.qty; // мһ¬кі (SET)

        const { data: newItem } = await db.from('items').insert({
          item_name:   ent.item,
          unit:        ent.unit,
          pack_factor: 1,
          target_qty:  0,
          current_qty: initQty
        }).select().single();

        // мқҙл Ҙ кё°лЎқ
        if (newItem) {
          await db.from('inventory_log').insert({
            item_id:   newItem.id,
            item_name: newItem.item_name,
            qty:       ent.qty,
            unit:      ent.unit,
            cmd:       ent.cmd,
            actor:     'owner',
            raw_text:  rawText
          });
        }

        msgs.push({ text: `рҹҶ• ${ent.item} ${ent.qty}${ent.unit} вҖ” мӢ к·ң л“ұлЎқ мҷ„лЈҢ`, type: 'ok' });
        continue;
      }

      const cur  = Number(matched.current_qty) || 0;
      const mode = ent.mode || 'SET';
      let newQty = cur;
      let modeLabel = '';

      if (ent.cmd === 'мһ…кі ') {
        newQty = cur + ent.qty;
        modeLabel = 'мһ…кі ';
      } else if (ent.cmd === 'мӮ¬мҡ©') {
        newQty = cur - ent.qty;
        modeLabel = 'мӮ¬мҡ©';
      } else if (ent.cmd === 'л°ңмЈј') {
        newQty = cur;
        modeLabel = 'л°ңмЈј';
      } else if (mode === 'FIX') {
        // мҲҳм • вҶ’ л¬ҙмЎ°кұҙ лҚ®м–ҙм“°кё°
        newQty = ent.qty;
        modeLabel = 'мҲҳм •';
      } else if (mode === 'ADD') {
        // м¶”к°Җ вҶ’ н•©мӮ°
        newQty = cur + ent.qty;
        modeLabel = 'м¶”к°Җ';
      } else {
        // кё°ліё мһ¬кі (SET) вҶ’ лҚ®м–ҙм“°кё°
        newQty = ent.qty;
        modeLabel = 'мһ¬кі ';
      }

      // мһ¬кі  м—…лҚ°мқҙнҠё
      if (ent.cmd !== 'л°ңмЈј') {
        await db.from('items')
          .update({ current_qty: newQty, updated_at: new Date().toISOString() })
          .eq('id', matched.id);
      }

      // мқҙл Ҙ кё°лЎқ
      await db.from('inventory_log').insert({
        item_id:   matched.id,
        item_name: matched.item_name,
        qty:       ent.qty,
        unit:      ent.unit,
        cmd:       modeLabel,
        actor:     'owner',
        raw_text:  rawText
      });

      const icon = ent.cmd === 'мһ…кі ' ? 'рҹ“Ұ'
                 : ent.cmd === 'мӮ¬мҡ©' ? 'рҹҚі'
                 : ent.cmd === 'л°ңмЈј' ? 'рҹ§ҫ'
                 : mode === 'FIX'     ? 'вңҸпёҸ'
                 : mode === 'ADD'     ? 'вһ•'
                 : 'вң…';
      msgs.push({ text: `${icon} ${matched.item_name} ${ent.qty}${ent.unit} вҶ’ ${newQty}${matched.unit} (${modeLabel})`, type: 'ok' });
    }

    msgs.forEach(m => addResult(rawText, m.text, m.type));
    input.value = '';

  } catch(err) {
    addResult(rawText, 'вқҢ мҳӨлҘҳ: ' + err.message, 'err');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'мһ…л Ҙ';
  }
}

function addResult(raw, msg, type) {
  const list = document.getElementById('resultList');
  const now  = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

  // кё°мЎҙ н—ӨлҚ” м ңмҷён•ң мІ« лІҲм§ё мң„м№ҳм—җ мӮҪмһ…
  const header = list.querySelector('.result-header');
  const div = document.createElement('div');
  div.className = `result-item ${type}`;
  div.innerHTML = `
    <div>
      <div class="result-raw">${raw}</div>
      <div class="result-msg">${msg}</div>
    </div>
    <div class="result-time">${now}</div>
  `;
  header.after(div);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   л°ңмЈј нҷ”л©ҙ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function loadOrderList() {
  const el = document.getElementById('orderList');
  el.innerHTML = '<div class="no-order"><span class="spinner"></span></div>';

  const { data: items } = await db
    .from('items')
    .select('*, vendors(vendor_name)')
    .order('vendor_id');

  if (!items || items.length === 0) {
    el.innerHTML = '<div class="no-order">л“ұлЎқлҗң н’ҲлӘ©мқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
    return;
  }

  // л°ңмЈј н•„мҡ” н’ҲлӘ©л§Ң (current < target)
  const needOrder = items.filter(it => Number(it.current_qty) < Number(it.target_qty));
  if (needOrder.length === 0) {
    el.innerHTML = '<div class="no-order">вң… л°ңмЈј н•„мҡ” н’ҲлӘ© м—ҶмқҢ</div>';
    return;
  }

  // кұ°лһҳмІҳлі„ к·ёлЈ№
  const groups = {};
  needOrder.forEach(it => {
    const v = it.vendors?.vendor_name || 'кұ°лһҳмІҳ лҜём§Җм •';
    if (!groups[v]) groups[v] = [];
    groups[v].push(it);
  });

  let html = '<div class="vendor-section">';
  for (const [vendor, list] of Object.entries(groups)) {
    html += `<div class="vendor-name">рҹ“Ұ ${vendor}</div>`;
    list.forEach(it => {
      const suggest = Math.max(0, Number(it.target_qty) - Number(it.current_qty));
      html += `
        <div class="order-item">
          <div class="order-item-name">${it.item_name}</div>
          <div class="order-item-stock">нҳ„мһ¬ ${it.current_qty}/${it.target_qty}</div>
          <div class="order-qty-wrap">
            <input class="order-qty" type="number" value="${suggest}" min="0" id="qty_${it.id}">
            <span class="order-unit">${it.unit}</span>
          </div>
        </div>`;
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   NEW_ITEMS нҷ”л©ҙ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function loadNewItems() {
  const el = document.getElementById('newItemList');
  el.innerHTML = '<div class="no-pending"><span class="spinner"></span></div>';

  const { data: pending } = await db
    .from('new_items_queue')
    .select('*')
    .eq('status', 'PENDING')
    .order('created_at', { ascending: false });

  if (!pending || pending.length === 0) {
    el.innerHTML = '<div class="no-pending">вң… лҜёл“ұлЎқ н’ҲлӘ© м—ҶмқҢ</div>';
    return;
  }

  el.innerHTML = pending.map(item => `
    <div class="new-item-card" id="card_${item.id}">
      <div class="new-item-top">
        <div>
          <div class="new-item-candidate">${item.candidate_item}</div>
          <div class="new-item-raw">${item.raw_text || ''}</div>
        </div>
        <div class="new-item-badge">PENDING</div>
      </div>
      <input
        class="new-item-memo"
        id="memo_${item.id}"
        placeholder="н’ҲлӘ©лӘ… мҲҳм • (л§һмңјл©ҙ к·ёлҢҖлЎң)"
        value="${item.candidate_item}"
      >
      <div class="new-item-actions">
        <button class="btn-approve" onclick="approveItem(${item.id})">вң… мҠ№мқё + л“ұлЎқ</button>
        <button class="btn-reject"  onclick="rejectItem(${item.id})">кұ°м Ҳ</button>
      </div>
    </div>
  `).join('');
}

async function approveItem(id) {
  const memo = document.getElementById('memo_' + id).value.trim();
  if (!memo) { showToast('н’ҲлӘ©лӘ…мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); return; }

  // мҳӨнғҖмӮ¬м „ мһҗлҸҷн•ҷмҠө (мӣҗліё нӣ„ліҙмҷҖ лӢӨлҘј л•Ң)
  const { data: row } = await db.from('new_items_queue').select('*').eq('id', id).single();
  if (row && row.candidate_item !== memo) {
    const { data: existing } = await db
      .from('typo_dict')
      .select('id')
      .eq('from_text', row.candidate_item)
      .eq('to_text', memo)
      .limit(1);
    if (!existing || existing.length === 0) {
      await db.from('typo_dict').insert({
        from_text: row.candidate_item,
        to_text:   memo,
        rule_type: 'EXACT',
        enabled:   true,
        priority:  50,
        note:      'NEW_ITEMS мҠ№мқё мһҗлҸҷн•ҷмҠө'
      });
    }
  }

  // л°ңмЈјкё°мӨҖ(items)м—җ л“ұлЎқ
  const { data: existing } = await db.from('items').select('id').eq('item_name', memo).limit(1);
  if (!existing || existing.length === 0) {
    await db.from('items').insert({
      item_name:   memo,
      unit:        row?.unit || 'к°ң',
      pack_factor: 1,
      target_qty:  1,
      current_qty: Number(row?.parsed_qty) || 0
    });
  }

  // мғҒнғң DONEмңјлЎң ліҖкІҪ
  await db.from('new_items_queue').update({ status: 'DONE', memo }).eq('id', id);

  document.getElementById('card_' + id).remove();
  showToast(`вң… "${memo}" л“ұлЎқ мҷ„лЈҢ`);

  const remaining = document.querySelectorAll('[id^="card_"]').length;
  if (remaining === 0) {
    document.getElementById('newItemList').innerHTML = '<div class="no-pending">вң… лҜёл“ұлЎқ н’ҲлӘ© м—ҶмқҢ</div>';
  }
}

async function rejectItem(id) {
  await db.from('new_items_queue').update({ status: 'REJECTED' }).eq('id', id);
  document.getElementById('card_' + id).remove();
  showToast('кұ°м Ҳ мІҳлҰ¬лҗЁ');
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   м—”н„°нӮӨ мһ…л Ҙ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   PWA м„ңл№„мҠӨмӣҢм»Ө л“ұлЎқ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
if ('serviceWorker' in navigator) {
  // мқёлқјмқё м„ңл№„мҠӨмӣҢм»Ө (лӢЁмқј нҢҢмқј)
  const swCode = `
    const CACHE = 'zerokitchen-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
    });
    self.addEventListener('fetch', e => {
      // Supabase APIлҠ” мәҗмӢң м•Ҳ н•Ё
      if (e.request.url.includes('supabase.co')) return;
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   iOS нҷҲ нҷ”л©ҙ м¶”к°Җ л°°л„Ҳ (Safari)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function checkIOSInstall() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('zk_ios_banner');
  if (!isIOS || isStandalone || dismissed) return;

  const banner = document.createElement('div');
  banner.style.cssText = `
    position:fixed; bottom:0; left:0; right:0;
    background:#1e1e1e; border-top:1px solid #2a2a2a;
    padding:16px 20px; display:flex; align-items:center;
    gap:12px; z-index:200; font-family:'Noto Sans KR',sans-serif;
  `;
  banner.innerHTML = `
    <span style="font-size:22px">рҹ“І</span>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700;color:#f0f0f0">нҷҲ нҷ”л©ҙм—җ м¶”к°Җн•ҳкё°</div>
      <div style="font-size:12px;color:#666;margin-top:2px">Safari н•ҳлӢЁ кіөмң  лІ„нҠј вҶ’ "нҷҲ нҷ”л©ҙм—җ м¶”к°Җ"</div>
    </div>
    <button onclick="this.parentElement.remove();localStorage.setItem('zk_ios_banner','1')"
      style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px">вң•</button>
  `;
  document.body.appendChild(banner);
}
setTimeout(checkIOSInstall, 1500);
</script>
