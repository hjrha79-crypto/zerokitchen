// 소비량 계산 엔진 (안정형)
// kitchen_operations의 stock_check 간 소비량을 산출
// 공식: (이전재고 + 구간내입고) - 현재재고
async function _calcConsumption(itemId) {
  try {
    const { data: ops } = await db.from('kitchen_operations')
      .select('action_type, quantity, qty_before, qty_after, created_at')
      .eq('store_id', SID).eq('item_id', itemId)
      .in('action_type', ['stock_check', 'inbound'])
      .order('created_at', { ascending: true });

    if (!ops || ops.length === 0) return { mode: 'target_based', avg: null };

    // stock_check 이벤트만 추출
    const checks = ops.filter(o => o.action_type === 'stock_check');
    if (checks.length < 3) return { mode: 'target_based', avg: null };

    const consumptions = [];

    for (let i = 1; i < checks.length; i++) {
      const prev = checks[i - 1];
      const curr = checks[i];
      const prevDate = new Date(prev.created_at);
      const currDate = new Date(curr.created_at);
      const diffDays = Math.max((currDate - prevDate) / (1000 * 60 * 60 * 24), 1);

      // 구간 내 입고(inbound) 합산
      const addsBetween = ops
        .filter(o =>
          o.action_type === 'inbound' &&
          new Date(o.created_at) >= prevDate &&
          new Date(o.created_at) < currDate
        )
        .reduce((sum, o) => sum + Number(o.quantity || 0), 0);

      const prevQty = Number(prev.qty_after);
      const currQty = Number(curr.qty_after);
      const consumption = (prevQty + addsBetween - currQty) / diffDays;

      // 음수 skip (입고 누락 등)
      if (consumption < 0) continue;

      consumptions.push(consumption);
    }

    if (consumptions.length === 0) return { mode: 'target_based', avg: null };

    // 중앙값 사용
    consumptions.sort((a, b) => a - b);
    const median = consumptions[Math.floor(consumptions.length / 2)];

    return {
      mode: 'consumption_based',
      avg: Math.max(0, Number(median.toFixed(2))),
      dataPoints: consumptions.length
    };
  } catch (e) {
    console.warn('소비량 계산 실패:', e.message);
    return { mode: 'target_based', avg: null };
  }
}

// 발주 수량 계산 (소비량 or 목표재고)
function _calcOrderQty(currentQty, targetQty, consumption) {
  if (consumption && consumption.mode === 'consumption_based' && consumption.avg > 0) {
    // 소비량 모드: 3일치 확보
    const recommended = Math.ceil(consumption.avg * 3);
    const qty = Math.max(0, recommended - currentQty);
    // 상한: target * 2
    const cap = targetQty > 0 ? targetQty * 2 : recommended * 2;
    return {
      qty: Math.min(qty, cap),
      source: 'consumption_based',
      avg: consumption.avg
    };
  }
  // 목표재고 모드
  return {
    qty: Math.max(0, targetQty - currentQty),
    source: 'target_based',
    avg: null
  };
}

async function renderOrder() {
  const list = document.getElementById('orderList');
  list.innerHTML = '<div class="no-item"><span class="spin" style="border-color:var(--border);border-top-color:var(--accent)"></span></div>';

  try {
    // 1) pending 발주 요청 로드
    const { data: pendingRows, error: oErr } = await db.from('order_requests')
      .select('*').eq('store_id', SID).eq('status', 'pending')
      .order('created_at', { ascending: false });
    if (oErr) throw oErr;
    _orderRequests = pendingRows || [];

    // 1.5) 이월된 발주 로드 (어제 이전 deferred)
    const today = new Date().toISOString().slice(0, 10);
    const { data: deferredRows } = await db.from('daily_orders')
      .select('*').eq('store_id', SID).eq('status', 'deferred')
      .lt('order_date', today);
    const _deferredItems = (deferredRows || []).map(r => ({
      ...r,
      isDeferred: true,
      defer_count: r.defer_count || 0
    }));

    // 2) 재고 부족 품목 (자동 제안용)
    await refreshItems();
    const pendingItemIds = new Set(_orderRequests.map(r => r.item_id));
    // 부족 품목 추출 + 소비량 계산
    const needItems = _items.filter(it =>
      (Number(it.current_qty) <= Number(it.min_stock || 0) ||
       Number(it.current_qty) < Number(it.target_qty) ||
       Number(it.current_qty) <= 0) &&
      !pendingItemIds.has(it.item_id)
    );
    const suggestItems = [];
    for (const it of needItems) {
      const consumption = await _calcConsumption(it.item_id);
      const order = _calcOrderQty(Number(it.current_qty), Number(it.target_qty), consumption);
      if (order.qty <= 0) continue;
      suggestItems.push({
        item_id: it.item_id, name: it.item_name,
        current_qty: Number(it.current_qty), target_qty: Number(it.target_qty),
        suggested_qty: order.qty,
        unit: it.unit || '', vendor_id: it.vendor_id || null,
        vendor: _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || null,
        source: order.source,
        avg: order.avg
      });
    }

    // 이월 품목 합치기 (중복 제거)
    for (const def of _deferredItems) {
      const existing = suggestItems.find(s => s.item_id === def.item_id);
      if (existing) {
        // 재고 변동 반영하여 수량 재계산
        existing.suggested_qty = Math.max(0, Number(def.recommended_qty));
        existing.isDeferred = true;
        existing.defer_count = def.defer_count;
        existing.daily_order_id = def.id;
      } else {
        const item = _items.find(it => it.item_id === def.item_id);
        if (item) {
          suggestItems.push({
            item_id: def.item_id,
            name: def.item_name,
            current_qty: Number(item.current_qty),
            target_qty: Number(item.target_qty || def.recommended_qty),
            suggested_qty: Math.max(0, Number(def.recommended_qty)),
            unit: def.unit || '',
            vendor_id: def.vendor_id || null,
            vendor: _vendors.find(v => v.vendor_id === def.vendor_id)?.vendor_name || null,
            isDeferred: true,
            defer_count: def.defer_count,
            daily_order_id: def.id
          });
        }
      }
    }

    if (!_orderRequests.length && !suggestItems.length) {
      const lastCheck = _items.reduce((latest, it) => {
        const d = new Date(it.updated_at || 0);
        return d > latest ? d : latest;
      }, new Date(0));
      const lastStr = lastCheck.getTime() > 0 ? lastCheck.toLocaleDateString('ko-KR', {month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
      list.innerHTML = `<div class="ord-empty-good">
        <div class="ord-empty-icon">✅</div>
        <div class="ord-empty-title">모든 재고가 충분합니다</div>
        <div class="ord-empty-sub">마지막 확인: ${lastStr}</div>
      </div>`;
      return;
    }

    let html = '';

    // ── Section A: 진행 중 발주 (order_requests pending) ──
    html += `<div class="ord-section">`;
    html += `<div class="ord-section-title"><span class="ord-icon">📋</span> 진행 중 발주`;
    if (_orderRequests.length) html += ` <span class="ord-pending-badge">${_orderRequests.length}</span>`;
    html += `</div>`;

    if (_orderRequests.length) {
      const grpMap = new Map();
      for (const r of _orderRequests) {
        const vName = _vendors.find(v => v.vendor_id === r.vendor_id)?.vendor_name || '거래처 미지정';
        if (!grpMap.has(vName)) grpMap.set(vName, []);
        grpMap.get(vName).push(r);
      }

      for (const [vName, rows] of grpMap) {
        html += `
        <div class="ord-vendor-group">
          <div class="ord-vendor-hdr">
            <span class="ord-vendor-name">${vName}</span>
          </div>
          ${rows.map(r => {
            const item = _items.find(it => it.item_id === r.item_id);
            const curQty = item ? Number(item.current_qty) : '?';
            const rVendor = _vendors.find(v => v.vendor_id === r.vendor_id);
            const vendorDisplay = rVendor
              ? `<button class="ord-vendor-assign" data-vendor-change="${r.id}" data-item-name="${r.item_name}" data-current-vendor="${rVendor.vendor_name}">${rVendor.vendor_name}</button>`
              : `<button class="ord-vendor-assign" data-vendor-assign="${r.id}">거래처 지정</button>`;
            return `
          <div class="ord-item-row">
            <div>
              <span class="ord-item-name" data-editable data-order-id="${r.id}">${r.item_name}</span>
              ${vendorDisplay}
            </div>
            <div class="ord-item-right">
              <span class="ord-item-qty">현재 ${curQty}${r.unit} / 발주 <strong>${r.qty}${r.unit}</strong></span>
              <div class="ord-status-btns">
                <button class="ord-btn-done" onclick="completeOrder(${r.id})">입고 완료</button>
                <button class="ord-btn-cancel" onclick="cancelOrder(${r.id})">취소</button>
              </div>
            </div>
          </div>`;
          }).join('')}
        </div>`;
      }
    } else {
      html += `<div class="ord-empty">진행 중인 발주가 없습니다</div>`;
    }
    html += `</div>`;

    // ── Section B: 오늘의 발주 추천 ──
    if (suggestItems.length) {
      // 긴급(재고 0) 최상단 정렬
      suggestItems.sort((a, b) => {
        if (a.current_qty <= 0 && b.current_qty > 0) return -1;
        if (a.current_qty > 0 && b.current_qty <= 0) return 1;
        return a.name < b.name ? -1 : 1;
      });

      const suggestGrp = new Map();
      for (const it of suggestItems) {
        const key = it.vendor || '거래처 미지정';
        if (!suggestGrp.has(key)) suggestGrp.set(key, []);
        suggestGrp.get(key).push(it);
      }

      const today = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
      html += `<div class="ord-section">`;
      html += `<div class="ord-today-header">
        <span class="ord-today-title">📦 오늘의 발주 추천</span>
        <span class="ord-today-date">${today}</span>
      </div>`;

      for (const [vName, items] of suggestGrp) {
        html += `<div class="ord-vendor-group ord-suggest-group">
          <div class="ord-vendor-hdr">
            <span class="ord-vendor-name">${vName}</span>
            <span style="font-size:12px;color:var(--muted)">${items.length}개</span>
          </div>`;
        for (const it of items) {
          const isUrgent = it.current_qty <= 0;
          const recId = 'orec_' + it.item_id;
          html += `<div class="ord-recommend-card${isUrgent ? ' urgent' : ''}">
            <div class="ord-rec-left">
              <div class="ord-rec-name">${isUrgent ? '🔴 ' : ''}${it.name}${it.isDeferred ? (it.defer_count >= 2 ? ' <span class="ord-defer-blocked">⚠️ 이월 2회</span>' : ' <span class="ord-defer-tag">↩️ 이월</span>') : ''}</div>
              <div class="ord-rec-info">현재 ${it.current_qty}${it.unit}</div>
              <div class="ord-rec-source">(${it.source === 'consumption_based' ? '일평균 ' + it.avg + it.unit : '목표재고 기준'})</div>
            </div>
            <div class="ord-rec-right">
              <button class="ord-stepper-btn" onclick="_ordStep('${recId}',-1)">−</button>
              <input class="ord-stepper-val" id="${recId}" type="number" value="${it.suggested_qty}" data-item-id="${it.item_id}" data-name="${it.name}" data-unit="${it.unit}" data-vendor-id="${it.vendor_id || ''}" data-source="${it.source || 'target_based'}">
              <button class="ord-stepper-btn" onclick="_ordStep('${recId}',1)">+</button>
              <span class="ord-rec-unit">${it.unit}</span>
            </div>
          </div>`;
        }
        // 거래처별 카카오톡 복사 버튼
        const vendorItemIds = items.map(it => it.item_id);
        html += `<div style="padding:8px 12px">
          <button class="ord-btn-kakao" style="width:100%;padding:10px;border-radius:8px;font-size:13px" onclick="_copyVendorOrder('${vName.replace(/'/g,"\\'")}', [${vendorItemIds.join(',')}])">📋 ${vName} 발주 복사</button>
        </div>`;
        html += `</div>`;
      }

      // 전체 발주 확인 버튼
      html += `<div class="ord-today-actions">
        <button class="ord-btn-confirm-all" onclick="_confirmAllOrders()">전체 발주 확인</button>
        <button style="background:var(--surface2);border:1px solid var(--border);color:var(--dim)" onclick="_deferAllOrders()">내일로 이월</button>
      </div>`;
      html += `</div>`;
    }

    list.innerHTML = html;
  } catch(e) {
    list.innerHTML = `<div class="no-item">오류: ${e.message}</div>`;
  }
}

async function _showDupCleanup() {
  // 중복 품목 찾기
  const nameMap = {};
  _items.forEach(it => {
    const key = it.item_name.replace(/\s/g, '').toLowerCase();
    if (!nameMap[key]) nameMap[key] = [];
    nameMap[key].push(it);
  });
  const dups = Object.entries(nameMap).filter(([k, v]) => v.length > 1);
  if (!dups.length) { showToast('중복 품목이 없습니다'); return; }

  const panel = document.getElementById('reviewPanel');
  panel.style.display = 'block';
  const wrap = panel.querySelector('.result-card-wrap');
  const origHTML = wrap.innerHTML;

  let cardsHtml = dups.map(([key, items]) => {
    const name = items[0].item_name;
    const totalQty = items.reduce((s, it) => s + Number(it.current_qty), 0);
    const unit = items[0].unit || '';
    const detail = items.map(it => `${Number(it.current_qty)}${it.unit || ''}`).join(' + ');
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:14px;font-weight:600">${name}</div>
      <div style="font-size:12px;color:var(--dim);margin:4px 0">${detail} = ${totalQty}${unit}</div>
      <button class="ord-btn-done" style="font-size:12px;padding:6px 14px" onclick="_mergeDup('${key}')">합치기 (${totalQty}${unit})</button>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="config-card">
      <button class="card-close-x" onclick="document.getElementById('reviewPanel').style.display='none';this.closest('.result-card-wrap').innerHTML=\`${origHTML.replace(/`/g,'\\`')}\`">✕</button>
      <div class="config-card-title">중복 품목 정리</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:8px">같은 이름의 품목을 하나로 합칩니다. 수량은 합산됩니다.</div>
      ${cardsHtml}
      <button class="rc-btn-primary" style="margin-top:12px;width:100%" onclick="_mergeAllDups()">전체 합치기</button>
    </div>`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function _mergeDup(nameKey) {
  const nameMap = {};
  _items.forEach(it => {
    const key = it.item_name.replace(/\s/g, '').toLowerCase();
    if (!nameMap[key]) nameMap[key] = [];
    nameMap[key].push(it);
  });
  const items = nameMap[nameKey];
  if (!items || items.length < 2) return;

  // 첫 번째 품목에 수량 합산, 나머지 삭제
  const primary = items[0];
  const totalQty = items.reduce((s, it) => s + Number(it.current_qty), 0);
  await db.from('items').update({
    current_qty: totalQty, updated_at: new Date().toISOString()
  }).eq('item_id', primary.item_id);
  primary.current_qty = totalQty;

  for (let i = 1; i < items.length; i++) {
    await db.from('items').delete().eq('item_id', items[i].item_id);
    _items = _items.filter(x => x.item_id !== items[i].item_id);
  }

  showToast(`${primary.item_name} 합침 → ${totalQty}${primary.unit || ''}`);
  renderInventory();
  // 패널 업데이트
  _showDupCleanup();
}

async function _mergeAllDups() {
  const nameMap = {};
  _items.forEach(it => {
    const key = it.item_name.replace(/\s/g, '').toLowerCase();
    if (!nameMap[key]) nameMap[key] = [];
    nameMap[key].push(it);
  });
  const dups = Object.entries(nameMap).filter(([k, v]) => v.length > 1);
  let count = 0;
  for (const [key, items] of dups) {
    const primary = items[0];
    const totalQty = items.reduce((s, it) => s + Number(it.current_qty), 0);
    await db.from('items').update({
      current_qty: totalQty, updated_at: new Date().toISOString()
    }).eq('item_id', primary.item_id);
    primary.current_qty = totalQty;
    for (let i = 1; i < items.length; i++) {
      await db.from('items').delete().eq('item_id', items[i].item_id);
      _items = _items.filter(x => x.item_id !== items[i].item_id);
    }
    count++;
  }
  document.getElementById('reviewPanel').style.display = 'none';
  showToast(`${count}종 중복 품목 정리 완료`);
  renderInventory();
}

function _ordStep(inputId, delta) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  let val = parseInt(inp.value) || 0;
  val = Math.max(0, val + delta);
  inp.value = val;
}

function _copyVendorOrder(vendorName, itemIds) {
  const lines = [];
  for (const id of itemIds) {
    const inp = document.getElementById('orec_' + id);
    if (!inp) continue;
    const qty = parseInt(inp.value) || 0;
    if (qty <= 0) continue;
    const name = inp.dataset.name;
    const unit = inp.dataset.unit;
    lines.push(`${name} ${qty}${unit}`);
  }
  if (!lines.length) { showToast('발주할 품목이 없습니다'); return; }
  const text = `[발주]\n${lines.join('\n')}`;
  navigator.clipboard.writeText(text).then(() => {
    showToast('발주 내용 복사됨 — 카카오톡에 붙여넣기 해주세요', 3000);
    setTimeout(() => { try { window.open('kakaotalk://'); } catch(e) {} }, 800);
  }).catch(() => {
    showToast('복사 실패');
  });
}

async function _confirmAllOrders() {
  const inputs = document.querySelectorAll('.ord-stepper-val');
  let count = 0;
  const today = new Date().toISOString().slice(0, 10);

  for (const inp of inputs) {
    const qty = parseInt(inp.value) || 0;
    if (qty <= 0) continue;
    const itemId = parseInt(inp.dataset.itemId);
    const name = inp.dataset.name;
    const unit = inp.dataset.unit;
    const vendorId = inp.dataset.vendorId ? parseInt(inp.dataset.vendorId) : null;

    // order_requests에 등록
    await db.from('order_requests').insert({
      store_id: SID, item_id: itemId, item_name: name,
      qty: qty, unit: unit, vendor_id: vendorId, status: 'pending'
    });

    // daily_orders에 기록
    await db.from('daily_orders').insert({
      store_id: SID, order_date: today,
      item_id: itemId, item_name: name,
      recommended_qty: parseInt(inp.defaultValue) || qty,
      final_qty: qty,
      unit: unit, vendor_id: vendorId,
      status: 'confirmed', source: inp.dataset.source || 'target_based'
    });

    // 이월 상태 정리
    await db.from('daily_orders')
      .update({ status: 'cancelled', updated_at: new Date().toISOString() })
      .eq('item_id', itemId).eq('status', 'deferred');

    count++;
  }

  if (count) {
    showToast(`${count}개 품목 발주 등록됨`);
    renderOrder();
  } else {
    showToast('발주할 품목이 없습니다');
  }
}

async function _deferAllOrders() {
  const inputs = document.querySelectorAll('.ord-stepper-val');
  let count = 0;
  let blocked = 0;
  const today = new Date().toISOString().slice(0, 10);

  for (const inp of inputs) {
    const qty = parseInt(inp.value) || 0;
    if (qty <= 0) continue;
    const itemId = parseInt(inp.dataset.itemId);
    const name = inp.dataset.name;
    const unit = inp.dataset.unit;
    const vendorId = inp.dataset.vendorId ? parseInt(inp.dataset.vendorId) : null;

    // 기존 이월 횟수 확인
    const { data: existingDefer } = await db.from('daily_orders')
      .select('defer_count')
      .eq('item_id', itemId).eq('status', 'deferred')
      .order('created_at', { ascending: false })
      .limit(1);
    const currentDefers = existingDefer?.[0]?.defer_count || 0;

    if (currentDefers >= 2) {
      blocked++;
      continue; // 이월 2회 제한
    }

    // 기존 deferred 있으면 업데이트, 없으면 새로 생성
    if (existingDefer?.length) {
      await db.from('daily_orders')
        .update({
          recommended_qty: qty, final_qty: qty,
          defer_count: currentDefers + 1,
          order_date: today,
          updated_at: new Date().toISOString()
        })
        .eq('item_id', itemId).eq('status', 'deferred');
    } else {
      await db.from('daily_orders').insert({
        store_id: SID, order_date: today,
        item_id: itemId, item_name: name,
        recommended_qty: qty, final_qty: qty,
        unit: unit, vendor_id: vendorId,
        status: 'deferred', source: 'target_based',
        defer_count: 1
      });
    }
    count++;
  }

  let msg = `${count}개 품목 내일로 이월됨`;
  if (blocked > 0) msg += ` (${blocked}개는 이월 2회 초과로 제외)`;
  showToast(msg, 3000);
  renderOrder();
}

// 발주 완료 → status='done' + 재고 입고
async function completeOrder(orderId) {
  const row = _orderRequests.find(r => r.id === orderId);
  if (!row) return;
  // status 업데이트
  await db.from('order_requests')
    .update({ status: 'done', updated_at: new Date().toISOString() })
    .eq('id', orderId);
  // 재고 입고 처리
  const item = _items.find(it => it.item_id === row.item_id);
  if (item) {
    const newQty = Number(item.current_qty) + Number(row.qty);
    await db.from('items')
      .update({ current_qty: newQty, updated_at: new Date().toISOString() })
      .eq('item_id', item.item_id);
    await db.from('kitchen_operations').insert({
      store_id: SID, item_id: item.item_id, item_name: item.item_name,
      action_type: 'inbound', quantity: row.qty, unit: row.unit,
      qty_before: item.current_qty, qty_after: newQty,
      input_method: 'order_complete', raw_text: `발주 #${orderId} 입고 완료`
    });
    item.current_qty = newQty;
  }
  showToast(`${row.item_name} ${row.qty}${row.unit} 입고 완료`);
  renderOrder();
}

// 발주 취소
async function cancelOrder(orderId) {
  const row = _orderRequests.find(r => r.id === orderId);
  if (!row) return;
  await db.from('order_requests')
    .update({ status: 'cancelled', updated_at: new Date().toISOString() })
    .eq('id', orderId);
  showToast(`${row.item_name} 발주 취소됨`);
  renderOrder();
}

// 재고 부족 제안 → 발주 등록
async function createOrderFromSuggest(itemId, itemName, qty, unit, vendorId) {
  await db.from('order_requests').insert({
    store_id: SID, item_id: itemId, item_name: itemName,
    qty: qty, unit: unit, vendor_id: vendorId, status: 'pending'
  });
  showToast(`${itemName} ${qty}${unit} 발주 등록됨`);
  renderOrder();
}

// 이벤트 위임: orderList 컨테이너에서 클릭 처리 (재렌더링 후에도 동작)
document.addEventListener('click', function(e) {
  // 품목명 인라인 수정
  const nameEl = e.target.closest('[data-editable][data-order-id]');
  if (nameEl && nameEl.tagName !== 'INPUT') {
    const orderId = Number(nameEl.dataset.orderId);
    const current = nameEl.textContent;
    const input = document.createElement('input');
    input.className = 'ord-inline-input';
    input.value = current;
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    let saved = false;
    async function save() {
      if (saved) return; saved = true;
      const newName = input.value.trim();
      // 즉시 span 복원 → 재렌더링 전에도 바로 재수정 가능
      const span = document.createElement('span');
      span.className = 'ord-item-name';
      span.setAttribute('data-editable', '');
      span.setAttribute('data-order-id', String(orderId));
      span.textContent = newName || current;
      input.replaceWith(span);
      if (newName && newName !== current) {
        await db.from('order_requests').update({ item_name: newName, updated_at: new Date().toISOString() }).eq('id', orderId);
        showToast('품목명 수정됨');
      }
      renderOrder();
    }
    input.addEventListener('blur', save);
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
      if (ev.key === 'Escape') { input.value = current; input.blur(); }
    });
    return;
  }

  // 거래처 지정 드롭다운
  const vendorBtn = e.target.closest('[data-vendor-assign]');
  if (vendorBtn && vendorBtn.tagName !== 'SELECT') {
    const orderId = Number(vendorBtn.dataset.vendorAssign);
    const sel = document.createElement('select');
    sel.className = 'ord-inline-input';
    sel.innerHTML = `<option value="">선택...</option>` +
      _vendors.map(v => `<option value="${v.vendor_id}">${v.vendor_name}</option>`).join('');
    vendorBtn.replaceWith(sel);
    sel.focus();

    let picked = false;
    async function pick() {
      if (picked) return; picked = true;
      const vid = sel.value ? parseInt(sel.value) : null;
      if (vid) {
        await db.from('order_requests').update({ vendor_id: vid, updated_at: new Date().toISOString() }).eq('id', orderId);
        showToast('거래처 지정됨');
      }
      renderOrder();
    }
    sel.addEventListener('change', pick);
    sel.addEventListener('blur', function() { if (!picked) renderOrder(); });
    return;
  }

  // 거래처 변경 선택 카드
  const vendorChangeBtn = e.target.closest('[data-vendor-change]');
  if (vendorChangeBtn) {
    const orderId = Number(vendorChangeBtn.dataset.vendorChange);
    const itemName = vendorChangeBtn.dataset.itemName;
    const currentVendor = vendorChangeBtn.dataset.currentVendor;
    const row = vendorChangeBtn.closest('.ord-item-row');
    if (!row) return;
    // 이미 카드가 열려있으면 무시
    if (row.querySelector('.vendor-change-card')) return;
    const card = document.createElement('div');
    card.className = 'vendor-change-card';
    card.style.cssText = 'background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:6px';
    card.innerHTML = `
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">${itemName} 거래처를 변경합니다</div>
      <div class="vendor-change-btns" style="display:flex;flex-wrap:wrap;gap:6px">
        ${_vendors.map(v => `<button class="vendor-pick-btn" data-vid="${v.vendor_id}" style="font-size:12px;padding:5px 12px;border:1px solid ${v.vendor_name===currentVendor?'var(--accent)':'var(--border)'};border-radius:8px;background:${v.vendor_name===currentVendor?'var(--accent-lt)':'var(--surface)'};cursor:pointer;font-family:inherit">${v.vendor_name}</button>`).join('')}
        <button class="vendor-pick-cancel" style="font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--muted)">취소</button>
      </div>`;
    row.appendChild(card);
    card.querySelector('.vendor-pick-cancel').onclick = () => card.remove();
    card.querySelectorAll('.vendor-pick-btn').forEach(btn => {
      btn.onclick = async () => {
        const vid = parseInt(btn.dataset.vid);
        await db.from('order_requests').update({ vendor_id: vid, updated_at: new Date().toISOString() }).eq('id', orderId);
        showToast('거래처 변경됨');
        renderOrder();
      };
    });
    return;
  }
});

/* ════════════════════════════════════════════════════════
   Pending → Confirmed 10초 구조
════════════════════════════════════════════════════════ */
const _ACTION_LABEL = {
  'inbound':     { prefix: '+', label: '입고' },
  'consume':     { prefix: '-', label: '차감' },
  'stock_check': { prefix: '',  label: '재고설정' },
  'order':       { prefix: '',  label: '발주요청' },
};
function _fmtAction(name, qty, unit, action) {
  const a = _ACTION_LABEL[action] || _ACTION_LABEL['stock_check'];
  return `${name} ${a.prefix}${qty}${unit} (${a.label})`;
}

function addPending(raw, req) {
  const id = ++_pendingSeq;
  const list = document.getElementById('resList');

  const card = document.createElement('div');
  card.className = 'res-card pending-card';
  card.id = 'pc_' + id;

  const preview = req.items.map(it =>
    _fmtAction(it.name, it.quantity, it.unit, it.action_type)
  ).join(', ');

  card.innerHTML = `
    <div class="rc-row" style="margin-bottom:6px">${preview.split(', ').map(p=>`<span class="rc-item-name" style="font-size:16px">${p}</span>`).join('')}</div>
    <div class="pending-bar-wrap"><div class="pending-bar" id="pb_${id}"></div></div>
    <div class="result-card-btns" style="margin-top:8px">
      <button class="rc-btn-primary"   onclick="confirmPending(${id})">확인 · 실행</button>
      <button class="rc-btn-secondary" onclick="editPending(${id})">수정</button>
      <button class="rc-btn-cancel"    onclick="cancelPending(${id})">취소</button>
    </div>`;
  list.insertBefore(card, list.firstChild);

  // 10초 카운트다운
  let rem = 10;
  const bar = document.getElementById('pb_' + id);
  const timer = setInterval(async () => {
    rem--;
    if (bar) bar.style.width = ((10 - rem) / 10 * 100) + '%';
    if (rem <= 0) {
      clearInterval(timer);
      await confirmPending(id);
    }
  }, 1000);

  _pendingOps.push({ id, req, raw, timer, card });
}

async function confirmPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);

  const card = document.getElementById('pc_' + id);
  if (card) card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg" style="color:var(--muted)">저장 중...</div>`;

  const result = await processRequest(op.req);
  if (card) {
    if (result.status === 'success' || result.status === 'partial') {
      const lines = result.updated_items.map(it => {
        const a = _ACTION_LABEL[it.action] || _ACTION_LABEL['stock_check'];
        const displayQty = it.inputQty != null ? it.inputQty : it.quantity;
        return `${it.is_new ? '🆕' : '✅'} ${it.name} ${a.prefix}${displayQty}${it.unit} (${a.label}) → 현재 ${it.quantity}${it.unit}`;
      }).join('<br>');
      card.className = 'res-card ok';
      card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg">${lines}</div><div class="res-time">${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div>`;
    } else {
      card.className = 'res-card err';
      card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg">❌ ${result.message}</div>`;
    }
  }
  renderInventory();
}

function cancelPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);
  const card = document.getElementById('pc_' + id);
  if (card) card.remove();
  showToast('취소됨');
}

function editPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);
  const card = document.getElementById('pc_' + id);
  if (card) card.remove();
  // 입력창에 원문 복원
  const inp = document.getElementById('mainInp');
  if (inp) { inp.value = op.raw; inp.focus(); }
  showToast('수정 후 다시 입력해 주세요');
}

let _undoCounter = 0;
function addResult(raw, msg, type, undoItems) {
  const list = document.getElementById('resList');
  const now  = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // 사용자 말풍선 (오른쪽)
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.innerHTML = `${raw}<span class="chat-time">${now}</span>`;
  list.appendChild(userBubble);

  // 시스템 응답 말풍선 (왼쪽)
  const sysBubble = document.createElement('div');
  const borderColor = type === 'err' ? 'var(--red)' : type === 'warn' ? 'var(--warn)' : 'var(--accent)';
  sysBubble.className = 'chat-bubble system';
  sysBubble.style.borderLeftColor = borderColor;
  sysBubble.style.borderLeftWidth = '3px';
  let undoHtml = '';
  if (undoItems && undoItems.length) {
    const uid = 'undo_' + (++_undoCounter);
    undoHtml = `<button class="res-undo" id="${uid}">되돌리기</button>`;
    sysBubble.innerHTML = `${msg.replace(/\n/g,'<br>')}${undoHtml}<span class="chat-time">${now}</span>`;
    list.appendChild(sysBubble);
    const btn = document.getElementById(uid);
    const timer = setTimeout(() => { btn.disabled = true; }, 30000);
    btn.onclick = async () => {
      btn.disabled = true;
      clearTimeout(timer);
      await _undoResult(undoItems);
      const reverseUndo = undoItems.map(it => ({ item_id: it.item_id, name: it.name, qty_before: it.qty_after, qty_after: it.qty_before, unit: it.unit }));
      const reMsg = undoItems.map(it => `↩️ ${it.name} → ${it.qty_before}${it.unit}`).join('\n');
      addResult('되돌리기', reMsg, 'ok', reverseUndo);
      renderInventory();
    };
  } else {
    sysBubble.innerHTML = `${msg.replace(/\n/g,'<br>')}<span class="chat-time">${now}</span>`;
    list.appendChild(sysBubble);
  }

  // 스크롤을 맨 아래로
  const chatArea = document.getElementById('chatArea');
  if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
  updateJustTalk();
}

async function _undoResult(undoItems) {
  for (const it of undoItems) {
    if (!it.item_id) continue;
    await db.from('items')
      .update({ current_qty: it.qty_before, updated_at: new Date().toISOString() })
      .eq('item_id', it.item_id);
    await db.from('kitchen_operations').insert({
      store_id: SID, item_id: it.item_id, item_name: it.name,
      action_type: 'undo', quantity: Math.abs(it.qty_after - it.qty_before),
      unit: it.unit, qty_before: it.qty_after, qty_after: it.qty_before,
      input_method: 'undo', raw_text: '되돌리기'
    });
    // 캐시 업데이트
    const cached = _items.find(i => i.item_id === it.item_id);
    if (cached) cached.current_qty = it.qty_before;
  }
  showToast('되돌렸습니다');
}

// 한 문장에서 동일 품목 합산 확인 카드 (Fix 4)
async function _showIntraDupChoices(intraDups, rawText) {
  for (const [name, indices] of intraDups) {
    if (!_draftItems.length) break;
    const validIndices = indices.filter(i => i < _draftItems.length && _draftItems[i]?.item_name === name);
    if (validIndices.length < 2) continue;
    const items = validIndices.map(i => _draftItems[i]);
    const totalQty = items.reduce((sum, it) => sum + (it.quantity || 0), 0);
    const lastQty = items[items.length - 1].quantity;
    const unit = items[0].unit || '개';

    const choice = await new Promise(resolve => {
      const panel = document.getElementById('reviewPanel');
      if (!panel) { resolve('cancel'); return; }
      panel.style.display = 'block';
      const wrap = panel.querySelector('.result-card-wrap');
      if (!wrap) { resolve('cancel'); return; }
      const origHTML = wrap.innerHTML;
      wrap.innerHTML = `
        <div class="dup-card">
          <div class="dup-card-title">"${name}" 이미 입력했습니다</div>
          <div class="dup-card-detail">
            입력: ${items.map(it => (it.quantity||0) + (it.unit||'개')).join(' + ')} = <strong>${totalQty}${unit}</strong>
          </div>
          <div class="dup-card-btns">
            <button class="dup-btn-merge" id="intraMerge">합쳐서 ${totalQty}${unit}으로 할까요?</button>
            <button class="dup-btn-replace" id="intraReplace">새로 ${lastQty}${unit}으로 바꿀까요?</button>
            <button class="dup-btn-cancel" id="intraCancel">취소</button>
          </div>
        </div>`;
      let resolved = false;
      const restore = () => { if (wrap.parentNode) wrap.innerHTML = origHTML; };
      const _timeout = setTimeout(() => { if (!resolved) { resolved = true; restore(); resolve('timeout'); } }, 30000);
      const safeResolve = (val) => { if (!resolved) { resolved = true; clearTimeout(_timeout); restore(); resolve(val); } };
      document.getElementById('intraMerge')?.addEventListener('click', () => safeResolve('merge'));
      document.getElementById('intraReplace')?.addEventListener('click', () => safeResolve('replace'));
      document.getElementById('intraCancel')?.addEventListener('click', () => safeResolve('cancel'));
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    if (choice === 'merge' || choice === 'replace') {
      _createDecisionEvent({
        entity: name,
        ai_suggestion: lastQty,
        final_value: choice === 'merge' ? totalQty : lastQty,
        user_decision: choice === 'merge' ? 'EDIT' : 'REJECT',
        decision_action: choice === 'merge' ? 'MERGE' : 'REPLACE',
        edit_delta: choice === 'merge' ? totalQty : null,
        harness_trigger: 'duplicate_entry'
      });
    }
    const sortedIndices = validIndices.slice().sort((a, b) => b - a);
    if (choice === 'merge') {
      _draftItems[validIndices[0]].quantity = totalQty;
      for (const idx of sortedIndices) { if (idx !== validIndices[0]) _draftItems.splice(idx, 1); }
    } else if (choice === 'replace') {
      _draftItems[validIndices[0]].quantity = lastQty;
      for (const idx of sortedIndices) { if (idx !== validIndices[0]) _draftItems.splice(idx, 1); }
    } else {
      for (const idx of sortedIndices) { _draftItems.splice(idx, 1); }
      if (choice === 'timeout') {
        addResult(name, '⏰ 30초 무응답 — 입력이 자동 종료되었습니다.', 'warn');
      }
    }
  }
}

// Feature 2: 동일 품목 재입력 확인 카드
async function _showDupChoices(dupChecks, rawText) {
  // 역순 처리: splice 시 앞쪽 인덱스가 뒤쪽에 영향 안 주도록
  const sortedDups = dupChecks.slice().sort((a, b) => b.idx - a.idx);
  for (const dup of sortedDups) {
    // 인덱스 유효성 확인
    if (dup.idx >= _draftItems.length || !_draftItems[dup.idx]) continue;
    const mergedQty = dup.prevQty + dup.newQty;
    const choice = await new Promise(resolve => {
      const panel = document.getElementById('reviewPanel');
      if (!panel) { resolve('cancel'); return; }
      panel.style.display = 'block';
      const wrap = panel.querySelector('.result-card-wrap');
      if (!wrap) { resolve('cancel'); return; }
      const origHTML = wrap.innerHTML;
      wrap.innerHTML = `
        <div class="dup-card">
          <div class="dup-card-title">"${dup.item_name}" — 이미 입력한 품목입니다</div>
          <div class="dup-card-detail">
            이전 입력: ${dup.prevQty}${dup.prevUnit}<br>
            새 입력: ${dup.newQty}${dup.newUnit}<br>
            합계: <strong>${mergedQty}${dup.newUnit}</strong>
          </div>
          <div class="dup-card-btns">
            <button class="dup-btn-merge" id="dupMerge">합쳐서 ${mergedQty}${dup.newUnit}</button>
            <button class="dup-btn-replace" id="dupReplace">새로 ${dup.newQty}${dup.newUnit}으로</button>
            <button class="dup-btn-cancel" id="dupCancel">취소</button>
          </div>
        </div>`;
      let resolved = false;
      const restore = () => { if (wrap.parentNode) wrap.innerHTML = origHTML; };
      const _timeout = setTimeout(() => { if (!resolved) { resolved = true; restore(); resolve('timeout'); } }, 30000);
      const mergeBtn = document.getElementById('dupMerge');
      const replaceBtn = document.getElementById('dupReplace');
      const cancelBtn = document.getElementById('dupCancel');
      if (mergeBtn) mergeBtn.onclick = () => { if (!resolved) { resolved = true; clearTimeout(_timeout); restore(); resolve('merge'); } };
      if (replaceBtn) replaceBtn.onclick = () => { if (!resolved) { resolved = true; clearTimeout(_timeout); restore(); resolve('replace'); } };
      if (cancelBtn) cancelBtn.onclick = () => { if (!resolved) { resolved = true; clearTimeout(_timeout); restore(); resolve('cancel'); } };
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    if (dup.idx >= _draftItems.length) continue;
    if (choice === 'merge') {
      _draftItems[dup.idx].quantity = mergedQty;
    } else if (choice === 'replace') {
      // 새 수량 유지 (이미 draft에 있음)
    } else if (choice === 'cancel') {
      _draftItems.splice(dup.idx, 1);
    } else if (choice === 'timeout') {
      _draftItems.splice(dup.idx, 1);
      addResult(dup.item_name, '⏰ 30초 무응답 — 입력이 자동 종료되었습니다.', 'warn');
    }
  }
  if (_draftItems.length) {
    showReviewPanel(rawText);
  } else {
    cancelReview();
  }
}

// OpenAI 음성 인식 (gpt-4o-mini-transcribe)
let _micActive = false;
let _micCountdown = null;
let _micShouldStop = false;
let _micTimeout = parseInt(localStorage.getItem('zk_mic_timeout') || '10');
let _micRemaining = 0;
let _mediaRecorder = null;
let _audioChunks = [];

function toggleMic() {
  localStorage.setItem('zk_mic_used', 'true');
  const hint = document.getElementById('micHint');
  if (hint) hint.remove();

  if (_micActive) {
    _micShouldStop = true;
    _stopRecording();
    return;
  }

  // 마이크 권한 요청 + 녹음 시작
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      _micShouldStop = false;
      _micActive = true;
      _audioChunks = [];

      const btn = document.getElementById('micBtn');
      btn.classList.add('rec');

      // MediaRecorder 시작
      _mediaRecorder = new MediaRecorder(stream, { mimeType: _getAudioMimeType() });
      _mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) _audioChunks.push(e.data);
      };
      _mediaRecorder.onstop = () => {
        // 스트림 트랙 정리
        stream.getTracks().forEach(t => t.stop());
        // 오디오 데이터가 있으면 변환 요청
        if (_audioChunks.length > 0 && !_micShouldStop) {
          _transcribeAudio();
        } else if (_audioChunks.length > 0) {
          // 수동 정지 (버튼 탭) — 변환 진행
          _transcribeAudio();
        }
      };

      _mediaRecorder.start(500); // 0.5초 간격으로 chunk 수집
      _startMicCountdown();

      // placeholder 힌트
      const inp = document.getElementById('nlInput');
      inp.dataset.prevPlaceholder = inp.placeholder;
      inp.placeholder = '🎤 말씀하세요...';
    })
    .catch(err => {
      showToast('마이크 접근 불가: ' + err.message);
    });
}

function _getAudioMimeType() {
  // 브라우저 호환성: webm > mp4 > wav
  if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
  if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
  if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
  return 'audio/wav';
}

function _stopRecording() {
  if (_mediaRecorder && _mediaRecorder.state !== 'inactive') {
    _mediaRecorder.stop();
  }
  _stopMicUI();
}

async function _transcribeAudio() {
  const inp = document.getElementById('nlInput');
  const btn = document.getElementById('nlSendBtn');
  const btnTxt = document.getElementById('nlBtnTxt');

  // 변환 중 표시
  inp.placeholder = '변환 중...';
  btn.disabled = true;
  btnTxt.innerHTML = '<span class="spin"></span>';

  try {
    const mimeType = _audioChunks[0]?.type || 'audio/webm';
    const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('wav') ? 'wav' : 'webm';
    const blob = new Blob(_audioChunks, { type: mimeType });

    // 너무 짧은 녹음 (0.5초 미만) 무시
    if (blob.size < 5000) {
      inp.placeholder = inp.dataset.prevPlaceholder || '말하거나 입력하세요';
      btn.disabled = false;
      btnTxt.textContent = '입력';
      return;
    }

    const formData = new FormData();
    formData.append('file', blob, 'recording.' + ext);

    const response = await fetch('/api/transcribe', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || 'API 오류 ' + response.status);
    }

    const data = await response.json();
    const text = (data.text || '').trim();

    if (text) {
      inp.value = text;
      inp.placeholder = inp.dataset.prevPlaceholder || '말하거나 입력하세요';
      btn.disabled = false;
      btnTxt.textContent = '입력';
      // 자동 전송
      setTimeout(() => handleNaturalInput(), 200);
    } else {
      inp.placeholder = inp.dataset.prevPlaceholder || '말하거나 입력하세요';
      btn.disabled = false;
      btnTxt.textContent = '입력';
      showToast('음성을 인식하지 못했습니다');
    }
  } catch (e) {
    console.error('음성 변환 오류:', e);
    inp.placeholder = inp.dataset.prevPlaceholder || '말하거나 입력하세요';
    btn.disabled = false;
    btnTxt.textContent = '입력';
    showToast('음성 변환 실패: ' + e.message);
  }
}

function _startMicCountdown() {
  const btn = document.getElementById('micBtn');
  _micRemaining = _micTimeout;
  btn.innerHTML = '<div class="mic-wave"><div class="mic-wave-bar"></div><div class="mic-wave-bar"></div><div class="mic-wave-bar"></div></div><span class="mic-countdown" style="position:absolute;bottom:-18px;font-size:11px;color:var(--red);font-weight:700">' + _micRemaining + '</span>';
  _micCountdown = setInterval(() => {
    _micRemaining--;
    if (_micRemaining <= 0) {
      _stopRecording();
      return;
    }
    btn.innerHTML = '<div class="mic-wave"><div class="mic-wave-bar"></div><div class="mic-wave-bar"></div><div class="mic-wave-bar"></div></div><span class="mic-countdown" style="position:absolute;bottom:-18px;font-size:11px;color:var(--red);font-weight:700">' + _micRemaining + '</span>';
  }, 1000);
}

function _stopMic() {
  _micShouldStop = true;
  _stopRecording();
}

function _stopMicUI() {
  _micActive = false;
  const btn = document.getElementById('micBtn');
  btn.classList.remove('rec');
  btn.innerHTML = '🎤';
  if (_micCountdown) { clearInterval(_micCountdown); _micCountdown = null; }
  // placeholder 복원
  const inp = document.getElementById('nlInput');
  if (inp && inp.dataset.prevPlaceholder) {

  }
}

  if (_devMode) {
    const tb = document.getElementById('testTabBtn');
    if (tb) tb.style.display = '';
  }
  const logo = document.getElementById('logoBtn');
  if (!logo) return;
  logo.onclick = (e) => {
    e.preventDefault();
    _devTapCount++;
    clearTimeout(_devTapTimer);
    if (_devTapCount >= 5) {
      _devTapCount = 0;
      _devMode = !_devMode;
      localStorage.setItem('zk_dev_mode', _devMode);
      const tb = document.getElementById('testTabBtn');
      if (tb) tb.style.display = _devMode ? '' : 'none';
      showToast(_devMode ? '🔧 개발자 모드 ON' : '개발자 모드 OFF');
      if (!_devMode && document.getElementById('tab-test')?.classList.contains('active')) {
        switchTab('input', document.querySelector('.nav'));
      }
    }
    _devTapTimer = setTimeout(() => { _devTapCount = 0; }, 1500);
  };
})();

/* ── 시작 ── */
// 마이크 힌트: 한번도 안 쓴 사용자에게 표시
(function initMicHint() {
  if (localStorage.getItem('zk_mic_used')) return;
  setTimeout(() => {
    const wrapper = document.getElementById('micBtn')?.parentElement;
    if (!wrapper) return;
    const hint = document.createElement('div');
    hint.className = 'mic-hint';
    hint.id = 'micHint';
    hint.textContent = '말로도 입력할 수 있어요';
    wrapper.appendChild(hint);
  }, 2000);
})();

// 마지막 입력 반복
let _lastRawInput = localStorage.getItem('zk_last_input') || '';

function _saveLastInput(raw) {
  _lastRawInput = raw;
  localStorage.setItem('zk_last_input', raw);
  _updateLastInputChip();
}

function _updateLastInputChip() {
  const row = document.getElementById('lastInputRow');
  const chip = document.getElementById('lastInputChip');
  if (!row || !chip) return;
  if (_lastRawInput) {
    chip.textContent = '↩ ' + _lastRawInput;
    row.style.display = '';
  } else {
    row.style.display = 'none';
  }
}

function _fillLastInput() {
  const inp = document.getElementById('nlInput');
  if (inp && _lastRawInput) {
    inp.value = _lastRawInput;
    inp.focus();
  }
}

setTimeout(() => _updateLastInputChip(), 600);

setTimeout(()=>init(), 500);
</script>
