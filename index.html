<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>ZeroKitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f1; --surface:#fff; --surface2:#e8ede9; --border:#d4ddd6;
  --text:#1a2b1e; --dim:#4a6650; --muted:#8aa090;
  --accent:#1a7a4a; --accent-lt:#e6f4ec; --accent-dim:rgba(26,122,74,.1);
  --warn:#c0540a; --warn-dim:rgba(192,84,10,.1); --red:#d93025;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
/* 헤더 */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:8px;height:52px;flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{font-size:18px;font-weight:700;color:var(--accent)}
.store-nm{font-size:12px;color:var(--muted);font-weight:500}
.navs{display:flex;gap:5px;margin-left:auto}
.nav{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* 탭 */
.tab-wrap{flex:1;overflow:hidden}
.tab{display:none;height:calc(100dvh - 52px);overflow-y:auto;padding:14px 14px 24px;flex-direction:column;gap:12px}
.tab.active{display:flex}
/* 공통 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:12px}
/* 입력탭 — 마이크 */
.mic-zone{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px}
.mic-btn{width:76px;height:76px;border-radius:50%;border:2.5px solid var(--border);background:var(--surface2);font-size:28px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mic-btn.rec{border-color:var(--warn);background:var(--warn-dim);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,84,10,.3)}50%{box-shadow:0 0 0 12px rgba(192,84,10,0)}}
.mic-st{font-size:13px;color:var(--muted);font-weight:500;text-align:center}
.mic-st.rec{color:var(--warn)}
.mic-im{font-size:13px;color:var(--accent);font-style:italic;min-height:18px;text-align:center}
.dur-row{display:flex;align-items:center;gap:8px}
.dur-lbl{font-size:12px;color:var(--muted)}
.dur-btns{display:flex;gap:5px}
.dur{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.dur.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
/* 텍스트 입력 */
.inp-row{display:flex;gap:8px}
.txt-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.txt-inp:focus{border-color:var(--accent)}
.txt-inp::placeholder{color:var(--muted);font-size:13px}
.send-btn{padding:12px 18px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.send-btn:disabled{opacity:.5}
/* 결과 */
.res-hdr{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;padding:2px 0}
.res-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:12px;padding:11px 13px}
.res-card.ok{border-left-color:var(--accent)}
.res-card.warn{border-left-color:var(--warn)}
.res-card.err{border-left-color:var(--red)}
.res-raw{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.res-msg{font-size:14px;font-weight:600;line-height:1.4}
.res-time{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
/* 재고 그리드 */
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 11px;display:flex;flex-direction:column;gap:5px}
.inv-card.low{border-left:3px solid var(--warn)}
.inv-card.zero{border-left:3px solid var(--red)}
.inv-name{font-size:14px;font-weight:600;line-height:1.3}
.inv-qty{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.inv-qty.low{color:var(--warn)}
.inv-qty.zero{color:var(--red)}
.inv-unit{font-size:13px;color:var(--dim)}
/* 발주 */
.ord-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:12px;padding:13px}
.ord-name{font-size:15px;font-weight:600}
.ord-detail{font-size:13px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace}
/* 테스트 패널 */
.json-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text);outline:none;resize:vertical;min-height:160px;line-height:1.5}
.json-inp:focus{border-color:var(--accent)}
.json-result{background:#1a2b1e;border-radius:8px;padding:14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#7fffb0;white-space:pre-wrap;word-break:break-all;min-height:80px;max-height:300px;overflow-y:auto}
.tpl-btns{display:flex;gap:6px;flex-wrap:wrap}
.tpl{padding:6px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent-lt);color:var(--accent);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
/* 공통 버튼 */
.btn-run{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-run:disabled{opacity:.5}
/* no item */
.no-item{text-align:center;padding:40px;color:var(--muted);font-size:14px;grid-column:1/-1}
/* 발주 그룹 */
.ord-vendor-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:0}
.ord-vendor-hdr{background:var(--accent-lt);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ord-vendor-name{font-size:14px;font-weight:700;color:var(--accent)}
.ord-method-badge{font-size:12px;color:var(--dim);margin-left:6px}
.ord-method-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;cursor:pointer}
.ord-item-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ord-item-name{font-size:14px;font-weight:600}
.ord-item-qty{font-size:13px;color:var(--dim)}
.ord-item-qty strong{color:var(--warn);font-weight:700}

/* pending 카드 */
.pending-card { border-left-color: var(--warn) !important; }
.pending-bar-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin: 8px 0 4px; overflow: hidden; }
.pending-bar { height: 100%; background: var(--warn); border-radius: 2px; width: 0%; transition: width 1s linear; }
.pending-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-pend-cancel { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; }
.btn-pend-edit   { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: inherit; font-size: 12px; cursor: pointer; }
.btn-pend-now    { padding: 6px 12px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
/* 발주 실행 버튼 */
.ord-action-row { padding: 10px 14px; border-top: 1px solid var(--border); }
.ord-action-btn { padding: 10px 20px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.ord-action-btn.sms   { background: #1a7a4a; color: #fff; }
.ord-action-btn.kakao { background: #fee500; color: #191919; }
.ord-action-btn.call  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* 토스트 */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:500;color:var(--bg);transition:transform .25s ease;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .6s linear infinite;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <span class="logo">ZeroKitchen</span>
  <span class="store-nm" id="storeNm">로딩 중...</span>
  <div class="navs">
    <button class="nav active" onclick="switchTab('input',this)">입력</button>
    <button class="nav" onclick="switchTab('inventory',this)">재고</button>
    <button class="nav" onclick="switchTab('order',this)">발주</button>
    <button class="nav" onclick="switchTab('test',this)">테스트</button>
  </div>
</div>

<div class="tab-wrap">

<!-- 입력탭 -->
<div id="tab-input" class="tab active">
  <div class="mic-zone">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div class="mic-st" id="micSt">탭하면 음성 입력 (15초)</div>
    <div class="mic-im" id="micIm"></div>
    <div class="dur-row">
      <span class="dur-lbl">녹음 시간</span>
      <div class="dur-btns">
        <button class="dur" onclick="setDur(10)">10초</button>
        <button class="dur active" onclick="setDur(15)">15초</button>
        <button class="dur" onclick="setDur(30)">30초</button>
        <button class="dur" onclick="setDur(60)">60초</button>
      </div>
    </div>
  </div>
  <div class="inp-row">
    <input class="txt-inp" id="mainInp" type="text"
      placeholder="예: 브로콜리 세 봉지 새우 두 팩" autocomplete="off" enterkeyhint="send">
    <button class="send-btn" id="mainSend" onclick="handleVoiceInput()">입력</button>
  </div>
  <div class="res-hdr">처리 결과</div>
  <div id="resList"></div>
</div>

<!-- 재고탭 -->
<div id="tab-inventory" class="tab">
  <div style="display:flex;gap:8px;align-items:center">
    <input id="invSearch" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--text);outline:none" placeholder="품목명 검색..." oninput="renderInventory()">
    <select id="invFilter" onchange="renderInventory()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none">
      <option value="all">전체</option>
      <option value="low_stock">부족만</option>
    </select>
    <span id="invCount" style="font-size:12px;color:var(--muted);white-space:nowrap"></span>
  </div>
  <div class="inv-grid" id="invGrid"></div>
</div>

<!-- 발주탭 -->
<div id="tab-order" class="tab">
  <div id="orderList"><div class="no-item">로딩 중...</div></div>
</div>

<!-- 테스트 패널 -->
<div id="tab-test" class="tab">
  <div class="card">
    <div class="card-title">템플릿</div>
    <div class="tpl-btns">
      <button class="tpl" onclick="loadTpl('update')">재고 입력</button>
      <button class="tpl" onclick="loadTpl('read_all')">전체 조회</button>
      <button class="tpl" onclick="loadTpl('read_low')">부족 조회</button>
      <button class="tpl" onclick="loadTpl('order')">발주 계산</button>
      <button class="tpl" onclick="loadTpl('stock_config')">기준 설정</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">JSON 직접 실행</div>
    <textarea class="json-inp" id="jsonInp" spellcheck="false"></textarea>
    <button class="btn-run" id="runBtn" onclick="runJson()">▶ 실행</button>
  </div>
  <div class="card">
    <div class="card-title">결과</div>
    <div class="json-result" id="jsonResult">결과가 여기에 표시됩니다.</div>
  </div>
</div>

</div><!-- /tab-wrap -->

<div id="toast"></div>

<script>
const SUPABASE_URL='https://pmdkmiayyZailcnmjhyo.supabase.co';
const SUPABASE_KEY='sb_publishable_bkRZfA2drD_M6dMQjRiriQ_EP3lCqO8';
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ════════════════════════════════════════════════════════
   전역 상태
════════════════════════════════════════════════════════ */
let SID = null;         // store_id
let _items = [];        // 품목 캐시
let _pendingOps = [];   // pending 작업 큐 { id, req, timer, el }
let _pendingSeq = 0;
let _vendors = [];      // 거래처 캐시

/* ════════════════════════════════════════════════════════
   초기화
════════════════════════════════════════════════════════ */
async function init() {
  try {
    const { data: stores } = await db.from('stores').select('*').limit(1);
    if (stores?.length) {
      SID = stores[0].store_id;
      document.getElementById('storeNm').textContent = stores[0].store_name;
    }
    await refreshItems();
  } catch(e) {
    showToast('초기화 실패: ' + e.message);
  }
}

async function refreshItems() {
  const [r1, r2] = await Promise.allSettled([
    db.from('items').select('*').eq('store_id', SID).order('item_name'),
    db.from('vendors').select('*').eq('store_id', SID)
  ]);
  if (r1.status === 'fulfilled' && r1.value.data) _items = r1.value.data;
  if (r2.status === 'fulfilled' && r2.value.data) _vendors = r2.value.data;
}

/* ════════════════════════════════════════════════════════
   ★ processRequest — ZeroKitchen 유일한 실행 입구
════════════════════════════════════════════════════════ */
async function processRequest(json) {
  try {
    switch (json.request_type) {

      /* ── 재고 입력 ── */
      case 'inventory_update': {
        if (!json.items?.length) {
          return { status: 'error', response_type: 'inventory_update_result',
                   message: 'items 배열이 없습니다.' };
        }
        const updated = [];
        const errors  = [];

        for (const req of json.items) {
          const name = req.name?.trim();
          const qty  = Number(req.quantity);
          const unit = req.unit || '';

          if (!name || isNaN(qty)) {
            errors.push({ name, reason: 'name 또는 quantity 누락' });
            continue;
          }

          // 기존 품목 찾기 (정확 일치)
          let item = _items.find(it =>
            it.item_name === name ||
            it.item_name.replace(/\s/g,'') === name.replace(/\s/g,'')
          );

          if (item) {
            // 기존 품목 — current_qty 업데이트
            const { error } = await db.from('items')
              .update({ current_qty: qty, unit: unit || item.unit,
                        updated_at: new Date().toISOString() })
              .eq('item_id', item.item_id);

            if (error) { errors.push({ name, reason: error.message }); continue; }

            // kitchen_operations 이력 기록
            await db.from('kitchen_operations').insert({
              store_id: SID, item_id: item.item_id, item_name: item.item_name,
              action_type: json.action_type || 'stock_check', quantity: qty, unit: unit || item.unit,
              qty_before: item.current_qty, qty_after: qty,
              input_method: json._source || 'api', raw_text: JSON.stringify(req)
            });

            // 캐시 업데이트
            item.current_qty = qty;
            if (unit) item.unit = unit;
            updated.push({ name: item.item_name, quantity: qty, unit: item.unit });

          } else {
            // 신규 품목 — items에 추가
            const { data: newItem, error } = await db.from('items').insert({
              store_id: SID, item_name: name, unit: unit || '개',
              pack_factor: 1, target_qty: 0, current_qty: qty
            }).select().single();

            if (error) { errors.push({ name, reason: error.message }); continue; }

            // kitchen_operations 이력 기록
            await db.from('kitchen_operations').insert({
              store_id: SID, item_id: newItem.item_id, item_name: name,
              action_type: json.action_type || 'stock_check', quantity: qty, unit: unit || '개',
              qty_before: null, qty_after: qty,
              input_method: json._source || 'api', raw_text: JSON.stringify(req)
            });

            _items.push(newItem);
            updated.push({ name, quantity: qty, unit: unit || '개', is_new: true });
          }
        }

        return {
          status: errors.length === 0 ? 'success' : 'partial',
          response_type: 'inventory_update_result',
          updated_items: updated,
          errors: errors.length ? errors : undefined,
          message: `${updated.length}개 항목 업데이트${errors.length ? `, ${errors.length}개 실패` : ''}`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 재고 조회 ── */
      case 'inventory_read': {
        await refreshItems();
        const filter = json.filter || 'all';
        let items = [..._items];

        if (filter === 'low_stock') {
          items = items.filter(it =>
            Number(it.current_qty) < Number(it.target_qty)
          );
        } else if (filter === 'specific' && json.names?.length) {
          items = items.filter(it =>
            json.names.some(n => it.item_name === n ||
              it.item_name.replace(/\s/g,'') === n.replace(/\s/g,''))
          );
        }

        return {
          status: 'success',
          response_type: 'inventory_state',
          items: items.map(it => ({
            name:     it.item_name,
            quantity: Number(it.current_qty),
            unit:     it.unit || '',
            target:   Number(it.target_qty)
          })),
          message: `${items.length}개 항목 반환 (filter: ${filter})`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 발주 계산 ── */
      case 'order_generate': {
        await refreshItems();
        const criteria = json.criteria || 'below_threshold';

        // 발주 필요 품목 추출
        const needItems = _items
          .filter(it => Number(it.current_qty) < Number(it.target_qty))
          .map(it => ({
            name:          it.item_name,
            current_qty:   Number(it.current_qty),
            target_qty:    Number(it.target_qty),
            suggested_qty: Number(it.target_qty) - Number(it.current_qty),
            unit:          it.unit || '',
            vendor_id:     it.vendor_id || null,
            vendor:        _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || null
          }));

        if (!needItems.length) {
          return {
            status: 'success',
            response_type: 'order_suggestion',
            items: [],
            groups: [],
            text: '발주 필요 품목이 없습니다.',
            message: '발주 필요 품목 없음',
            timestamp: new Date().toISOString()
          };
        }

        // 거래처 기준 그룹화
        const groupMap = new Map();

        for (const it of needItems) {
          const key = it.vendor || '거래처 미지정';
          if (!groupMap.has(key)) groupMap.set(key, []);
          groupMap.get(key).push(it);
        }

        // groups 배열 생성
        const groups = [...groupMap.entries()].map(([vendor, items]) => ({
          vendor,
          items: items.map(it => ({
            name:          it.name,
            suggested_qty: it.suggested_qty,
            unit:          it.unit,
            current_qty:   it.current_qty,
            target_qty:    it.target_qty
          }))
        }));

        // Vita가 바로 출력할 수 있는 텍스트 생성
        const today = new Date().toLocaleDateString('ko-KR', {
          month: 'long', day: 'numeric', weekday: 'short'
        });
        let text = `[${today} 발주 필요]
`;

        for (const g of groups) {
          text += `
■ ${g.vendor}
`;
          for (const it of g.items) {
            text += `- ${it.name} ${it.suggested_qty}${it.unit}
`;
          }
        }

        text = text.trim();

        return {
          status: 'success',
          response_type: 'order_suggestion',
          items: needItems,   // 전체 플랫 목록 (기존 호환)
          groups,             // 거래처 기준 그룹
          text,               // Vita 즉시 출력용 텍스트
          message: `발주 필요 품목 ${needItems.length}개 / 거래처 ${groups.length}곳`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 재고 기준 설정 ── */
      case 'set_stock_config': {
        if (!json.items?.length) {
          return { status: 'error', response_type: 'set_stock_config_result',
                   message: 'items 배열이 없습니다.' };
        }
        const updated = [];
        for (const req of json.items) {
          const name = req.name?.trim();
          if (!name) continue;
          const item = _items.find(it =>
            it.item_name === name ||
            it.item_name.replace(/\s/g,'') === name.replace(/\s/g,'')
          );
          if (!item) { updated.push({ name, status: '품목 없음' }); continue; }

          const patch = {};
          if (req.min_stock  !== undefined) patch.min_stock   = Number(req.min_stock);
          if (req.target_stock !== undefined) patch.target_stock = Number(req.target_stock);
          // target_qty도 동기화
          if (req.target_stock !== undefined) patch.target_qty = Number(req.target_stock);

          if (Object.keys(patch).length) {
            await db.from('items').update(patch).eq('item_id', item.item_id);
            Object.assign(item, patch);
            updated.push({ name: item.item_name, ...patch, status: '설정 완료' });
          }
        }
        return {
          status: 'success',
          response_type: 'set_stock_config_result',
          updated_items: updated,
          message: `${updated.length}개 재고 기준 설정 완료`,
          timestamp: new Date().toISOString()
        };
      }

      default:
        return {
          status: 'error',
          response_type: 'unknown',
          message: `알 수 없는 request_type: ${json.request_type}`
        };
    }
  } catch(e) {
    return { status: 'error', response_type: 'exception', message: e.message };
  }
}

/* ════════════════════════════════════════════════════════
   음성 입력 — 내부적으로 processRequest 호출
════════════════════════════════════════════════════════ */
let rec=null, isRec=false, mTimer=null, mDur=15, _lastT='', _sesT=new Set();

// 텍스트를 파싱해서 inventory_update JSON으로 변환
function textToRequest(text) {
  const UNITS = ['개','봉지','봉','박스','케이스','팩','캔','통','병','킬로','kg','인분','장','묶음'];
  const QW = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10,한:1,두:2,세:3,네:4};

  // 전처리
  let s = text.trim();
  s = s.replace(/(\d)(봉지|봉|박스|팩|캔|통|병|개|킬로|kg)/g, '$1 $2');
  const qp = Object.keys(QW).sort((a,b)=>b.length-a.length).join('|');
  s = s.replace(new RegExp('('+qp+')(봉지|봉|박스|팩|캔|통|병|개|킬로|kg)','g'), '$1 $2');

  // 세그먼트 분리
  const segs = s.split(/\s+(?:하고|이랑|랑|그리고)\s+|,\s*/);
  const items = [];

  for (const seg of segs) {
    const tokens = seg.trim().split(/\s+/);
    let name='', qty=null, unit='';

    for (const tok of tokens) {
      if (UNITS.includes(tok)) { unit = tok; continue; }
      const n = parseFloat(tok);
      if (!isNaN(n)) { qty = n; continue; }
      if (QW[tok] !== undefined) { qty = QW[tok]; continue; }
      name += (name ? ' ' : '') + tok;
    }

    // 조사 제거
    name = name.replace(/(을|를|은|는|이|가)$/, '').trim();

    if (name && qty !== null) {
      items.push({ name, quantity: qty, unit: unit || '개' });
    } else if (name) {
      items.push({ name, quantity: 1, unit: unit || '개' });
    }
  }

  if (!items.length) return null;
  return { request_type: 'inventory_update', items, _source: 'voice' };
}

async function handleVoiceInput() {
  const inp = document.getElementById('mainInp');
  const raw = inp.value.trim();
  if (!raw) return;

  const btn = document.getElementById('mainSend');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';

  try {
    const req = textToRequest(raw);
    if (!req) {
      addResult(raw, '❌ 품목을 인식하지 못했습니다', 'err');
      return;
    }

    // inventory_update → pending 10초 대기
    if (req.request_type === 'inventory_update') {
      addPending(raw, req);
      inp.value = '';
      return;
    }

    const result = await processRequest(req);
    if (result.status === 'success' || result.status === 'partial') {
      const lines = result.updated_items.map(it =>
        `${it.is_new ? '🆕' : '✅'} ${it.name} ${it.quantity}${it.unit}`
      );
      if (result.errors?.length) {
        result.errors.forEach(e => lines.push(`❌ ${e.name}: ${e.reason}`));
      }
      addResult(raw, lines.join('\n'), result.status === 'success' ? 'ok' : 'warn');
      inp.value = '';
      renderInventory();
    } else {
      addResult(raw, '❌ ' + result.message, 'err');
    }
  } finally {
    btn.disabled = false; btn.textContent = '입력';
  }
}

/* ── 음성 인식 ── */
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR(); r.lang='ko-KR'; r.continuous=false; r.interimResults=true;
  r.onresult = (e) => {
    let fT='', iT='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      const t = e.results[i][0].transcript.trim();
      if (e.results[i].isFinal) fT=t; else iT=t;
    }
    const im = document.getElementById('micIm');
    if (im) im.textContent = iT;
    if (fT && fT !== _lastT && !_sesT.has(fT)) {
      _lastT=fT; _sesT.add(fT);
      const inp = document.getElementById('mainInp');
      const ex = inp.value.trim();
      inp.value = ex ? ex+' '+fT : fT;
      resetMTimer();
    }
  };
  r.onerror = (e) => {
    document.getElementById('micIm').textContent = '';
    if (e.error==='no-speech'||e.error==='aborted') return;
    stopMic(); showToast('음성 인식 오류');
  };
  r.onend = () => {
    document.getElementById('micIm').textContent = '';
    if (isRec) setTimeout(()=>{ try{r.start();}catch(_){} }, 80);
  };
  return r;
}

function toggleMic() {
  if (isRec) {
    const text = document.getElementById('mainInp').value.trim();
    stopMic(); if (text) handleVoiceInput(); return;
  }
  _lastT=''; _sesT=new Set();
  rec = initSpeech();
  if (!rec) { showToast('음성 인식 미지원'); return; }
  isRec=true;
  document.getElementById('micBtn').classList.add('rec');
  const ms = document.getElementById('micSt');
  ms.textContent='듣는 중... '+mDur+'초'; ms.classList.add('rec');
  rec.start(); resetMTimer();
}

function stopMic() {
  isRec=false; clearTimeout(mTimer); mTimer=null;
  document.getElementById('micBtn').classList.remove('rec');
  const ms = document.getElementById('micSt');
  ms.textContent='탭하면 음성 입력 ('+mDur+'초)'; ms.classList.remove('rec');
  document.getElementById('micIm').textContent = '';
  if (rec) { try{rec.stop();}catch(_){} }
}

function resetMTimer() {
  clearTimeout(mTimer); let rem=mDur;
  const ms = document.getElementById('micSt');
  mTimer = setInterval(()=>{
    rem--;
    if (ms && isRec) ms.textContent='듣는 중... '+rem+'초';
    if (rem<=0) {
      const text = document.getElementById('mainInp').value.trim();
      stopMic(); if (text) handleVoiceInput();
    }
  }, 1000);
}

function setDur(s) {
  mDur=s;
  document.querySelectorAll('.dur').forEach(b=>b.classList.toggle('active', b.textContent===s+'초'));
  document.getElementById('micSt').textContent='탭하면 음성 입력 ('+s+'초)';
}

/* ════════════════════════════════════════════════════════
   재고 탭 렌더링
════════════════════════════════════════════════════════ */
function renderInventory() {
  const grid  = document.getElementById('invGrid');
  const q     = document.getElementById('invSearch')?.value.trim() || '';
  const flt   = document.getElementById('invFilter')?.value || 'all';

  let items = [..._items];
  if (q) items = items.filter(it => it.item_name.includes(q));
  if (flt === 'low_stock') items = items.filter(it => Number(it.current_qty) < Number(it.target_qty));

  items.sort((a,b) => a.item_name < b.item_name ? -1 : 1);
  document.getElementById('invCount').textContent = items.length+'개';

  if (!items.length) { grid.innerHTML='<div class="no-item">품목 없음</div>'; return; }

  grid.innerHTML = items.map(it => {
    const qty = Number(it.current_qty);
    const tgt = Number(it.target_qty);
    const cls = qty<=0 ? 'zero' : qty<tgt ? 'low' : '';
    return `<div class="inv-card ${cls}">
      <div class="inv-name">${it.item_name}</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="inv-qty ${cls}">${qty}</span>
        <span class="inv-unit">${it.unit||''}</span>
      </div>
      ${tgt>0?`<div style="font-size:11px;color:var(--muted)">목표 ${tgt}</div>`:''}
    </div>`;
  }).join('');
}

    }

    // by_vendor 없으면 items로 폴백 그룹화

      ? result.by_vendor
      : [{ vendor: '거래처 미지정', order_method: 'unset', items: result.items }];

    let html = '';
    for (const vGroup of groups) {
      const m = ORDER_METHOD_LABEL[vGroup.order_method] || ORDER_METHOD_LABEL.unset;
      const vInfo = _vendors.find(v => v.vendor_name === vGroup.vendor);
      const vid = vInfo?.vendor_id || '';

      const orderLines = vGroup.items.map(it =>

      ).join('\n');

      // 실행 버튼
      let actionBtn = '';
      if (vGroup.order_method === 'sms') {
        actionBtn = `<button class="ord-action-btn sms" onclick="window.open('sms:?body=${smsBody}')">📲 문자 발주</button>`;
      } else if (vGroup.order_method === 'kakao') {
        const kakaoText = encodeURIComponent(`[발주 요청]\n${orderLines}\n확인 부탁드립니다.`);
        actionBtn = `<button class="ord-action-btn kakao" onclick="copyAndOpenKakao('${kakaoText}')">💬 카톡 발주</button>`;
      } else if (vGroup.order_method === 'call') {
        actionBtn = `<button class="ord-action-btn call" onclick="showToast('거래처 번호를 등록하면 바로 전화할 수 있습니다.')">📞 전화 발주</button>`;
      }

      html += `
      <div class="ord-vendor-group">
        <div class="ord-vendor-hdr">
          <div>
            <span class="ord-vendor-name">📦 ${vGroup.vendor}</span>
            <span class="ord-method-badge" id="mbadge_${vid}">${m.icon} ${m.label}</span>
          </div>
          ${vid ? `<select class="ord-method-sel" id="msel_${vid}" onchange="saveOrderMethod(${vid}, this.value)">
            <option value="app"   ${vGroup.order_method==='app'  ?'selected':''}>📱 앱 주문</option>
            <option value="kakao" ${vGroup.order_method==='kakao'?'selected':''}>💬 카카오톡</option>
            <option value="sms"   ${vGroup.order_method==='sms'  ?'selected':''}>📲 문자</option>
            <option value="call"  ${vGroup.order_method==='call' ?'selected':''}>📞 전화</option>
            <option value="unset" ${vGroup.order_method==='unset'?'selected':''}>⚙️ 미설정</option>
          </select>` : ''}
        </div>
        ${vGroup.items.map(it => `
          <div class="ord-item-row">
            <span class="ord-item-name">${it.name}</span>
            <span class="ord-item-qty">현재 ${it.current_qty}${it.unit} → <strong>${it.suggested_qty}${it.unit} 필요</strong></span>
          </div>`).join('')}
        ${actionBtn ? `<div class="ord-action-row">${actionBtn}</div>` : ''}
      </div>`;
    }
    list.innerHTML = html;

  } catch(e) {
    list.innerHTML = `<div class="no-item">❌ 오류: ${e.message}</div>`;
  }
}

function copyAndOpenKakao(encoded) {
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text).then(() => {
    showToast('발주 내용 복사됨 — 카카오톡에 붙여넣기 해주세요', 3000);
    setTimeout(() => {
      window.open('kakaotalk://');
    }, 800);
  }).catch(() => {
    showToast('복사 실패 — 직접 붙여넣어 주세요');
  });
}

async function saveOrderMethod(vendorId, method) {
  await db.from('vendors').update({ order_method: method }).eq('vendor_id', vendorId);
  const v = _vendors.find(x => x.vendor_id === vendorId);
  if (v) v.order_method = method;
  const m = ORDER_METHOD_LABEL[method] || ORDER_METHOD_LABEL.unset;
  const badge = document.getElementById('mbadge_'+vendorId);
  if (badge) badge.textContent = m.icon + ' ' + m.label;
  showToast('발주 방식 저장됨');
}

/* ════════════════════════════════════════════════════════
   Pending → Confirmed 10초 구조
════════════════════════════════════════════════════════ */
function addPending(raw, req) {
  const id = ++_pendingSeq;
  const list = document.getElementById('resList');

  const card = document.createElement('div');
  card.className = 'res-card pending-card';
  card.id = 'pc_' + id;

  const preview = req.items.map(it =>
    `${it.name} ${it.quantity}${it.unit}`
  ).join(', ');

  card.innerHTML = `
    <div class="res-raw">${raw}</div>
    <div class="res-msg pv-line">⏳ ${preview}</div>
    <div class="pending-bar-wrap"><div class="pending-bar" id="pb_${id}"></div></div>
    <div class="pending-actions">
      <button class="btn-pend-cancel" onclick="cancelPending(${id})">취소</button>
      <button class="btn-pend-edit"   onclick="editPending(${id})">수정</button>
      <button class="btn-pend-now"    onclick="confirmPending(${id})">지금 저장</button>
    </div>`;
  list.insertBefore(card, list.firstChild);

  // 10초 카운트다운
  let rem = 10;
  const bar = document.getElementById('pb_' + id);
  const timer = setInterval(async () => {
    rem--;
    if (bar) bar.style.width = ((10 - rem) / 10 * 100) + '%';
    if (rem <= 0) {
      clearInterval(timer);
      await confirmPending(id);
    }
  }, 1000);

  _pendingOps.push({ id, req, raw, timer, card });
}

async function confirmPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);

  const card = document.getElementById('pc_' + id);
  if (card) card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg" style="color:var(--muted)">저장 중...</div>`;

  const result = await processRequest(op.req);
  if (card) {
    if (result.status === 'success' || result.status === 'partial') {
      const lines = result.updated_items.map(it =>
        `${it.is_new ? '🆕' : '✅'} ${it.name} ${it.quantity}${it.unit}`
      ).join('<br>');
      card.className = 'res-card ok';
      card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg">${lines}</div><div class="res-time">${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div>`;
    } else {
      card.className = 'res-card err';
      card.innerHTML = `<div class="res-raw">${op.raw}</div><div class="res-msg">❌ ${result.message}</div>`;
    }
  }
  renderInventory();
}

function cancelPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);
  const card = document.getElementById('pc_' + id);
  if (card) card.remove();
  showToast('취소됨');
}

function editPending(id) {
  const op = _pendingOps.find(p => p.id === id);
  if (!op) return;
  clearInterval(op.timer);
  _pendingOps = _pendingOps.filter(p => p.id !== id);
  const card = document.getElementById('pc_' + id);
  if (card) card.remove();
  // 입력창에 원문 복원
  const inp = document.getElementById('mainInp');
  if (inp) { inp.value = op.raw; inp.focus(); }
  showToast('수정 후 다시 입력해 주세요');
}

let _tt=null;
function showToast(m, ms=2500) {
  const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),ms);
}
