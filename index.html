<script>
const SUPABASE_URL='https://pmdkmiayyZailcnmjhyo.supabase.co';
const SUPABASE_KEY='sb_publishable_bkRZfA2drD_M6dMQjRiriQ_EP3lCqO8';
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ════════════════════════════════════════════════════════
   전역 상태
════════════════════════════════════════════════════════ */
let SID = null;         // store_id
let _items = [];        // 품목 캐시
let _pendingOps = [];   // pending 작업 큐 { id, req, timer, el }
let _pendingSeq = 0;
let _vendors = [];      // 거래처 캐시
let _orderRequests = []; // 발주 요청 캐시

/*  order_requests 테이블 (Supabase SQL Editor에서 실행):
    CREATE TABLE IF NOT EXISTS order_requests (
      id          bigint GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
      store_id    bigint REFERENCES stores(store_id),
      item_id     bigint REFERENCES items(item_id),
      item_name   text NOT NULL,
      qty         numeric NOT NULL,
      unit        text DEFAULT '개',
      vendor_id   bigint REFERENCES vendors(vendor_id),
      status      text NOT NULL DEFAULT 'pending'
                  CHECK (status IN ('pending','done','cancelled')),
      created_at  timestamptz DEFAULT now(),
      updated_at  timestamptz DEFAULT now()
    );
    ALTER TABLE order_requests ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "order_requests_all" ON order_requests FOR ALL USING (true);
*/

/* ════════════════════════════════════════════════════════
   초기화
════════════════════════════════════════════════════════ */
async function init() {
  try {
    const { data: stores } = await db.from('stores').select('*').limit(1);
    if (stores?.length) {
      SID = stores[0].store_id;
      document.getElementById('storeNm').textContent = stores[0].store_name;
    }
    await refreshItems();
  } catch(e) {
    showToast('초기화 실패: ' + e.message);
  }
}

async function refreshItems() {
  const [r1, r2] = await Promise.allSettled([
    db.from('items').select('*').eq('store_id', SID).order('item_name'),
    db.from('vendors').select('*').eq('store_id', SID)
  ]);
  if (r1.status === 'fulfilled' && r1.value.data) _items = r1.value.data;
  if (r2.status === 'fulfilled' && r2.value.data) _vendors = r2.value.data;
}

/* ════════════════════════════════════════════════════════
   ★ processRequest — ZeroKitchen 유일한 실행 입구
════════════════════════════════════════════════════════ */
async function processRequest(json) {
  try {
    switch (json.request_type) {

      /* ── 재고 입력 ── */
      case 'inventory_update': {
        if (!json.items?.length) {
          return { status: 'error', response_type: 'inventory_update_result',
                   message: 'items 배열이 없습니다.' };
        }
        const updated = [];
        const errors  = [];

        for (const req of json.items) {
          const name = req.name?.trim();
          const qty  = Number(req.quantity);
          const unit = req.unit || '';

          if (!name || isNaN(qty)) {
            errors.push({ name, reason: 'name 또는 quantity 누락' });
            continue;
          }

          // 기존 품목 찾기 (정확 일치)
          let item = _items.find(it =>
            it.item_name === name ||
            it.item_name.replace(/\s/g,'') === name.replace(/\s/g,'')
          );

          if (item) {
            // action_type에 따라 수량 계산
            const action = req.action_type || json.action_type || 'stock_check';

            // ── 발주(order): 재고 변경 없이 order_requests에 기록 ──
            if (action === 'order') {
              // vendor_id: items 테이블 → item_vendor_map 기본거래처 순으로 조회
              let vid = item.vendor_id || null;
              if (!vid) {
                const { data: vmap } = await db.from('item_vendor_map')
                  .select('vendor_id').eq('item_id', item.item_id).eq('is_default', true).limit(1);
                if (vmap?.length) vid = vmap[0].vendor_id;
              }
              const { error } = await db.from('order_requests').insert({
                store_id: SID, item_id: item.item_id, item_name: item.item_name,
                qty: qty, unit: unit || item.unit,
                vendor_id: vid, status: 'pending'
              });
              if (error) { errors.push({ name, reason: error.message }); continue; }

              await db.from('kitchen_operations').insert({
                store_id: SID, item_id: item.item_id, item_name: item.item_name,
                action_type: 'order', quantity: qty, unit: unit || item.unit,
                qty_before: item.current_qty, qty_after: item.current_qty,
                input_method: json._source || 'api', raw_text: JSON.stringify(req)
              });

              updated.push({ name: item.item_name, quantity: item.current_qty, inputQty: qty, unit: item.unit, action: 'order' });
              continue;
            }

            const qtyBefore = item.current_qty;
            let newQty;
            if (action === 'inbound') {
              newQty = item.current_qty + qty;
            } else if (action === 'consume') {
              newQty = Math.max(0, item.current_qty - qty);
            } else {
              newQty = qty; // stock_check: 직접 설정
            }

            const { error } = await db.from('items')
              .update({ current_qty: newQty, unit: unit || item.unit,
                        updated_at: new Date().toISOString() })
              .eq('item_id', item.item_id);

            if (error) { errors.push({ name, reason: error.message }); continue; }

            // kitchen_operations 이력 기록
            await db.from('kitchen_operations').insert({
              store_id: SID, item_id: item.item_id, item_name: item.item_name,
              action_type: action, quantity: qty, unit: unit || item.unit,
              qty_before: qtyBefore, qty_after: newQty,
              input_method: json._source || 'api', raw_text: JSON.stringify(req)
            });

            // 캐시 업데이트
            item.current_qty = newQty;
            if (unit) item.unit = unit;
            updated.push({ name: item.item_name, quantity: newQty, inputQty: qty, unit: item.unit, action, item_id: item.item_id, qty_before: qtyBefore });

          } else {
            // 신규 품목 — items에 추가
            const newAction = req.action_type || json.action_type || 'stock_check';
            const initQty = newAction === 'order' ? 0 : qty;

            const { data: newItem, error } = await db.from('items').insert({
              store_id: SID, item_name: name, unit: unit || '개',
              pack_factor: 1, target_qty: 0, current_qty: initQty
            }).select().single();

            if (error) { errors.push({ name, reason: error.message }); continue; }

            // 발주면 order_requests에도 기록
            if (newAction === 'order') {
              await db.from('order_requests').insert({
                store_id: SID, item_id: newItem.item_id, item_name: name,
                qty: qty, unit: unit || '개', vendor_id: null, status: 'pending'
              });
            }

            await db.from('kitchen_operations').insert({
              store_id: SID, item_id: newItem.item_id, item_name: name,
              action_type: newAction, quantity: qty, unit: unit || '개',
              qty_before: null, qty_after: initQty,
              input_method: json._source || 'api', raw_text: JSON.stringify(req)
            });

            _items.push(newItem);
            updated.push({ name, quantity: initQty, inputQty: qty, unit: unit || '개', is_new: true, action: newAction });
          }
        }

        return {
          status: errors.length === 0 ? 'success' : 'partial',
          response_type: 'inventory_update_result',
          updated_items: updated,
          errors: errors.length ? errors : undefined,
          message: `${updated.length}개 항목 업데이트${errors.length ? `, ${errors.length}개 실패` : ''}`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 재고 조회 ── */
      case 'inventory_read': {
        await refreshItems();
        const filter = json.filter || 'all';
        let items = [..._items];

        if (filter === 'low_stock') {
          items = items.filter(it =>
            Number(it.current_qty) < Number(it.target_qty)
          );
        } else if (filter === 'specific' && json.names?.length) {
          items = items.filter(it =>
            json.names.some(n => it.item_name === n ||
              it.item_name.replace(/\s/g,'') === n.replace(/\s/g,''))
          );
        }

        return {
          status: 'success',
          response_type: 'inventory_state',
          items: items.map(it => ({
            name:     it.item_name,
            quantity: Number(it.current_qty),
            unit:     it.unit || '',
            target:   Number(it.target_qty)
          })),
          message: `${items.length}개 항목 반환 (filter: ${filter})`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 발주 계산 ── */
      case 'order_generate': {
        await refreshItems();
        const criteria = json.criteria || 'below_threshold';

        // 발주 필요 품목 추출
        const needItems = _items
          .filter(it => Number(it.current_qty) < Number(it.target_qty))
          .map(it => ({
            name:          it.item_name,
            current_qty:   Number(it.current_qty),
            target_qty:    Number(it.target_qty),
            suggested_qty: Number(it.target_qty) - Number(it.current_qty),
            unit:          it.unit || '',
            vendor_id:     it.vendor_id || null,
            vendor:        _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || null
          }));

        if (!needItems.length) {
          return {
            status: 'success',
            response_type: 'order_suggestion',
            items: [],
            groups: [],
            text: '발주 필요 품목이 없습니다.',
            message: '발주 필요 품목 없음',
            timestamp: new Date().toISOString()
          };
        }

        // 거래처 기준 그룹화
        const groupMap = new Map();

        for (const it of needItems) {
          const key = it.vendor || '거래처 미지정';
          if (!groupMap.has(key)) groupMap.set(key, []);
          groupMap.get(key).push(it);
        }

        // groups 배열 생성
        const groups = [...groupMap.entries()].map(([vendor, items]) => ({
          vendor,
          items: items.map(it => ({
            name:          it.name,
            suggested_qty: it.suggested_qty,
            unit:          it.unit,
            current_qty:   it.current_qty,
            target_qty:    it.target_qty
          }))
        }));

        // Vita가 바로 출력할 수 있는 텍스트 생성
        const today = new Date().toLocaleDateString('ko-KR', {
          month: 'long', day: 'numeric', weekday: 'short'
        });
        let text = `[${today} 발주 필요]
`;

        for (const g of groups) {
          text += `
■ ${g.vendor}
`;
          for (const it of g.items) {
            text += `- ${it.name} ${it.suggested_qty}${it.unit}
`;
          }
        }

        text = text.trim();

        return {
          status: 'success',
          response_type: 'order_suggestion',
          items: needItems,   // 전체 플랫 목록 (기존 호환)
          groups,             // 거래처 기준 그룹
          text,               // Vita 즉시 출력용 텍스트
          message: `발주 필요 품목 ${needItems.length}개 / 거래처 ${groups.length}곳`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 재고 기준 설정 ── */
      case 'set_stock_config': {
        if (!json.items?.length) {
          return { status: 'error', response_type: 'set_stock_config_result',
                   message: 'items 배열이 없습니다.' };
        }
        const updated = [];
        for (const req of json.items) {
          const name = req.name?.trim();
          if (!name) continue;
          const item = _items.find(it =>
            it.item_name === name ||
            it.item_name.replace(/\s/g,'') === name.replace(/\s/g,'')
          );
          if (!item) { updated.push({ name, status: '품목 없음' }); continue; }

          const patch = {};
          if (req.min_stock  !== undefined) patch.min_stock   = Number(req.min_stock);
          if (req.target_stock !== undefined) patch.target_stock = Number(req.target_stock);
          // target_qty도 동기화
          if (req.target_stock !== undefined) patch.target_qty = Number(req.target_stock);

          if (Object.keys(patch).length) {
            await db.from('items').update(patch).eq('item_id', item.item_id);
            Object.assign(item, patch);
            updated.push({ name: item.item_name, ...patch, status: '설정 완료' });
          }
        }
        return {
          status: 'success',
          response_type: 'set_stock_config_result',
          updated_items: updated,
          message: `${updated.length}개 재고 기준 설정 완료`,
          timestamp: new Date().toISOString()
        };
      }

      /* ── 품목 삭제 ── */
      case '_delete_item': {
        const name = json.item_name?.trim();
        if (!name) return { status:'error', response_type:'delete_result', message:'품목명이 없습니다.' };
        const item = _items.find(it => it.item_name === name || it.item_name.includes(name));
        if (!item) return { status:'warn', response_type:'delete_result', message:`"${name}" 품목을 찾을 수 없습니다.` };
        if (!confirm(`"${item.item_name}"을 삭제할까요?`)) return { status:'warn', response_type:'delete_result', message:'취소됨' };
        await db.from('items').delete().eq('item_id', item.item_id);
        _items = _items.filter(x => x.item_id !== item.item_id);
        return { status:'success', response_type:'delete_result', message:`"${item.item_name}" 삭제 완료`, timestamp: new Date().toISOString() };
      }

      /* ── 거래처 연결 추가 ── */
      case 'add_item_vendor': {
        const { item_name, vendor, is_default } = json;
        if (!item_name || !vendor) return { status:'error', response_type:'add_item_vendor_result', message:'item_name과 vendor가 필요합니다.' };
        const item = _items.find(it => it.item_name === item_name || it.item_name.replace(/\s/g,'') === item_name.replace(/\s/g,''));
        const vend = _vendors.find(v => v.vendor_name === vendor);
        if (!item) return { status:'error', response_type:'add_item_vendor_result', message:`품목 "${item_name}"을 찾을 수 없습니다.` };
        if (!vend) return { status:'error', response_type:'add_item_vendor_result', message:`거래처 "${vendor}"를 찾을 수 없습니다.` };
        // item_vendor_map에 추가
        const { data: existing } = await db.from('item_vendor_map').select('id').eq('item_id', item.item_id).eq('vendor_id', vend.vendor_id).limit(1);
        if (existing?.length) return { status:'warn', response_type:'add_item_vendor_result', message:`이미 연결된 거래처입니다.` };
        await db.from('item_vendor_map').insert({ item_id: item.item_id, vendor_id: vend.vendor_id, is_default: !!is_default, store_id: SID });
        if (is_default) {
          await db.from('item_vendor_map').update({ is_default: false }).eq('item_id', item.item_id).neq('vendor_id', vend.vendor_id);
        }
        return { status:'success', response_type:'add_item_vendor_result', message:`"${item_name}" ↔ "${vendor}" 거래처 연결 완료`, timestamp: new Date().toISOString() };
      }

      /* ── 거래처 업데이트 (기본값 변경) ── */
      case 'update_item_vendor': {
        const { item_name, vendor, set_as_default } = json;
        if (!item_name || !vendor) return { status:'error', response_type:'update_item_vendor_result', message:'item_name과 vendor가 필요합니다.' };
        const item = _items.find(it => it.item_name === item_name || it.item_name.replace(/\s/g,'') === item_name.replace(/\s/g,''));
        const vend = _vendors.find(v => v.vendor_name === vendor);
        if (!item || !vend) return { status:'error', response_type:'update_item_vendor_result', message:'품목 또는 거래처를 찾을 수 없습니다.' };
        const patch = { last_used_at: new Date().toISOString() };
        if (set_as_default) {
          await db.from('item_vendor_map').update({ is_default: false }).eq('item_id', item.item_id);
          patch.is_default = true;
        }
        await db.from('item_vendor_map').update(patch).eq('item_id', item.item_id).eq('vendor_id', vend.vendor_id);
        return { status:'success', response_type:'update_item_vendor_result', message:`"${item_name}" 거래처 "${vendor}"${set_as_default?' (기본값 설정)':' (최근 사용 업데이트)'} 완료`, timestamp: new Date().toISOString() };
      }

      /* ── 거래처 연결 해제 ── */
      case 'remove_item_vendor': {
        const { item_name, vendor } = json;
        if (!item_name || !vendor) return { status:'error', response_type:'remove_item_vendor_result', message:'item_name과 vendor가 필요합니다.' };
        const item = _items.find(it => it.item_name === item_name);
        const vend = _vendors.find(v => v.vendor_name === vendor);
        if (!item || !vend) return { status:'error', response_type:'remove_item_vendor_result', message:'품목 또는 거래처를 찾을 수 없습니다.' };
        await db.from('item_vendor_map').delete().eq('item_id', item.item_id).eq('vendor_id', vend.vendor_id);
        return { status:'success', response_type:'remove_item_vendor_result', message:`"${item_name}" ↔ "${vendor}" 연결 해제 완료`, timestamp: new Date().toISOString() };
      }

      default:
        return {
          status: 'error',
          response_type: 'unknown',
          message: `알 수 없는 request_type: ${json.request_type}`
        };
    }
  } catch(e) {
    return { status: 'error', response_type: 'exception', message: e.message };
  }
}

/* ════════════════════════════════════════════════════════
   음성 입력 — 내부적으로 processRequest 호출
════════════════════════════════════════════════════════ */
// 음성인식 제거됨 — Vita가 자연어 처리 담당

// ── 자연어 명령 감지 ──
// Vita가 없는 동안 기본 패턴 매칭으로 명령 처리
function detectCommand(text) {
  const s = text.trim();

  // 질문형 문장 → LLM fallback (품목 파싱하지 않음)
  const _questionPatterns = /[?？]$|^(이번|왜|어떻게|무슨|얼마나|뭐가|뭘|어떤|어디|언제|몇\s*번|얼마|뭐야)\b|(?:뭐야|뭘까|할까|인가요|인가|일까|나요|인지|건지|걸까)\s*[?？]?\s*$/;
  if (_questionPatterns.test(s) && !/(?:몇\s*(?:개|봉지?|박스|팩|캔|통|병|kg|g|장|묶음|롤|판|다발|단)\s*(?:남았|있어|있지|남아|남음|있나|있냐)|재고\s*(?:얼마|몇|확인|알려|뭐야|봐줘?)|얼마나\s*(?:남았|있어|남아)|얼마\s*(?:남았|있어|남아)|(?:발주|주문).+(?:뭐야|뭐|있어|해야|보여줘|알려줘|목록|필요)|뭐.+(?:발주|주문|시켜)|^(?:부족|떨어진))/.test(s)) {
    return { request_type: '_llm_question', text: s };
  }

  // 한글 자모만 있는 입력 차단
  if (/^[ㄱ-ㅎㅏ-ㅣ\s]+$/.test(s)) {
    return { request_type: '_invalid_jamo' };
  }

  // 설정 변경 감지 (값 포함): "칠리소스 거래처 식봄으로 설정", "양파 최소수량 5로 바꿔줘"
  const _cfgVendor = s.match(/^(.+?)\s+거래처[를을]?\s+(.+?)(?:으?로)\s*(?:바꿔\s*줘?|변경\s*해?\s*줘?|수정\s*해?\s*줘?|설정\s*해?\s*줘?|설정)\s*$/);
  if (_cfgVendor) {
    return { request_type: '_config_change', item_name: _cfgVendor[1].trim(), field: 'vendor', value: _cfgVendor[2].trim(), text: s };
  }
  const _cfgNum = s.match(/^(.+?)\s+(최소\s*수량|목표\s*수량|min|target)[를을]?\s+(\d+)(?:으?로)?\s*(?:바꿔\s*줘?|변경\s*해?\s*줘?|수정\s*해?\s*줘?|설정\s*해?\s*줘?|설정)\s*$/);
  if (_cfgNum) {
    const field = /최소|min/.test(_cfgNum[2]) ? 'min_stock' : 'target_qty';
    return { request_type: '_config_change', item_name: _cfgNum[1].trim(), field, value: parseInt(_cfgNum[3]), text: s };
  }
  // 값 없는 설정 변경: "브로콜리 거래처 바꿔줘"
  const _configMatch = s.match(/^(.+?)\s+(?:거래처|최소\s*수량|목표\s*수량|min|target)[를을]?(?:\s+.*?)?(?:바꿔\s*줘?|변경\s*해?\s*줘?|수정\s*해?\s*줘?|설정\s*해?\s*줘?|설정)\s*$/);
  if (_configMatch) {
    return { request_type: '_config_change', item_name: _configMatch[1].trim(), text: s };
  }

  // "발주" 또는 "재고" 단독 입력 → 해당 탭으로 이동
  if (/^발주\s*$/.test(s)) {
    return { request_type: '_switch_tab', tab: 'order' };
  }
  if (/^재고\s*$/.test(s)) {
    return { request_type: '_switch_tab', tab: 'inventory' };
  }

  // 발주 조회: "발주해야 되는 거 뭐야" / "발주 뭐야" / "뭐 발주해야 돼" / "발주 목록 보여줘"
  if (/발주|주문해야|시켜야/.test(s) && /뭐야|뭐|있어|해야|보여줘|알려줘|목록|필요/.test(s)) {
    return { request_type: 'order_generate', criteria: 'below_threshold' };
  }
  // "뭐 주문해야 해?" 패턴
  if (/뭐.*(주문|발주|시켜)/.test(s)) {
    return { request_type: 'order_generate', criteria: 'below_threshold' };
  }

  // 개별 품목 재고 조회: "치즈 몇 봉 남았지?" / "양파 몇 개 있어" / "토마토 재고 얼마나"
  const _uPat = '(?:개|봉지?|박스|팩|캔|통|병|kg|g|장|묶음|롤|판|다발|단)?';
  const itemQryRe = new RegExp(
    '^(.+?)\\s*(?:' +
      '몇\\s*' + _uPat + '\\s*(?:남았|있어|있지|남아|남음|남았지|있나|있냐|있을까|있나요)' +
      '|(?:재고|수량)\\s*(?:얼마|몇|확인|알려줘?|뭐야|봐줘?|보여줘?)' +
      '|얼마나\\s*(?:남았|있어|남아|있나)' +
      '|얼마\\s*(?:남았|있어|남아)' +
      '|(?:남았|있어)\\s*\\??' +
    ')[\\.\\s?!]*$'
  );
  // 동작어가 포함되지 않은 경우만 재고 조회로 인식 (혼합 입력 방지)
  const _hasActionWord = /(?:추가|입고|넣어|넣기|넣었어|빼기|빼|차감|사용|소비|소진|빠짐|받았어|들어왔어|썼어|뺐어|버렸|꺼냈)/.test(s);
  const itemQry = s.match(itemQryRe);
  if (itemQry && !_hasActionWord) {
    const name = itemQry[1].replace(/\s*(은|는|이|가|요|좀|지금)$/,'').trim();
    if (name) return { request_type: 'inventory_read', filter: 'specific', names: [name] };
  }

  // 전체 재고 조회: "재고 뭐야" / "지금 재고" / "재고 얼마나 남았어"
  if (!_hasActionWord && /재고.*(뭐야|알려줘|조회|확인|얼마|남았)|(뭐가|얼마나).*(있어|남았)/.test(s)) {
    return { request_type: 'inventory_read', filter: 'all' };
  }

  // 부족 재고 조회: "부족한 거 뭐야"
  if (/부족|없는.거|떨어진/.test(s)) {
    return { request_type: 'inventory_read', filter: 'low_stock' };
  }

  // 최소/목표 설정: "양파 최소 다섯 개 목표 10개"
  const stockCfg = s.match(/^(.+?)\s+최소\s+(\d+|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(?:개|봉지|봉|박스|팩)?(?:\s+목표\s+(\d+|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(?:개|봉지|봉|박스|팩)?)?/);
  if (stockCfg) {
    const QW = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10};
    const name = stockCfg[1].trim();
    const min  = QW[stockCfg[2]] ?? parseInt(stockCfg[2]);
    const tgt  = stockCfg[3] ? (QW[stockCfg[3]] ?? parseInt(stockCfg[3])) : min * 2;
    return { request_type: 'set_stock_config', items: [{ name, min_stock: min, target_stock: tgt }] };
  }

  // 목표만: "양파 목표 10개"
  const tgtOnly = s.match(/^(.+?)\s+목표\s+(\d+|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(?:개|봉지|봉|박스|팩)?/);
  if (tgtOnly) {
    const QW = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10};
    const name = tgtOnly[1].trim();
    const tgt  = QW[tgtOnly[2]] ?? parseInt(tgtOnly[2]);
    return { request_type: 'set_stock_config', items: [{ name, target_stock: tgt }] };
  }

  // 재고 설정: "우유 재고 5박스로 설정" / "치즈 재고 10개로 설정" / "토마토소스 8개로 맞춰줘"
  const QW_SET = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10};
  const stockSet = s.match(/^(.+?)\s+(?:재고\s+)?(\d+|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(?:개|봉지|봉|박스|팩|캔|통|병|kg|g|단|망|모)?\s*(?:으로|로)?\s*(?:설정|세팅|맞춰\s*줘|맞춰)/);
  if (stockSet) {
    const name = stockSet[1].replace(/\s*재고\s*$/, '').trim();
    const qty  = QW_SET[stockSet[2]] ?? parseInt(stockSet[2]);
    return {
      request_type: 'inventory_update',
      items: [{ name, quantity: qty, unit: '개' }]
    };
  }

  // 수량 변경: "치즈 두 개로 바꿔 줘" / "양파 5개로 수정"
  const fixQty = s.match(/^(.+?)\s+(\d+|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(?:개|봉지|봉|박스|팩|캔|통|병)?\s*(?:으로|로)?\s*(?:바꿔\s*줘|수정해\s*줘|바꿔|수정|변경|고쳐)/);
  if (fixQty) {
    const QW = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10};
    return {
      request_type: 'inventory_update',
      items: [{ name: fixQty[1].trim(), quantity: QW[fixQty[2]] ?? parseInt(fixQty[2]), unit: '개' }]
    };
  }

  // 삭제: "양파 빼 줘" / "양파 삭제"
  const del = s.match(/^(.+?)\s+(?:빼\s*줘|삭제|지워|없애)/);
  if (del) {
    // 삭제는 confirm 후 처리 — 직접 DB 삭제
    const name = del[1].trim();
    return { request_type: '_delete_item', item_name: name };
  }

  return null;
}

// ZeroKitchen은 자연어를 처리하지 않음
// 모든 입력은 JSON 형태여야 함 (Vita가 자연어 → JSON 변환 담당)

/* ════════════════════════════════════════════════════════
   자연어 입력 → Claude 파싱 → Table Review
════════════════════════════════════════════════════════ */

const UNITS_LIST = ['개','봉','봉지','박스','케이스','팩','캔','통','병','kg','g','인분','장','묶음','롤'];
const ACTION_LIST = [
  { value:'stock_check', label:'재고 입력' },
  { value:'inbound',     label:'입고' },
  { value:'consume',     label:'차감' },
  { value:'order',       label:'발주 요청' },
];

let _draftItems = [];  // 현재 검토 중인 draft
let _parseMeta  = { confidence: null, usedLLM: false }; // 파싱 메타데이터 (로그용)
let _sessionInputs = []; // 동일 품목 재입력 감지용 세션 이력

// 자연어 입력 처리
async function handleNaturalInput() {
  // 마이크 활성 중이면 즉시 종료 (중복 입력 방지)
  if (_micActive) {
    _micShouldStop = true;
    _stopMicUI();
  }
  const inp   = document.getElementById('nlInput');
  let   raw   = inp.value.trim();
  const btn   = document.getElementById('nlSendBtn');
  const btnTxt = document.getElementById('nlBtnTxt');
  if (!raw) return;
  _saveLastInput(raw);

  const _onInputTab = document.getElementById('tab-input').classList.contains('active');

  btn.disabled = true;
  btnTxt.innerHTML = '<span class="spin"></span>';

  // 로딩 표시
  const resList = document.getElementById('resList');
  const loadCard = document.createElement('div');
  loadCard.className = 'parsing-indicator';
  loadCard.id = 'parseLoading';
  loadCard.innerHTML = '<span class="spin" style="border-color:var(--accent-dim);border-top-color:var(--accent)"></span> 파싱 중...';
  resList.appendChild(loadCard);
  const chatArea = document.getElementById('chatArea');
  if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;

  try {
    // 0차: 명령 감지 (발주 조회, 재고 조회 등 — 품목 파싱 불필요)
    if (!_items.length) await refreshItems();
    const cmd = detectCommand(raw);
    if (cmd) {
      document.getElementById('parseLoading')?.remove();
      inp.value = '';

      // 탭 이동 명령
      if (cmd.request_type === '_switch_tab') {
        const tabBtn = [...document.querySelectorAll('.nav')].find(b => {
          const map = { order: '발주', inventory: '재고' };
          return b.textContent.trim() === map[cmd.tab];
        });
        if (tabBtn) switchTab(cmd.tab, tabBtn);
        addResult(raw, `📋 ${cmd.tab === 'order' ? '발주' : '재고'} 탭으로 이동합니다.`, 'ok');
        return;
      }

      // 자모만 입력
      if (cmd.request_type === '_invalid_jamo') {
        addResult(raw, '❌ 품목명을 정확히 입력해 주세요. (예: 양파 3개 입고)', 'err');
        return;
      }

      // 질문형 → LLM fallback
      if (cmd.request_type === '_llm_question') {
        try {
          const answer = await askClaudeQuestion(raw);
          addResult(raw, answer, 'ok');
        } catch(e) {
          addResult(raw, '❌ 질문 처리 실패: ' + e.message, 'err');
        }
        return;
      }

      // 설정 변경 (Feature 5) — 항상 확인 카드 표시 (자동 확인 금지 원칙)
      if (cmd.request_type === '_config_change') {
        if (cmd.field && cmd.value != null) {
          const item = _items.find(it =>
            it.item_name === cmd.item_name ||
            it.item_name.replace(/\s/g,'') === cmd.item_name.replace(/\s/g,'') ||
            it.item_name.includes(cmd.item_name) || cmd.item_name.includes(it.item_name)
          );
          if (!item) { addResult(raw, `❌ "${cmd.item_name}" 품목을 찾을 수 없습니다.`, 'err'); return; }

          if (cmd.field === 'vendor') {
            const vendor = _vendors.find(v => v.vendor_name.replace(/\s/g,'').includes(cmd.value.replace(/\s/g,'')) || cmd.value.replace(/\s/g,'').includes(v.vendor_name.replace(/\s/g,'')));
            if (vendor) {
              const confirmed = await _showConfigConfirm(item, cmd.field, vendor.vendor_name, vendor.vendor_id);
              if (!confirmed) { addResult(raw, '취소됨', 'warn'); return; }
              await db.from('items').update({ vendor_id: vendor.vendor_id, updated_at: new Date().toISOString() }).eq('item_id', item.item_id);
              item.vendor_id = vendor.vendor_id;
              showToast(`${item.item_name} 거래처가 ${vendor.vendor_name}(으)로 설정되었습니다`, 2000);
              addResult(raw, `✅ ${item.item_name} 거래처 → ${vendor.vendor_name}`, 'ok');
              renderInventory();
              return;
            }
          } else {
            const num = typeof cmd.value === 'number' ? cmd.value : parseFloat(cmd.value) || 0;
            const label = cmd.field === 'min_stock' ? '최소수량' : '목표수량';
            const confirmed = await _showConfigConfirm(item, cmd.field, num);
            if (!confirmed) { addResult(raw, '취소됨', 'warn'); return; }
            await db.from('items').update({ [cmd.field]: num, updated_at: new Date().toISOString() }).eq('item_id', item.item_id);
            item[cmd.field] = num;
            showToast(`${item.item_name} ${label}이 ${num}(으)로 설정되었습니다`, 2000);
            addResult(raw, `✅ ${item.item_name} ${label} → ${num}`, 'ok');
            renderInventory();
            return;
          }
        }
        // 값 없으면 기존 설정 카드 표시
        await _showConfigCard(cmd.item_name, raw);
        return;
      }

      const result = await processRequest(cmd);

      // 발주 리스트 출력 개선 — 버튼 추가 (Feature 3)
      if (result.response_type === 'order_suggestion' && result.items?.length) {
        const text = formatResult(result);
        const cardId = 'orderSuggest_' + Date.now();
        addResult(raw, text, 'ok');
        // 결과 카드에 버튼 삽입
        const firstCard = document.getElementById('resList')?.lastChild;
        if (firstCard) {
          const btnRow = document.createElement('div');
          btnRow.className = 'order-action-inline';
          btnRow.innerHTML = `
            <button class="oai-create" onclick="_createOrderFromSuggestion()">발주 생성</button>
            <button class="oai-edit" onclick="switchTab('order', document.querySelectorAll('.nav')[2])">수정</button>
            <button class="oai-cancel" onclick="this.parentElement.remove()">취소</button>`;
          firstCard.appendChild(btnRow);
          // 발주 제안 데이터 임시 저장
          window._lastOrderSuggestion = result.items;
        }
        return;
      }

      addResult(raw, formatResult(result), result.status === 'success' ? 'ok' : 'warn');
      if (!_onInputTab) {
        if (document.getElementById('tab-inventory').classList.contains('active')) renderInventory();
        if (document.getElementById('tab-order').classList.contains('active')) renderOrder();
      }
      return;
    }

    // 0.5차: 혼합 입력 분리 (예: "치즈 3봉 입고 토마토소스 재고 얼마야")
    // 동작어(입고/사용 등) 뒤에 재고 조회 패턴이 붙은 경우 분리 처리
    const _actionSplitRe = /(?:추가|입고|넣어|넣기|넣었어|빼기|빼줘|차감|사용|받았어|들어왔어|썼어|뺐어|버렸|꺼냈)(?:해줘|하고|해|고|서)?\s+/;
    const _trailingQryRe = /(.+?)\s*(?:재고\s*(?:얼마|몇|확인|알려줘?|뭐야|봐줘?)|몇\s*(?:개|봉지?|박스|팩|캔|통|병|kg|g|장|묶음|롤|판|다발|단)?\s*(?:남았|있어|남아)|얼마나?\s*(?:남았|있어|남아))[\s?？]*$/;
    if (_actionSplitRe.test(raw) && _trailingQryRe.test(raw)) {
      const splitMatch = raw.match(_actionSplitRe);
      if (splitMatch) {
        const splitPos = splitMatch.index + splitMatch[0].length;
        const restAfterAction = raw.slice(splitPos).trim();
        // restAfterAction가 재고 조회 패턴이면 분리
        if (_trailingQryRe.test(restAfterAction) || /재고|얼마|남았|있어/.test(restAfterAction)) {
          const actionPart = raw.slice(0, splitPos).trim();
          const queryPart = restAfterAction;
          // 재고 조회 부분 처리
          const qryCmd = detectCommand(queryPart);
          if (qryCmd) {
            const qryResult = await processRequest(qryCmd);
            addResult(queryPart, formatResult(qryResult), qryResult.status === 'success' ? 'ok' : 'warn');
          }
          // 동작 부분은 아래 rule engine으로 계속 처리
          inp.value = actionPart;
          raw = actionPart;
        }
      }
    }

    // 1차: Rule Engine (빠름, 비용 없음)
    // "재고 N단위로 설정" 등 룰엔진이 오파싱하는 패턴은 즉시 LLM fallback
    const _forceLLM = /재고\s*\d+.*(?:으로|로)?\s*(?:설정|변경|세팅|맞춰|바꿔)/.test(raw);
    let parsed = null;
    const ruleResult = _forceLLM ? { results:[], needsFallback:true, confidence:0 } : ruleEngine(raw);
    _parseMeta = { confidence: ruleResult.confidence || 0, usedLLM: _forceLLM };
    if (!ruleResult.needsFallback && ruleResult.results.length > 0) {
      parsed = ruleResult.results;
      document.getElementById('parseLoading')?.remove();
      console.log('Rule Engine 처리:', parsed.length, '개 품목 (최저 신뢰도:', Math.round(_parseMeta.confidence*100)+'%)');
    } else {
      // 2차: LLM fallback
      _parseMeta.usedLLM = true;
      console.log(_forceLLM ? 'LLM 강제 실행 (재고 설정 패턴)' :
        'LLM fallback 실행 (최저 신뢰도: ' + Math.round(_parseMeta.confidence*100) + '%)',
        ruleResult.results.length ? '- 항목별: ' + ruleResult.results.map(r=>r.item_name+'='+r._score).join(', ') : '');
      parsed = await parseWithClaude(raw);
      document.getElementById('parseLoading')?.remove();
    }

    if (!parsed || !parsed.length) {
      addResult(raw, '❌ 품목을 인식하지 못했습니다. 다시 입력해 주세요.', 'err');
      // 파싱 실패 로그
      db.from('kitchen_logs').insert({
        store_id: SID, raw_input: raw, parsed_items: null,
        final_action: null, success: false,
        error_reason: '품목 인식 실패',
        confidence: _parseMeta.confidence, used_llm: _parseMeta.usedLLM
      }).then(({ error }) => {
        if (error) console.warn('kitchen_logs insert failed:', error.message);
      });
      return;
    }

    // 유사 품목 체크 후 확인 카드 표시
    _draftItems = parsed;
    inp.value = '';

    // 품목명 trailing 조사 제거
    for (const it of _draftItems) {
      if (it.item_name) it.item_name = it.item_name.replace(/(을|를|은|는|이|가)$/, '').trim();
    }

    // Fast-path: 확실한 파싱은 확인 카드 생략하고 바로 처리
    const _canSkipReview = _draftItems.length > 0 && _draftItems.every(it => {
      const exactMatch = _items.find(ex =>
        ex.item_name === it.item_name ||
        ex.item_name.replace(/\s/g,'') === it.item_name.replace(/\s/g,'')
      );
      if (!exactMatch) return false; // 신규 품목 → 확인 필요
      if (!it.qtyParsed) return false; // 수량 미파싱 → 확인 필요
      if (!it.action || !['inbound','consume','stock_check'].includes(it.action)) return false; // 액션 불명확
      if (it.quantity >= 20) return false; // 이상값 → 확인 필요
      const prev = _sessionInputs.find(s => s.item_name === it.item_name);
      if (prev && it.action !== 'inbound') return false; // 세션 재입력 → 확인 필요
      return true;
    });
    // 문장 내 동일 품목 중복도 체크
    const _nameSet = new Set();
    const _hasIntraDup = _draftItems.some(it => {
      if (_nameSet.has(it.item_name)) return true;
      _nameSet.add(it.item_name); return false;
    });
    if (_canSkipReview && !_hasIntraDup) {
      const req = draftToRequest(_draftItems);
      req._source = 'fast_path';
      const result = await processRequest(req);
      for (const it of _draftItems) {
        const existing = _sessionInputs.find(s => s.item_name === it.item_name);
        if (existing) { existing.quantity = it.quantity; existing.unit = it.unit; }
        else _sessionInputs.push({ item_name: it.item_name, quantity: it.quantity, unit: it.unit });
      }
      const undoItems = (result.updated_items || []).filter(it => it.item_id && it.qty_before != null).map(it => ({ item_id: it.item_id, name: it.name, qty_before: it.qty_before, qty_after: it.quantity, unit: it.unit }));
      addResult(raw, formatResult(result), result.status === 'success' ? 'ok' : 'warn', undoItems);
      renderInventory();
      if (document.getElementById('tab-order')?.classList.contains('active')) renderOrder();
      _draftItems = [];
      return;
    }

    // Step 1: 한 문장에서 동일 품목 합산 (Fix 4)
    const _nameCountMap = new Map();
    for (let i = 0; i < _draftItems.length; i++) {
      const name = _draftItems[i].item_name;
      if (_nameCountMap.has(name)) _nameCountMap.get(name).push(i);
      else _nameCountMap.set(name, [i]);
    }
    const intraDups = [..._nameCountMap.entries()].filter(([,idxs]) => idxs.length > 1);
    if (intraDups.length) {
      await _showIntraDupChoices(intraDups, raw);
      if (!_draftItems.length) { cancelReview(); return; }
    }

    // Step 2: 수량 이상값 확인 (Fix 7)
    const outlierChecks = _draftItems.map((it, idx) => {
      const existing = _items.find(ex =>
        ex.item_name === it.item_name ||
        ex.item_name.replace(/\s/g,'') === it.item_name.replace(/\s/g,'')
      );
      const targetStock = existing?.target_qty || 0;
      const isOutlier = it.quantity >= 20 || (targetStock > 0 && it.quantity > targetStock * 5);
      return isOutlier ? { idx, item_name: it.item_name, quantity: it.quantity, unit: it.unit || '개', targetStock } : null;
    }).filter(Boolean);
    if (outlierChecks.length) {
      const outlierResult = await _showOutlierConfirm(outlierChecks, raw);
      if (outlierResult === 'edit') return;
      if (!_draftItems.length) { cancelReview(); return; }
    }

    // Step 2.5: 품목명 길이 확인 (10글자 초과 시 경고)
    const longNameChecks = _draftItems.map((it, idx) => {
      const nameLen = (it.item_name || '').replace(/\s/g, '').length;
      return nameLen > 10 ? { idx, item_name: it.item_name } : null;
    }).filter(Boolean);
    if (longNameChecks.length) {
      const longResult = await _showLongNameWarning(longNameChecks, raw);
      if (longResult === 'retry') return;
      if (!_draftItems.length) { cancelReview(); return; }
    }

    // Step 3: 신규 품목 중 유사 기존 품목 확인
    const similarChecks = _draftItems.map((it, idx) => {
      const exact = _items.find(ex =>
        ex.item_name === it.item_name ||
        ex.item_name.replace(/\s/g,'') === it.item_name.replace(/\s/g,'')
      );
      if (exact) return null;
      const similar = _findSimilarItem(it.item_name);
      return similar ? { idx, newName: it.item_name, existName: similar } : null;
    }).filter(Boolean);

    if (similarChecks.length) {
      await _showSimilarChoices(similarChecks, raw);
    } else {
      // Step 4: 세션 이력 동일 품목 재입력 감지 ("추가"=inbound 동작은 합산 건너뜀)
      const dupChecks = _draftItems.map((it, idx) => {
        if (it.action === 'inbound') return null; // "추가" 키워드 시 세션 합산 스킵
        const prev = _sessionInputs.find(s => s.item_name === it.item_name);
        return prev ? { idx, item_name: it.item_name, prevQty: prev.quantity, prevUnit: prev.unit, newQty: it.quantity, newUnit: it.unit || prev.unit, action: it.action } : null;
      }).filter(Boolean);
      if (dupChecks.length) {
        await _showDupChoices(dupChecks, raw);
      } else {
        showReviewPanel(raw);
      }
    }

  } catch(e) {
    document.getElementById('parseLoading')?.remove();
    addResult(raw, '❌ 파싱 오류: ' + e.message, 'err');
    // 파싱 예외 로그
    db.from('kitchen_logs').insert({
      store_id: SID, raw_input: raw, parsed_items: null,
      final_action: null, success: false,
      error_reason: '파싱 오류: ' + e.message,
      confidence: _parseMeta.confidence, used_llm: _parseMeta.usedLLM
    }).then(({ error }) => {
      if (error) console.warn('kitchen_logs insert failed:', error.message);
    });
  } finally {
    btn.disabled = false;
    btnTxt.textContent = '입력';
  }
}

/* ════════════════════════════════════════════════════════
   ZeroKitchen Rule Engine v1.1
   80% rule 처리 → 20% LLM fallback
════════════════════════════════════════════════════════ */
const _NUM_WORDS = {
  '하나':1,'한':1,'둘':2,'두':2,'셋':3,'세':3,'넷':4,'네':4,
  '다섯':5,'여섯':6,'일곱':7,'여덟':8,'아홉':9,'열':10,
  '열하나':11,'열한':11,'열둘':12,'열두':12,
  '열셋':13,'열세':13,'열넷':14,'열네':14,'열다섯':15,'스물':20,
};
const _UNITS = ['봉지','봉','박스','케이스','팩','캔','통','병','킬로그램','킬로','키로그램','키로','kg','g','그램','인분','장','묶음','롤','판','다발','단','망','모','개'];
const _UNIT_MAP = {'봉':'봉지','봉지':'봉지','박스':'박스','케이스':'박스','팩':'팩','캔':'캔','통':'통','병':'병','kg':'kg','킬로':'kg','킬로그램':'kg','키로':'kg','키로그램':'kg','g':'g','그램':'g','인분':'인분','장':'장','묶음':'묶음','롤':'롤','판':'판','다발':'다발','단':'단','망':'망','모':'모','개':'개'};
const _ACTION_WORDS = ['추가','입고','넣어','넣기','넣었어','넣','빼기','빼','차감','사용','소비','소진','빠짐','발주','주문','받았어','받았','들어왔어','가져왔','썼어','써서','뺐어','버렸','꺼냈'];
const _ACTION_MAP = {
  '추가':'inbound','입고':'inbound','넣어':'inbound','넣기':'inbound','넣었어':'inbound','넣':'inbound','받았어':'inbound','받았':'inbound','들어왔어':'inbound','가져왔':'inbound',
  '빼기':'consume','빼':'consume','차감':'consume','사용':'consume','소비':'consume','소진':'consume','빠짐':'consume','썼어':'consume','써서':'consume','뺐어':'consume','버렸':'consume','꺼냈':'consume',
  '발주':'order','주문':'order',
};
// 복합 동작어구: [regex_pattern, action_type]
const _COMPOUND_ACTIONS = [
  ['가져다\\s*놨','inbound'],['가져다\\s*놔','inbound'],
  ['가져\\s*왔','inbound'],
  ['들어\\s*온','inbound'],
  ['들여\\s*놨','inbound'],['들여\\s*놔','inbound'],
  ['넣어\\s*뒀','inbound'],['넣어\\s*놨','inbound'],
  ['꺼내\\s*썼','consume'],['꺼내\\s*쓰','consume'],
  ['채워\\s*뒀','inbound'],['채워\\s*놨','inbound'],
  ['다\\s*썼','consume'],['다\\s*쓰','consume'],
];
// 품목명 내 연결어 잔재 패턴 (confidence 감점 기준)
const _NAME_JUNK = /좀|는데|인데|그리고|이랑/;
const _ALIAS = {
  '개깐마늘':'깐마늘','개깐 마늘':'깐마늘','까마늘':'깐마늘',
  '파마산 치즈':'파마산치즈','고르곤 졸라':'고르곤졸라','고르곤':'고르곤졸라',
  '위생적 장갑':'위생장갑','위생적장갑':'위생장갑','위생 장갑':'위생장갑',
  '깐 마늘':'깐마늘',
  '그라나 바다도':'그라나 파다노','파슬리 후레이크':'파슬리 플레이크',
  '피프 소스':'비프 소스','피프소스':'비프 소스',
  '롤백중':'롤백 중','롤백소':'롤백 소','롤백대':'롤백 대',
  '알리오 올리오 소스':'알리오올리오소스','토마토 비프 소스':'토마토비프소스',
  '냉동 가리비':'냉동가리비',
};

function _ruleNormalize(text) {
  let s = text.trim();
  // 0. 전처리: 문장부호·콤마·위치격·시간어 제거
  s = s.replace(/[!?~。！？]/g, '');
  s = s.replace(/\.(?!\d)/g, '');
  s = s.replace(/,/g, ' ');
  s = s.replace(/[가-힣]+에서\s/g, '');
  s = s.replace(/^(오늘|어제|내일|아까|방금|지금)\s/, '');
  const up = _UNITS.join('|');

  // 1. 품목명+한글숫자+단위 붙여쓰기 분리 (단위가 바로 붙은 경우만 — 마스카포네 같은 오분리 방지)
  const nk = Object.keys(_NUM_WORDS).sort((a,b)=>b.length-a.length);
  for (const nw of nk) {
    s = s.replace(new RegExp('([가-힣]+)' + nw + '(' + up + ')', 'g'),
      function(m,p,t){ return p + ' ' + nw + ' ' + t; });
  }

  // 1a-2. 단위 뒤에 바로 붙은 다음 품목 분리 ("봉양파" → "봉 양파")
  s = s.replace(new RegExp('(' + up + ')([가-힣]{2,})', 'g'), '$1 $2');

  // 1b. 한글숫자+단위 붙여쓰기 분리 (띄어쓰기 후: "두병" → "두 병")
  for (const nw of nk) {
    s = s.replace(new RegExp('(^|\\s)' + nw + '(' + up + ')', 'g'),
      '$1' + nw + ' $2');
  }

  // 1b-2. 품목명+한글숫자 (단위 없음, 문장 끝) — "브로콜리하나" → "브로콜리 하나"
  for (const nw of nk) {
    if (nw.length < 2) continue; // 1글자 수사(한/두/세/네)는 오분리 위험 → 건너뜀
    s = s.replace(new RegExp('([가-힣]{2,})' + nw + '(?=\\s|$)', 'g'),
      function(m,p){ return p + ' ' + nw; });
  }

  // 1b-3. 1글자 한글숫자(한/두/세/네) 품목명 끝 붙어쓰기 + 단위 패턴 — "육수네 통" → "육수 네 통"
  for (const nw of nk) {
    if (nw.length !== 1) continue;
    // 단위가 뒤따를 때만 분리 (마스카포네 같은 품목명 보호)
    s = s.replace(new RegExp('([가-힣]{2,})' + nw + '\\s+(' + up + ')(?=\\s|$)', 'g'),
      function(m,p,t){ return p + ' ' + nw + ' ' + t; });
    // 단위가 바로 붙은 경우도 처리 — "육수네통" → "육수 네 통" (section 1에서 놓친 경우 보강)
    s = s.replace(new RegExp('([가-힣]{2,})' + nw + '(' + up + ')(?=\\s|$)', 'g'),
      function(m,p,t){ return p + ' ' + nw + ' ' + t; });
  }

  // 1c. 수량 표현 → 숫자 변환 (순서 중요: 복합 표현을 먼저 처리)
  s = s.replace(/거의\s*없음/g, '0.2 개');
  s = s.replace(/조금\s*있음/g, '0.3 개');
  s = s.replace(/(?:반|절반|1\/2)\s*(?:정도|쯤|만큼)?/g, '0.5 개');
  s = s.replace(/발주\s*필요/g, '0 개');
  s = s.replace(/(?:재고|수량|현재|지금)?\s*(을|를|은|는|이|가)?\s*(?:(?:다\s*)?떨어짐|없음|소진|다\s*(?:썼어|써버렸|나갔|떨어졌|사용))/g, ' 0 개');

  // 2. 한글숫자 → 아라비아 (lookbehind 없이, 브라우저 호환)
  const numEntries = Object.entries(_NUM_WORDS).sort((a,b)=>b[0].length-a[0].length);
  for (const entry of numEntries) {
    var k = entry[0], v = entry[1];
    s = s.replace(new RegExp('(^|\\s)' + k + '(\\s|$)', 'g'),
      function(m, pre, post){ return pre + String(v) + post; });
  }

  // 3. 숫자+단위 붙여쓰기 분리
  s = s.replace(new RegExp('(\\d+)(' + up + ')', 'g'), '$1 $2');

  // 3b. 단위+조사/연결어 제거 (예: "5개은" → "5개", "3개이랑" → "3개")
  s = s.replace(new RegExp('(' + up + ')(을|를|은|는|이|가|이랑|랑|하고)(\\s|,|$)', 'g'), '$1 $3');

  // 3c. 연결 접속사 제거 (예: "그리고", "또")
  s = s.replace(/(^|\s)(그리고|또한|또)(\s|,|$)/g, '$1$3');

  // 3d. 품목명에 포함되면 안 되는 키워드 제거 ("재고", "수량" 등 — 붙어있어도 분리)
  s = s.replace(/재고|수량|현재|지금/g, ' ');

  // 4. 조사 제거
  s = s.replace(/([가-힣]{2,})(을|를|은|는|이|가)(\s|,|$)/g,
    function(m,w,j,t){ return _UNITS.includes(w) ? m : w+t; });

  // 5a. 복합 동작어구 → 마커 치환 (단일 동작어보다 먼저 처리)
  const _SUFFIX = '(?:했어|하고|해줘|했음|함|고|어|서|해|줘|자)?';
  for (const [pat, act] of _COMPOUND_ACTIONS) {
    s = s.replace(new RegExp(pat + _SUFFIX + '(?=\\s|,|$)', 'g'),
      '\x01' + act + '\x01');
  }

  // 5b. 단일 동작어 → 마커 치환 (아이템별 action 보존)
  const awSorted = _ACTION_WORDS.slice().sort((a,b)=>b.length-a.length);
  //    수량+단위 뒤 동작어 (공백 있든 없든): "\x01action\x01"로 치환
  for (const aw of awSorted) {
    s = s.replace(new RegExp('(\\d+\\s*(?:' + up + ')?)\\s*' + aw + _SUFFIX + '(?=\\s|,|$)', 'g'),
      function(m, qty){ return qty + ' \x01' + (_ACTION_MAP[aw]||'stock_check') + '\x01'; });
  }
  //    문장 앞뒤에 단독으로 나오는 동작어도 마커 치환
  for (const aw of awSorted) {
    s = s.replace(new RegExp('(^|\\s)' + aw + _SUFFIX + '(?=\\s|,|$)', 'g'),
      function(m, pre){ return pre + '\x01' + (_ACTION_MAP[aw]||'stock_check') + '\x01'; });
  }

  return s.replace(/\s{2,}/g,' ').trim();
}

function _extractAction(text) {
  // 마커 "\x01action\x01"를 추출하고 제거
  let action = null;
  const cleaned = text.replace(/\x01([a-z_]+)\x01/g, function(m, a) { action = a; return ''; }).trim();
  return { text: cleaned, action: action };
}

function _ruleTokenize(s) {
  const up = _UNITS.join('|');
  const qp = new RegExp(`(\\d+(?:\\.\\d+)?)\\s*(${up})`, 'g');
  const segs=[]; let li=0, m;
  while ((m=qp.exec(s))!==null) {
    const raw=s.slice(li,m.index).trim();
    // 수량+단위 뒤에 오는 마커 확인
    const after = s.slice(m.index+m[0].length);
    const am = after.match(/^\s*\x01([a-z_]+)\x01/);
    let segAction = null;
    if (am) { segAction = am[1]; qp.lastIndex += am[0].length; }
    const { text: before, action: preAction } = _extractAction(raw);
    if (before) segs.push({rawName:before, qty:parseFloat(m[1]), unit:m[2], action: segAction || preAction, qtyParsed:true});
    li=qp.lastIndex;
  }
  const tail=s.slice(li).trim();
  if (tail) {
    const { text: cleanTail, action: tailAction } = _extractAction(tail);
    const nm=cleanTail.match(/^(\d+(?:\.\d+)?)$/);
    if (nm&&segs.length) segs[segs.length-1].qty=parseFloat(nm[1]);
    else if (cleanTail) {
      // 단위 없는 trailing 숫자 처리 (Fix 5: "현미 0", "치즈 3" 등)
      const trailingNum = cleanTail.match(/^(.+?)\s+(\d+(?:\.\d+)?)$/);
      if (trailingNum) {
        segs.push({rawName:trailingNum[1].trim(), qty:parseFloat(trailingNum[2]), unit:'개', action: tailAction, qtyParsed:true});
      } else {
        segs.push({rawName:cleanTail,qty:1,unit:'개', action: tailAction, qtyParsed:false});
      }
    }
  }
  return segs;
}

function _ruleMapItem(raw) {
  const name=raw.trim(); if(!name) return null;
  if (_ALIAS[name]) return _ALIAS[name];
  for (const [a,s] of Object.entries(_ALIAS)) { if (name.includes(a)) return s; }
  return name;
}

// 아이템별 confidence 점수 계산
function _itemConfidence(name, seg) {
  let score = 0;
  // 1) 품목명에 연결어 잔재 없음: +0.3
  if (!_NAME_JUNK.test(name)) score += 0.3;
  // 2) 수량이 숫자로 정상 파싱됨: +0.3
  if (seg.qtyParsed) score += 0.3;
  // 3) 액션이 stock_check 폴백이 아님: +0.4 / stock_check도 수량 파싱됐으면: +0.2
  if (seg.action && seg.action !== 'stock_check') score += 0.4;
  else if (seg.qtyParsed) score += 0.2;
  return Math.round(score * 100) / 100;
}

function ruleEngine(text) {
  const norm = _ruleNormalize(text);
  const segs = _ruleTokenize(norm);
  if (!segs.length) return { results:[], needsFallback:true, confidence:0 };
  // 전체 폴백 action: 첫 번째 세그먼트의 action만 사용 (Fix 2)
  // 문장 끝 동작어(추가 등)는 바로 앞 품목에만 적용, 나머지는 stock_check
  const fallbackAction = segs[0]?.action || 'stock_check';
  const results=[], fails=[];
  let minConf = 1;
  for (const seg of segs) {
    const name=_ruleMapItem(seg.rawName);
    if (!name||!name.trim()) { fails.push(seg); continue; }
    const action = seg.action || fallbackAction;
    // confidence 계산용으로 최종 action 반영
    const confSeg = { ...seg, action: action };
    const conf = _itemConfidence(name, confSeg);
    if (conf < minConf) minConf = conf;
    const defaultApplied = !seg.action && fallbackAction === 'stock_check';
    results.push({ item_name:name, quantity:seg.qty, unit:_UNIT_MAP[seg.unit]||seg.unit||'개', action:action, confidence:conf >= 0.8 ? 'high' : 'low', _score:conf, _defaultApplied:defaultApplied, qtyParsed:seg.qtyParsed });
  }
  // 아이템 중 하나라도 confidence < 0.8 이면 전체 LLM fallback
  const needsFallback = !results.length || minConf < 0.8;
  return { results, needsFallback, confidence: minConf };
}

사용자의 음성 인식 텍스트를 분석해서 품목 목록을 JSON 배열로 반환하세요.

등록된 품목 목록: ${itemNames}
등록된 거래처: ${vendorNames}

반환 형식 (JSON 배열만, 다른 텍스트 없이):
[
  {
    "item_name": "품목명",
    "quantity": 숫자,
    "unit": "단위",
    "action": "stock_check",
    "vendor": null,

핵심 규칙:

1. 수량 파싱 (가장 중요)

   - 예: "토마토 소스 14개" → quantity: 14 (절대 1로 파싱하지 말 것)
   - 예: "마늘빵 다섯 박스" → quantity: 5, unit: "박스"

2. 품목명 경계 파악 (두 번째로 중요)
   - 수량/단위 단어가 나오면 이전 품목이 끝남
   - 단위: 개, 봉지, 봉, 박스, 캔, 통, 병, kg, g, 팩, 장, 묶음, 단
   - 예: "코카콜라 한 박스 스프라이트 한 박스" → 코카콜라 1박스, 스프라이트 1박스 (두 품목)
   - 예: "고르곤졸라 두 개 돌체 두 개" → 고르곤졸라 2개, 돌체 2개 (두 품목, 분리 주의)

3. 품목명 정제
   - "추가", "넣어", "입고" 등 동작 단어는 품목명에 포함하지 않음
   - "깐마늘", "개깐마늘" → 깐마늘 (표준화)
   - 등록된 품목 목록과 유사하면 등록된 이름으로 교정

4. action 판단
   - 기본값: stock_check (재고 확인)
   - "입고", "들어왔어", "받았어", "추가" → inbound
   - "사용", "썼어", "차감" → consume
   - "발주", "주문" → order

5. confidence
   - 품목명과 수량이 명확하면: high
   - 품목명이 불명확하거나 수량 없으면: low

주의: 품목이 여러 개일 때 각 품목을 정확히 분리하는 것이 최우선입니다.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '',  // Vita에서 API 키 주입 예정
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!response.ok) throw new Error('API ' + response.status);
    const data = await response.json();
    const rawTxt = data.content?.[0]?.text || '[]';
    const match = rawTxt.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('JSON 추출 실패');
    return JSON.parse(match[0]);

  } catch(e) {
    console.warn('Claude API 실패, fallback 파서 사용:', e.message);
    return fallbackParse(text);
  }
}

// Fallback 파서 — Claude API 실패 시 기본 파싱
function fallbackParse(text) {
  const QW = {하나:1,둘:2,셋:3,넷:4,다섯:5,여섯:6,일곱:7,여덟:8,아홉:9,열:10,한:1,두:2,세:3,네:4};
  const UNITS = ['개','봉지','봉','박스','케이스','팩','캔','통','병','kg','g','인분','장','묶음','단'];
  const results = [];

  // 공백 구분, 조사 제거
  let s = text.trim();
  s = s.replace(/(\d)(봉지|봉|박스|팩|개|kg|단)/g, '$1 $2');
  const qp = Object.keys(QW).sort((a,b)=>b.length-a.length).join('|');
  s = s.replace(new RegExp('('+qp+')(봉지|봉|박스|팩|개|kg|단)', 'g'), '$1 $2');

  const tokens = s.split(/\s+/);
  let name = '', qty = null, unit = '';

  const flush = () => {
    if (name.trim()) {
      results.push({
        item_name: name.trim().replace(/(을|를|은|는|이|가)$/, ''),
        quantity:  qty != null ? qty : 1,
        unit:      unit || '개',
        action:    'stock_check',
        vendor:    null,
        confidence: qty !== null ? 'high' : 'low'
      });
    }
    name = ''; qty = null; unit = '';
  };

  for (const tok of tokens) {
    if (UNITS.includes(tok))             { unit = tok; continue; }
    if (!isNaN(parseFloat(tok)))         { qty = parseFloat(tok); continue; }
    if (QW[tok] !== undefined)           { qty = QW[tok]; continue; }
    // 등록 품목과 매칭 시 경계 삽입
    const matched = _items.find(it =>
      it.item_name.replace(/\s/g,'') === (name+tok).replace(/\s/g,'') ||
      it.item_name === (name+tok).trim()
    );
    if (matched && name) { name += tok; flush(); }
    else if (name && qty !== null) { flush(); name = tok; }
    else name += (name ? ' ' : '') + tok;
  }
  flush();

  return results;
}

// ResultCard 표시
// 유사 품목 찾기 — 포함 관계 또는 공통 글자 비율
function _findSimilarItem(newName) {
  const n = newName.replace(/\s/g,'');
  for (const it of _items) {
    const e = it.item_name.replace(/\s/g,'');
    if (e === n) return null; // 정확 일치 — 유사가 아님
    // 포함 관계 (한쪽이 다른쪽을 포함)
    if (n.length >= 2 && e.length >= 2 && (e.includes(n) || n.includes(e))) return it.item_name;
  }
  return null;
}

async function _showLongNameWarning(checks, rawText) {
  const sortedChecks = checks.slice().sort((a, b) => b.idx - a.idx);
  for (const chk of sortedChecks) {
    if (chk.idx >= _draftItems.length) continue;
    const choice = await new Promise(resolve => {
      const panel = document.getElementById('reviewPanel');
      if (!panel) { resolve('keep'); return; }
      panel.style.display = 'block';
      const wrap = panel.querySelector('.result-card-wrap');
      if (!wrap) { resolve('keep'); return; }
      const origHTML = wrap.innerHTML;
      wrap.innerHTML = `
        <div class="similar-card">
          <button class="card-close-x" id="longClose">✕</button>
          <div class="similar-card-title">⚠️ 입력이 너무 깁니다. 다시 말씀해 주세요.</div>
          <div class="dup-card-detail" style="margin:8px 0;word-break:break-all">"${chk.item_name}"</div>
          <div class="similar-card-btns">
            <button class="similar-btn-link" id="longRetry">다시 입력</button>
            <button class="similar-btn-new" id="longKeep">그대로 추가</button>
          </div>
        </div>`;
      document.getElementById('longClose').onclick = () => { wrap.innerHTML = origHTML; resolve('retry'); };
      document.getElementById('longRetry').onclick = () => { wrap.innerHTML = origHTML; resolve('retry'); };
      document.getElementById('longKeep').onclick  = () => { wrap.innerHTML = origHTML; resolve('keep'); };

    if (choice === 'retry') {

  }
  return 'keep';

// draft → processRequest JSON 변환
function draftToRequest(items) {
  return {
    request_type: 'inventory_update',
    items: items.map(it => ({
      name:        it.item_name,
      quantity:    it.quantity != null ? it.quantity : 1,
      unit:        it.unit || '개',
      action_type: it.action || 'stock_check'
    }))
  };
}

// 확정 저장
async function confirmReview() {
  // 품목명 빈 값 체크
  const invalid = _draftItems.filter(it => !it.item_name?.trim());
  if (invalid.length) { showToast('품목명을 입력해 주세요.'); return; }

  const btn = document.getElementById('confirmReviewBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    const req = draftToRequest(_draftItems);
    const rawText = document.getElementById('reviewPanel').dataset.rawText || '';
    req._source = 'table_review';

    const result = await processRequest(req);

    // ── kitchen_logs 기록 ──
    const actions = _draftItems.map(it => it.action || 'stock_check');
    const uniqueActions = [...new Set(actions)];
    const finalAction = uniqueActions.length === 1 ? uniqueActions[0] : 'mixed';
    const logSuccess = result.status === 'success' || result.status === 'partial';
    const logErrors = result.errors?.map(e => `${e.name}: ${e.reason}`).join('; ');

    db.from('kitchen_logs').insert({
      store_id:     SID,
      raw_input:    rawText,
      parsed_items: _draftItems.map(it => ({
        item_name: it.item_name, quantity: it.quantity,
        unit: it.unit, action: it.action
      })),
      final_action: finalAction,
      success:      logSuccess,
      error_reason: logErrors || null,
      confidence:   _parseMeta.confidence,
      used_llm:     _parseMeta.usedLLM
    }).then(({ error }) => {
      if (error) console.warn('kitchen_logs insert failed:', error.message);
    });

    // 세션 이력에 기록 (동일 품목 재입력 감지용)
    for (const it of _draftItems) {
      const existing = _sessionInputs.find(s => s.item_name === it.item_name);
      if (existing) { existing.quantity = it.quantity; existing.unit = it.unit; }
      else _sessionInputs.push({ item_name: it.item_name, quantity: it.quantity, unit: it.unit });
    }
    cancelReview();
    // 확정 후 입력창 클리어
    document.getElementById('nlInput').value = '';
    const undoItems = (result.updated_items || []).filter(it => it.item_id && it.qty_before != null).map(it => ({ item_id: it.item_id, name: it.name, qty_before: it.qty_before, qty_after: it.quantity, unit: it.unit }));
    addResult(rawText, formatResult(result), result.status === 'success' ? 'ok' : 'warn', undoItems);
    renderInventory();
    if (document.getElementById('tab-order')?.classList.contains('active')) renderOrder();
  } catch(e) {
    // 실행 실패 시에도 로그 기록
    const rawText = document.getElementById('reviewPanel').dataset.rawText || '';
    db.from('kitchen_logs').insert({
      store_id:     SID,
      raw_input:    rawText,
      parsed_items: _draftItems.map(it => ({
        item_name: it.item_name, quantity: it.quantity,
        unit: it.unit, action: it.action
      })),
      final_action: 'stock_check',
      success:      false,
      error_reason: e.message,
      confidence:   _parseMeta.confidence,
      used_llm:     _parseMeta.usedLLM
    }).then(({ error }) => {
      if (error) console.warn('kitchen_logs insert failed:', error.message);
    });

    showToast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '✅ 확정 저장';
  }
}

async function handleVoiceInput() {
  const inp = document.getElementById('mainInp');
  const raw = inp.value.trim();
  if (!raw) return;

  const btn = document.getElementById('mainSend');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';

  try {
    if (!_items.length) await loadAll();

    let json;
    try {
      json = JSON.parse(raw);
    } catch(e) {
      addResult(raw, '❌ JSON 형식 오류: ' + e.message + '\n\nZeroKitchen은 JSON만 처리합니다.\n자연어는 Vita를 통해 입력하세요.', 'err');
      return;
    }

    // inventory_update → pending 10초 대기
    if (json.request_type === 'inventory_update') {
      addPending(raw, json);
      inp.value = '';
      return;
    }

    const result = await processRequest(json);
    addResult(raw, formatResult(result), result.status === 'success' ? 'ok' : result.status === 'error' ? 'err' : 'warn');
    inp.value = '';

  } finally {
    btn.disabled = false; btn.textContent = '▶ 실행';
  }
}

// 결과 포맷
function formatResult(result) {
  if (result.status === 'error') return '❌ ' + result.message;
  switch(result.response_type) {
    case 'inventory_update_result':
      return (result.updated_items||[]).map(it => {
        const a = _ACTION_LABEL[it.action] || _ACTION_LABEL['stock_check'];
        const u = it.unit || '';
        const before = it.qty_before != null ? it.qty_before : '?';
        const after = it.quantity;
        const diff = it.qty_before != null ? after - it.qty_before : null;
        const diffStr = diff != null ? (diff > 0 ? ` <span style="color:var(--accent)">(+${diff})</span>` : diff < 0 ? ` <span style="color:var(--warn)">(${diff})</span>` : '') : '';
        if (it.is_new) return `🆕 ${it.name} ${after}${u} 등록`;
        return `✅ ${it.name} ${a.label}\n${before}${u} → ${after}${u}${diffStr}`;
      }).join('\n') + (result.errors?.length ? '\n' + result.errors.map(e=>`❌ ${e.name}: ${e.reason}`).join('\n') : '');
    case 'inventory_state':
      return (result.items||[]).map(it => `📦 ${it.name}: ${it.quantity}${it.unit||''}`).join('\n') || '품목 없음';
    case 'order_suggestion': {
      const oi = result.items || [];
      if (!oi.length) return '발주 필요 품목이 없습니다';
      return '오늘 발주입니다 — ' + oi.map(it => `${it.name} ${it.suggested_qty}${it.unit||''}`).join(', ');
    }
    case 'set_stock_config_result':
      return (result.updated_items||[]).map(it => `⚙️ ${it.name} — ${it.status}`).join('\n');
    default:
      return result.message || JSON.stringify(result, null, 2);
  }
}

  return `<div class="inv-card ${cls}" id="ic_${it.item_id}" onclick="toggleInvDetail(${it.item_id}, event)">
    <div class="inv-card-main">
      <div class="inv-name">${it.item_name}</div>
      <div class="inv-qty-wrap">
        <span class="inv-qty ${cls}">${qty}</span>
        <span class="inv-unit">${it.unit||''}</span>
      </div>
    </div>
    <div class="inv-card-detail" id="icd_${it.item_id}">
      ${vName ? `<div class="inv-card-detail-row"><span>거래처</span><span>${vName}</span></div>` : ''}
      ${tgt > 0 ? `<div class="inv-card-detail-row"><span>목표</span><span>${tgt}${it.unit||''}</span></div>` : ''}
      ${Number(it.min_stock) > 0 ? `<div class="inv-card-detail-row"><span>최소</span><span>${it.min_stock}${it.unit||''}</span></div>` : ''}
      <div class="inv-card-detail-row"><span>업데이트</span><span>${it.updated_at ? new Date(it.updated_at).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '-'}</span></div>
      <div class="inv-card-detail-acts">
        <button class="inv-act-edit" onclick="event.stopPropagation();toggleInvEdit(${it.item_id})">수정</button>
        <button class="inv-act-del" onclick="event.stopPropagation();deleteInvItem(${it.item_id},'${it.item_name.replace(/'/g,"&#39;")}')">삭제</button>
      </div>
    </div>
    <div class="inv-edit-form" id="ief_${it.item_id}">
      <div><div class="inv-edit-label">품목명</div><input class="inv-edit-inp" id="ien_${it.item_id}" value="${it.item_name}" placeholder="품목명"></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><div class="inv-edit-label">수량</div><div class="inv-stepper"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('ieq_${it.item_id}',-1)">−</button><input class="inv-edit-inp" id="ieq_${it.item_id}" type="number" value="${qty}" placeholder="0"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('ieq_${it.item_id}',1)">+</button></div></div>
        <div style="flex:1"><div class="inv-edit-label">단위</div><input class="inv-edit-inp" id="ieu_${it.item_id}" value="${it.unit||''}" placeholder="봉/개/박스" style="width:100%"></div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><div class="inv-edit-label">목표 재고</div><div class="inv-stepper"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('iet_${it.item_id}',-1)">−</button><input class="inv-edit-inp" id="iet_${it.item_id}" type="number" value="${tgt}" placeholder="0"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('iet_${it.item_id}',1)">+</button></div></div>
        <div style="flex:1"><div class="inv-edit-label">최소 재고</div><div class="inv-stepper"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('iem_${it.item_id}',-1)">−</button><input class="inv-edit-inp" id="iem_${it.item_id}" type="number" value="${it.min_stock||0}" placeholder="0"><button class="inv-stepper-btn" onclick="event.stopPropagation();_stepVal('iem_${it.item_id}',1)">+</button></div></div>
      </div>
      <div><div class="inv-edit-label">거래처</div><select class="inv-edit-inp" id="iev_${it.item_id}" style="width:100%"><option value="">거래처 없음</option>${vOpts}</select></div>
      <div style="display:flex;gap:6px;margin-top:4px">
        <button class="inv-save-btn" onclick="event.stopPropagation();saveInvItem(${it.item_id})">저장</button>

function _stepVal(inputId, delta) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  let val = parseFloat(inp.value) || 0;
  val = Math.max(0, val + delta);
  inp.value = val;
}

function renderInventory() {
  const grid = document.getElementById('invGrid');
  if (!grid) return;
  // 부족 품목 요약 바
  const alertBar = document.getElementById('invAlertBar');
  const alertText = document.getElementById('invAlertText');
  if (alertBar && alertText) {
    const lowCount = _items.filter(it => Number(it.current_qty) < Number(it.target_qty) && Number(it.target_qty) > 0).length;
    const zeroCount = _items.filter(it => Number(it.current_qty) <= 0).length;
    if (lowCount > 0 || zeroCount > 0) {
      let msg = '⚠️ ';
      if (zeroCount > 0) msg += `재고 없음 ${zeroCount}개`;
      if (zeroCount > 0 && lowCount > zeroCount) msg += ' · ';
      if (lowCount > zeroCount) msg += `부족 ${lowCount - zeroCount}개`;
      if (lowCount === zeroCount && zeroCount > 0) {} // 재고 없음만
      else if (zeroCount === 0) msg = `⚠️ 부족 ${lowCount}개`;
      alertText.textContent = msg;
      alertBar.style.display = '';
    } else {
      alertBar.style.display = 'none';
    }
    if (document.getElementById('invFilter')?.value === 'low_stock') {
      alertBar.style.display = 'none';
    }
  }
  // 중복 품목 감지
  const dupBar = document.getElementById('invDupBar');
  const dupText = document.getElementById('invDupText');
  if (dupBar && dupText) {
    const nameCount = {};
    _items.forEach(it => {
      const key = it.item_name.replace(/\s/g, '').toLowerCase();
      if (!nameCount[key]) nameCount[key] = [];
      nameCount[key].push(it);
    });
    const dups = Object.entries(nameCount).filter(([k, v]) => v.length > 1);
    if (dups.length > 0) {
      const totalDup = dups.reduce((s, [k, v]) => s + v.length, 0);
      dupText.textContent = `⚠️ 중복 품목 ${dups.length}종 (${totalDup}개)`;
      dupBar.style.display = '';
    } else {
      dupBar.style.display = 'none';
    }
  }
  const q   = document.getElementById('invSearch')?.value.trim() || '';
  const flt = document.getElementById('invFilter')?.value || 'all';
  let items = [..._items];
  const sort = document.getElementById('invSort')?.value || 'updated';
  if (q) items = items.filter(it => it.item_name.includes(q));
  if (flt === 'low_stock') items = items.filter(it => Number(it.current_qty) < Number(it.target_qty) || Number(it.current_qty) <= 0);
  if (sort === 'name') items.sort((a,b) => a.item_name < b.item_name ? -1 : 1);
  else if (sort === 'qty_asc') items.sort((a,b) => Number(a.current_qty) - Number(b.current_qty));
  else if (sort === 'qty_desc') items.sort((a,b) => Number(b.current_qty) - Number(a.current_qty));
  else if (sort === 'vendor') items.sort((a,b) => {
    const va = _vendors.find(v => v.vendor_id === a.vendor_id)?.vendor_name || '';
    const vb = _vendors.find(v => v.vendor_id === b.vendor_id)?.vendor_name || '';
    if (!va && vb) return 1; if (va && !vb) return -1;
    return va < vb ? -1 : va > vb ? 1 : a.item_name < b.item_name ? -1 : 1;
  });
  else items.sort((a,b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
  document.getElementById('invCount').textContent = items.length + '개';
  if (!items.length) { grid.innerHTML = '<div class="no-item">품목 없음</div>'; return; }
  // 거래처순 정렬이면 그룹으로 렌더링
  if (sort === 'vendor') {
    const groups = {};
    items.forEach(it => {
      const vName = _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || '미지정';
      if (!groups[vName]) groups[vName] = [];
      groups[vName].push(it);
    });
    const vendorOpts = _vendors.map(v => `<option value="${v.vendor_id}">${v.vendor_name}</option>`).join('');
    grid.innerHTML = Object.entries(groups).map(([vName, groupItems]) => {
      const cards = groupItems.map(it => {
        const qty = Number(it.current_qty), tgt = Number(it.target_qty);
        const cls = qty <= 0 ? 'zero' : qty < tgt ? 'low' : '';
        const vN = _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || '';
        return _renderInvCard(it, qty, tgt, cls, vN);
      }).join('');
      return `<div class="inv-vendor-group">
        <div class="inv-vendor-group-hdr">
          <span>${vName} (${groupItems.length})</span>
          <select onchange="_batchChangeVendor('${vName}', this.value, [${groupItems.map(i=>i.item_id).join(',')}])">
            <option value="">거래처 변경</option>
            ${vendorOpts}
          </select>
        </div>
        <div class="inv-vendor-group-body">${cards}</div>
      </div>`;
    }).join('');
    grid.classList.remove('inv-grid');
  } else {
    grid.classList.add('inv-grid');
    grid.innerHTML = items.map(it => {
      const qty = Number(it.current_qty), tgt = Number(it.target_qty);
      const cls = qty <= 0 ? 'zero' : qty < tgt ? 'low' : '';
      const vName = _vendors.find(v => v.vendor_id === it.vendor_id)?.vendor_name || '';
      return _renderInvCard(it, qty, tgt, cls, vName);
    }).join('');
  }
}

function toggleInvDetail(itemId, e) {
  const editForm = document.getElementById('ief_' + itemId);
  if (editForm && editForm.style.display === 'flex') return;
  const card = document.getElementById('ic_' + itemId);
  if (!card) return;
  document.querySelectorAll('.inv-card.expanded').forEach(c => {
    if (c !== card) c.classList.remove('expanded');
  });
  card.classList.toggle('expanded');
}

function toggleInvEdit(id) {
  const form = document.getElementById('ief_' + id);
  const detail = document.getElementById('icd_' + id);
  const card = document.getElementById('ic_' + id);
  if (!form) return;
  const isOpen = form.style.display === 'flex';
  if (isOpen) {
    form.style.display = 'none';
    if (detail) detail.style.display = '';
  } else {
    if (detail) detail.style.display = 'none';
    form.style.display = 'flex';
    if (card) card.classList.add('expanded');
  }
}

async function _batchChangeVendor(currentVendorName, newVendorId, itemIds) {
  if (!newVendorId) return;
  const newVendor = _vendors.find(v => v.vendor_id === parseInt(newVendorId));
  if (!newVendor) return;
  if (newVendor.vendor_name === currentVendorName) {
    showToast('이미 같은 거래처입니다');
    return;
  }
  const count = itemIds.length;
  if (!confirm(`${currentVendorName} → ${newVendor.vendor_name}\n${count}개 품목 거래처를 변경하시겠습니까?`)) return;
  const now = new Date().toISOString();
  for (const id of itemIds) {
    await db.from('items').update({ vendor_id: parseInt(newVendorId), updated_at: now }).eq('item_id', id);
    const item = _items.find(i => i.item_id === id);
    if (item) item.vendor_id = parseInt(newVendorId);
  }
  showToast(`${count}개 품목 거래처 → ${newVendor.vendor_name}`);
  renderInventory();
}

async function saveInvItem(id) {
  const name = document.getElementById('ien_'+id)?.value.trim();
  const qty  = parseFloat(document.getElementById('ieq_'+id)?.value) || 0;
  const unit = document.getElementById('ieu_'+id)?.value.trim();
  const tgt  = parseFloat(document.getElementById('iet_'+id)?.value) || 0;
  const vid  = parseInt(document.getElementById('iev_'+id)?.value) || null;
  const minVal = parseFloat(document.getElementById('iem_'+id)?.value) || 0;
  if (!name) { showToast('품목명을 입력해 주세요.'); return; }

  // 중복 감지: 같은 이름의 다른 품목이 이미 있으면 합치기 카드 표시
  const existing = _items.find(x => x.item_id !== id && x.item_name.replace(/\s/g,'') === name.replace(/\s/g,''));
  if (existing) {
    const mergedQty = Number(existing.current_qty) + qty;
    const choice = await _showMergeCard(name, existing, qty, unit);
    if (choice === 'merge') {
      // 합치기: 기존 품목에 수량 합산, 현재 품목 삭제
      await db.from('items').update({
        current_qty: mergedQty, updated_at: new Date().toISOString()
      }).eq('item_id', existing.item_id);
      existing.current_qty = mergedQty;
      await db.from('items').delete().eq('item_id', id);
      _items = _items.filter(x => x.item_id !== id);
      renderInventory();
      showToast(`✅ ${name} 합침 (${mergedQty}${unit || existing.unit || '개'})`);
      return;
    } else if (choice === 'cancel') {
      return; // 수정 취소
    }
    // 'keep' → 따로 유지, 아래로 계속 진행하여 이름만 변경
  }

  const oldItem = _items.find(x => x.item_id === id);
  const oldName = oldItem?.item_name || name;
  const oldQty = oldItem?.current_qty;
  await db.from('items').update({
    item_name: name, current_qty: qty, unit, target_qty: tgt,
    vendor_id: vid, min_stock: minVal, updated_at: new Date().toISOString()
  }).eq('item_id', id);
  if (oldItem) Object.assign(oldItem, { item_name:name, current_qty:qty, unit, target_qty:tgt, vendor_id:vid, min_stock:minVal });
  renderInventory();
  // 채팅 영역에 수정 결과 표시
  const changes = [];
  if (oldName !== name) changes.push(`이름: ${oldName} → ${name}`);
  if (oldQty !== qty) changes.push(`수량: ${qty}${unit || '개'}`);
  const detail = changes.length ? changes.join(', ') : '수정됨';
  addResult(`${name} 수정`, `✅ ${name} — ${detail}`, 'ok');
}

function _showMergeCard(name, existing, newQty, unit) {
  const mergedQty = Number(existing.current_qty) + newQty;
  const u = unit || existing.unit || '개';
  return new Promise(resolve => {
    const card = document.getElementById('ic_' + existing.item_id);
    const container = card || document.getElementById('invGrid');
    const overlay = document.createElement('div');
    overlay.className = 'merge-card-overlay';
    overlay.style.cssText = 'background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:8px 0';
    overlay.innerHTML = `
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">"${name}"가 이미 있습니다.</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">기존 ${existing.current_qty}${u} + 새 ${newQty}${u} = ${mergedQty}${u}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="rc-btn-primary" id="mergeBtn" style="font-size:13px;padding:7px 14px">합치기 (${mergedQty}${u})</button>
        <button class="rc-btn-secondary" id="keepBtn" style="font-size:13px;padding:7px 14px">따로 유지</button>
        <button class="rc-btn-cancel" id="mergeCancelBtn" style="font-size:13px;padding:7px 14px">취소</button>
      </div>`;
    container.after(overlay);
    overlay.scrollIntoView({ behavior: 'smooth', block: 'center' });
    overlay.querySelector('#mergeBtn').onclick = () => { overlay.remove(); resolve('merge'); };
    overlay.querySelector('#keepBtn').onclick = () => { overlay.remove(); resolve('keep'); };
    overlay.querySelector('#mergeCancelBtn').onclick = () => { overlay.remove(); resolve('cancel'); };
  });
}

async function deleteInvItem(id, name) {
  if (!confirm('"' + name + '"을 삭제할까요?')) return;
  await db.from('items').delete().eq('item_id', id);
  _items = _items.filter(x => x.item_id !== id);
  renderInventory();
  showToast('🗑 삭제됨');
}
