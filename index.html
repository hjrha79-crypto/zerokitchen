<script>
/* ════════════════════════════════
   Supabase 초기화
════════════════════════════════ */

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ════════════════════════════════
   탭 전환
════════════════════════════════ */
function switchTab(name, btn) {

  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'order') loadOrderList();
  if (name === 'new')   loadNewItems();
  if (name === 'list')  loadItemList();
}

/* ════════════════════════════════
   토스트
════════════════════════════════ */
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ════════════════════════════════
   음성 입력 (Web Speech API)
════════════════════════════════ */
let recognition = null;
let isRecording = false;
let micTimer = null;
let micDuration = 15; // 기본 15초

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'ko-KR';
  r.continuous     = false;  // 단문 세션 → Android 중복 누적 구조적 차단
  r.interimResults = true;   // 실시간 미리보기 유지

  // 직전 확정 문장 저장 → 세션 재시작 직후 동일 문장 재입력 방지
  let lastTranscript = '';

  r.onresult = (e) => {
    let finalT  = '';
    let interimT = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript.trim();
      if (e.results[i].isFinal) finalT  = t;   // 마지막 확정 결과만 사용
      else                       interimT = t;  // 미리보기
    }

    // 실시간 미리보기
    document.getElementById('micInterim').textContent = interimT;

    if (finalT && finalT !== lastTranscript) {
      lastTranscript = finalT;
      const input    = document.getElementById('textInput');
      const existing = input.value.trim();
      input.value    = existing ? existing + ' ' + finalT : finalT;
      resetMicTimer();
    }
  };

  r.onerror = (e) => {
    document.getElementById('micInterim').textContent = '';
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    stopMic();
    showToast('음성 인식 오류. 직접 입력해 주세요.');
  };

  r.onend = () => {
    document.getElementById('micInterim').textContent = '';
    if (isRecording) {
      // 단문 세션 종료 → 즉시 재시작 (끊김 없는 연속 인식)
      lastTranscript = '';  // 새 세션 시작 시 중복 체크 리셋
      setTimeout(() => { try { r.start(); } catch(_) {} }, 50);
    }
  };

  lastTranscript = '';
  return r;
}

function toggleMic() {
  if (isRecording) {
    // 수동으로 멈추면 바로 입력 처리
    const text = document.getElementById('textInput').value.trim();
    stopMic();
    if (text) handleSend();
    return;
  }
  recognition = initSpeech();
  if (!recognition) { showToast('이 브라우저는 음성 인식을 지원하지 않습니다.'); return; }
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micStatus').classList.add('recording');
  recognition.start();

  // 카운트다운 타이머 시작
  resetMicTimer();
}

function resetMicTimer() {
  if (!isRecording) return;
  // 기존 타이머 제거
  if (micTimer) { clearInterval(micTimer); micTimer = null; }

  let remaining = micDuration;
  updateMicStatus(remaining);
  micTimer = setInterval(() => {
    remaining--;
    updateMicStatus(remaining);
    if (remaining <= 0) {
      const text = document.getElementById('textInput').value.trim();
      stopMic();
      if (text) handleSend();
    }
  }, 1000);
}

function updateMicStatus(remaining) {
  const el = document.getElementById('micStatus');
  el.textContent = `듣는 중... ${remaining}초 (탭하면 즉시 입력)`;
}

function stopMic() {
  isRecording = false;
  if (micTimer) { clearInterval(micTimer); micTimer = null; }
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = `탭하면 음성 입력 (${micDuration}초)`;
  document.getElementById('micStatus').classList.remove('recording');
  if (recognition) { try { recognition.stop(); } catch(_) {} }
  const im = document.getElementById('micInterim'); if(im) im.textContent = '';
}

function setDuration(sec) {
  micDuration = sec;
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === sec + '초');
  });
  if (!isRecording) {
    document.getElementById('micStatus').textContent = `탭하면 음성 입력 (${sec}초)`;
  }
}

/* ════════════════════════════════
   전처리 & 파서  v2  (2026-03-16)
   변경: 품목경계분리 / 최장일치매칭 / 조사제거 / 유사도개선
════════════════════════════════ */
// ============================================================
// ZeroKitchen — 파서 v2 (2026-03-16)
// 수정 내용:
//   1. preprocessInput() — 경계 분리 강화, 조사 제거 확장
//   2. parseEntries()    — 최장 일치 매칭, 수량 없는 품목 처리
// ============================================================

// ─────────────────────────────────────────────────────────────
// 상수 정의
// ─────────────────────────────────────────────────────────────

// 수량 단어 → 숫자
const QTY_WORDS = {
  '영': 0, '없음': 0, '없어': 0, '없고': 0,
  '거의없음': 0.2, '거의없어': 0.2,
  '아주약간': 0.1, '약간': 0.5,
  '한': 1, '하나': 1, '일': 1,
  '두': 2, '둘': 2, '이': 2,
  '세': 3, '셋': 3, '삼': 3,
  '네': 4, '넷': 4, '사': 4,
  '다섯': 5, '오': 5,
  '여섯': 6, '육': 6,
  '일곱': 7, '칠': 7,
  '여덟': 8, '팔': 8,
  '아홉': 9, '구': 9,
  '열': 10, '십': 10,
  '열한': 11, '열두': 12, '열세': 13,
  '스물': 20, '이십': 20,
  '서른': 30, '삼십': 30,
};

// 단위 목록
const UNITS = [
  '박스', '케이스', '봉지', '봉', '팩', '캔', '통', '병',
  '개', '마리', '장', '롤', '킬로', 'kg',
  '리터', 'L', '밀리', '매',
  '묶음', '다발', '판', '줄', '세트'
];

// 조사 + 접속사 (품목명 끝에 붙었을 때 제거 대상)
const JOSA = ['은', '는', '이', '가', '을', '를', '의', '씩', '씀', '도', '만', '서', '에서'];

// 경계 접속사 (앞 품목을 끊는 신호)
// → 이 단어가 나오면 앞 품목 파싱 종료, 해당 단어는 다음 발화로
const BOUNDARY_CONJUNCTIONS = [
  '그리고', '하고', '랑', '이랑', '과', '와',
];

// 재고 0 처리 접속사 (앞 품목이 없음 = 0)
// "버섯 없고" → 버섯 재고 0
const ZERO_SIGNALS = ['없고', '없어', '없음', '없어요', '다없어', '다 없어', '떨어졌어', '떨어짐'];

// 명령어 키워드
const CMD_MAP = {
  '재고': 'SET', '있어': 'SET', '있음': 'SET',
  '입고': 'ADD', '들어왔어': 'ADD', '들어옴': 'ADD',
  '사용': 'USE', '썼어': 'USE', '소진': 'USE',
  '발주': 'ORDER',
  '추가': 'ADD',
  '수정': 'FIX', '고쳐': 'FIX',
};

// ─────────────────────────────────────────────────────────────
// 유틸리티
// ─────────────────────────────────────────────────────────────

function normalizeKey(str) {
  return str.replace(/\s+/g, '').toLowerCase();
}

function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => (i === 0 ? j : j === 0 ? i : 0))
  );
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// 품목명 길이별 동적 임계값
function dynamicThreshold(len) {
  if (len <= 3) return 1;
  if (len <= 6) return 2;
  return 3;
}

// 분수 표현 → 숫자
function parseFraction(str) {
  const m = str.match(/(\S+)분의(\S+)/);
  if (m) {
    const denom = QTY_WORDS[m[1]] ?? parseFloat(m[1]);
    const numer = QTY_WORDS[m[2]] ?? parseFloat(m[2]);
    if (!isNaN(denom) && !isNaN(numer) && denom !== 0) return numer / denom;
  }
  return null;
}

// "반" 처리
function parseHalf(str) {
  if (str === '반') return 0.5;
  const m = str.match(/^(.+)반$/);
  if (m) {
    const base = QTY_WORDS[m[1]] ?? parseFloat(m[1]);
    if (!isNaN(base)) return base + 0.5;
  }
  return null;
}

// ─────────────────────────────────────────────────────────────
// 1. preprocessInput(text)
// 변경사항:
//   - ZERO_SIGNALS 감지 → 앞 토큰에 재고=0 마킹 + 분리
//   - 경계 접속사 감지 → 구분자 | 삽입
//   - 조사 제거 목록 확장
//   - 붙여쓰기 분리 강화 (단위 앞 공백 삽입)
// ─────────────────────────────────────────────────────────────

function preprocessInput(text) {
  let s = text.trim();

  // 1-1. 숫자+단위 붙여쓰기 분리: "3봉지" → "3 봉지"
  s = s.replace(/(\d)(봉지|봉|박스|케이스|팩|캔|통|병|개|킬로|kg|리터|롤|묶음|다발|판|장)/g, '$1 $2');

  // 1-2. 단위 뒤 품목명 경계 삽입 (붙여쓰기 + 공백 모두 처리)
  const unitPattern = UNITS.join('|');
  // 붙여쓰기: 단위+한글
  s = s.replace(new RegExp(`(${unitPattern})([가-힣]{2,})`, 'g'), '$1 | $2');
  // 공백 있는 경우: 단위 + 공백 + 한글명사 (수량단어/단위 제외)
  const qtyWordsSet = new Set(Object.keys(QTY_WORDS));
  const unitsSet = new Set(UNITS);
  s = s.replace(
    new RegExp(`(${unitPattern}) ([가-힣]{2,})`, 'g'),
    (match, u, next) => {
      if (qtyWordsSet.has(next) || unitsSet.has(next)) return match;
      return u + ' | ' + next;
    }
  );

  // 1-3. 수량 단어+품목 붙여쓰기 분리: "두봉지" → "두 봉지", "세개" → "세 개"
  const qtyWordPattern = Object.keys(QTY_WORDS)
    .filter(k => k.length >= 2)
    .sort((a, b) => b.length - a.length)
    .join('|');
  s = s.replace(
    new RegExp(`(${qtyWordPattern})(봉지|봉|박스|케이스|팩|캔|통|병|개|킬로|kg|리터|롤|묶음)`, 'g'),
    '$1 $2'
  );

  // 1-4. ZERO_SIGNALS 처리: "버섯 없고 새우칠리소스" → "버섯 없고 | 새우칠리소스"
  //      "없고" 뒤에 한글이 오면 경계 삽입
  for (const zs of ZERO_SIGNALS) {
    // "없고 품목명" 패턴 → 경계 삽입
    s = s.replace(
      new RegExp(`(${zs})\\s+([가-힣])`, 'g'),
      `$1 | $2`
    );
  }

  // 1-5. 경계 접속사 → 구분자로 치환
  for (const conj of BOUNDARY_CONJUNCTIONS) {
    s = s.replace(new RegExp(`\\s*${conj}\\s*`, 'g'), ' | ');
  }

  // 1-6. 조사 제거: 품목명 끝에 붙은 조사 strip
  //      단, 수량 단어나 단위 뒤에 붙은 건 제거하지 않음
  for (const josa of JOSA) {
    // "스파게티는" → "스파게티" (단위/수량 아닌 한글 뒤)
    s = s.replace(
      new RegExp(`([가-힣]{2,})${josa}(\\s|\\||$)`, 'g'),
      (match, word, tail) => {
        // 수량 단어면 그대로 유지
        if (QTY_WORDS[word] !== undefined) return match;
        // 단위면 그대로 유지
        if (UNITS.includes(word)) return match;
        return `${word}${tail}`;
      }
    );
  }

  // 1-6b. 단위 뒤 수량+단위 패턴 → 경계 삽입
  //         '세 봉지 한 개' → '세 봉지 | 한 개'  (같은 품목 단위 중복 방지)
  {
    const _up = UNITS.join('|');
    const _qp = Object.keys(QTY_WORDS).filter(k => k.length >= 1).sort((a,b)=>b.length-a.length).join('|');
    s = s.replace(
      new RegExp('(' + _up + ') (' + _qp + '|\d+(?:\.\d+)?) (' + _up + ')', 'g'),
      (match, u1, qty, u2) => u1 + ' | ' + qty + ' ' + u2
    );
  }
  // 1-7. 다중 공백 정리
  s = s.replace(/\s{2,}/g, ' ').trim();

  return s;
}

// ─────────────────────────────────────────────────────────────
// 2. parseEntries(text, itemList)
// 변경사항:
//   - ZERO_SIGNALS → 해당 품목 qty=0, cmd=SET
//   - 최장 일치 매칭: itemList(품목 DB)를 prefix로 비교
//   - 단위 기반 suffix 자동 부여
//   - 수량 단어 품목명 오파싱 방지 강화
// ─────────────────────────────────────────────────────────────

// 단위 → 품목 suffix 매핑
const UNIT_SUFFIX_MAP = {
  '봉지': '소분', '봉': '소분',
  '캔': '캔', '통': '캔',
  '팩': '팩',
  '박스': '박스', '케이스': '박스',
  '병': '병',
  // 개, 킬로, kg 등은 suffix 없음
};

function parseEntries(rawText, itemList = []) {
  const preprocessed = preprocessInput(rawText);
  const segments = preprocessed.split('|').map(s => s.trim()).filter(Boolean);

  const results = [];

  for (const seg of segments) {
    const tokens = seg.split(/\s+/).filter(Boolean);
    if (tokens.length === 0) continue;

    // 명령어 추출
    let cmd = 'SET';
    const filteredTokens = [];
    for (const t of tokens) {
      if (CMD_MAP[t]) { cmd = CMD_MAP[t]; }
      else { filteredTokens.push(t); }
    }

    // ZERO_SIGNAL 감지: "버섯 없고" → qty=0, cmd=SET
    const hasZeroSignal = filteredTokens.some(t => ZERO_SIGNALS.includes(t));
    const cleanTokens = filteredTokens.filter(t => !ZERO_SIGNALS.includes(t));

    if (cleanTokens.length === 0) continue;

    // 토큰 순회하며 품목명 + 수량 + 단위 추출
    let itemName   = '';
    let spokenName = '';   // 실제로 말한 원본 토큰 (fuzzy 매칭 시 itemName과 다름)
    let qty = hasZeroSignal ? 0 : null;
    let unit = '';
    let fromDB = false;
    let i = 0;

    while (i < cleanTokens.length) {
      const token = cleanTokens[i];

      // 단위 감지
      if (UNITS.includes(token)) {
        unit = token;
        i++;
        continue;
      }

      // 수량 감지 (숫자)
      const num = parseFloat(token);
      if (!isNaN(num)) {
        qty = num;
        i++;
        continue;
      }

      // 수량 감지 (단어)
      if (QTY_WORDS[token] !== undefined && itemName !== '') {
        // 이미 품목명이 있을 때만 수량으로 해석
        qty = QTY_WORDS[token];
        i++;
        continue;
      }

      // 분수 표현
      const frac = parseFraction(token);
      if (frac !== null) {
        qty = frac;
        i++;
        continue;
      }

      // 반 표현
      const half = parseHalf(token);
      if (half !== null && itemName !== '') {
        qty = half;
        i++;
        continue;
      }

      // 품목명 최장 일치 매칭
      const matched = longestMatchFromDB(cleanTokens, i, itemList);
      if (matched) {
        if (itemName !== '') {
          results.push(buildEntry(itemName, qty, unit, cmd, seg, hasZeroSignal, spokenName));
          qty = null; unit = ''; fromDB = false; spokenName = '';
        itemName   = matched.name;                 // DB 이름 (정확/fuzzy 모두)
        spokenName = matched.spoken || matched.name; // 실제 말한 원본
        fromDB     = !matched.fuzzy;
        i += matched.tokenCount;
        continue;
      }

      // DB 매칭 실패
      if (itemName === '' && QTY_WORDS[token] !== undefined) {
        // 품목명 없을 때 수량 단어 → 수량으로 해석
        qty = QTY_WORDS[token];
      } else if (fromDB && itemName !== '') {
        // DB 매칭으로 확정된 품목이 있는데 새 미매칭 토큰 → 현재 품목 저장 후 새 품목 시작
        results.push(buildEntry(itemName, qty, unit, cmd, seg, hasZeroSignal, spokenName));
        qty = null; unit = ''; fromDB = false; spokenName = '';
        itemName = token;
      } else {
        itemName += token;
      }
      i++;
    }

    // 마지막 품목 저장
    if (itemName !== '') {
      results.push(buildEntry(itemName, qty, unit, cmd, seg, hasZeroSignal, spokenName));
    }
  }

  return results;
}

// 품목 DB에서 최장 일치 탐색 (1~5토큰 조합 시도)
function longestMatchFromDB(tokens, startIdx, itemList) {
  if (!itemList || itemList.length === 0) return null;

  const MAX_COMBINE = 5;
  let best = null;

  // 1. 정확 매칭: 긴 조합부터 시도 (최장 일치 우선)
  for (let take = Math.min(MAX_COMBINE, tokens.length - startIdx); take >= 1; take--) {
    const candidate = normalizeKey(tokens.slice(startIdx, startIdx + take).join(''));
    for (const item of itemList) {
      if (normalizeKey(item.item_name) === candidate) {
        if (!best || take > best.tokenCount) {
          best = { name: item.item_name, tokenCount: take, fuzzy: false };
        }
        break;
      }
    }
    if (best && best.tokenCount === take) return best; // 이 길이에서 찾았으면 반환
  }
  if (best) return best;

  // 2. 유사도 매칭 (단일 토큰, 정확 매칭 실패 시)
  const singleToken = normalizeKey(tokens[startIdx]);
  if (singleToken.length >= 3) { // 3자 미만 토큰은 유사도 매칭 skip (오탐 방지)
    let fuzzyBest = null;
    for (const item of itemList) {
      const target = normalizeKey(item.item_name);
      const threshold = dynamicThreshold(target.length);
      const dist = editDistance(singleToken, target);
      if (dist > 0 && dist <= threshold) {
        if (!fuzzyBest || dist < fuzzyBest.dist) {
          fuzzyBest = { name: item.item_name, tokenCount: 1, fuzzy: true, dist };
        }
      }
    }
    if (fuzzyBest) {
      // spoken: 실제로 말한 원본 토큰 저장 (name은 DB 이름)
      fuzzyBest.spoken = tokens[startIdx];
      return fuzzyBest;
    }
  }

  return null;
}

// 단위 suffix 자동 부여
function applyUnitSuffix(itemName, unit, itemList) {
  if (!unit) return itemName;
  const suffix = UNIT_SUFFIX_MAP[unit];
  if (!suffix) return itemName; // 개/kg 등은 suffix 없음

  const withSuffix = `${itemName} ${suffix}`;

  // DB에 suffix 붙인 품목이 실제 존재하면 그걸 사용
  if (itemList && itemList.some(it => normalizeKey(it.item_name) === normalizeKey(withSuffix))) {
    return withSuffix;
  }
  // 존재하지 않으면 원본 유지 (신규 등록 흐름으로)
  return itemName;
}

function buildEntry(itemName, qty, unit, cmd, rawText, isZero, spoken) {
  const finalQty = isZero ? 0 : (qty ?? 1);
  const finalCmd = isZero ? 'SET' : cmd;

  const CMD_TO_LABEL = { SET:'재고', ADD:'입고', USE:'사용', ORDER:'발주', FIX:'재고' };
  const CMD_TO_MODE  = { SET:'SET', ADD:'ADD', USE:'SET', ORDER:'SET', FIX:'FIX' };

  const dbName     = itemName.trim();
  const spokenText = (spoken || itemName).trim();

  return {
    item:      dbName,        // DB에서 매칭된 이름 (또는 입력 그대로)
    item_name: dbName,
    spoken:    spokenText,    // 실제로 말한/입력한 원본 텍스트
    isFuzzy:   spokenText !== dbName,  // fuzzy 매칭 여부
    qty:       finalQty,
    unit:      unit || '',
    cmd:       CMD_TO_LABEL[finalCmd] || '재고',
    mode:      CMD_TO_MODE[finalCmd]  || 'SET',
    raw_text:  rawText,
  };
}

// ─────────────────────────────────────────────────────────────
// 3. mergeSameUtterance(entries)
// 동일 발화 내 같은 품목명 합산 (SET은 마지막 값 우선)
// ─────────────────────────────────────────────────────────────

function mergeSameUtterance(entries) {
  const map = new Map();
  for (const entry of entries) {
    const key = normalizeKey(entry.item_name);
    if (!map.has(key)) {
      map.set(key, { ...entry });
    } else {
      const prev = map.get(key);
      if (entry.cmd === 'ADD' || prev.cmd === 'ADD') {
        prev.qty += entry.qty;
        prev.cmd = 'ADD';
      } else {
        // SET: 마지막 값 우선
        prev.qty = entry.qty;
      }
    }
  }
  return Array.from(map.values());
}

function applyTypoRules(text, rules) {
  let s = String(text || '');
  for (const rule of rules) {
    if (!rule.enabled) continue;
    if (rule.rule_type === 'EXACT') {
      const f = rule.from_text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      s = s.replace(new RegExp('(^|\\s)' + f + '(?=\\s|$)', 'g'), '$1' + rule.to_text);
    } else if (rule.rule_type === 'CONTAINS') {
      s = s.split(rule.from_text).join(rule.to_text);
    }
  }
  return s;
}

/* ════════════════════════════════
   메인 입력 처리 — 미리보기 후 저장
════════════════════════════════ */

// 미리보기 상태 저장
let _previewData = null;  // { rawText, entries, itemMap, items }

async function handleSend() {
  const input   = document.getElementById('textInput');
  const rawText = input.value.trim();
  if (!rawText) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';

  try {
    // 오타사전 로드
    const { data: typoRules } = await db.from('typo_dict').select('*').eq('enabled', true).order('priority');

    // 전처리 + 오타 교정 + 파싱
    const corrected     = applyTypoRules(rawText, typoRules || []);
    const cleaned       = preprocessInput(corrected);
    const { data: items } = await db.from('items').select('*');
    const entries       = parseEntries(cleaned, items || []);

    if (entries.length === 0) {
      addResult(rawText, '❌ 분리 실패 — 품목명과 수량을 확인해 주세요', 'err');
      return;
    }

    const mergedEntries = mergeSameUtterance(entries);
    const itemMap = new Map();
    (items || []).forEach(it => itemMap.set(normalizeKey(it.item_name), it));

    // 미리보기 패널 표시 (DB 저장 없음)
    showPreview(rawText, mergedEntries, itemMap, items || []);
    input.value = '';

  } catch(err) {
    addResult(rawText, '❌ 오류: ' + err.message, 'err');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '입력';
  }
}

function showPreview(rawText, entries, itemMap, items) {
  _previewData = { rawText, entries: [...entries], itemMap, items, forceNew: new Set() };

  document.getElementById('previewRaw').textContent = rawText;

  const list = document.getElementById('previewList');
  list.innerHTML = '';

  entries.forEach((ent, idx) => {
    const key     = normalizeKey(ent.item);
    const matched = itemMap.get(key);

    // 유사 품목 탐색
    const similar = !matched ? (items || []).find(it => {
      const a = normalizeKey(it.item_name);
      const b = normalizeKey(ent.item);
      if (a === b) return false;
      if (Math.abs(a.length - b.length) >= 3) return false;
      if (a.includes(b) || b.includes(a)) return true;
      return editDistance(a, b) <= 2;
    }) : null;

    let badgeHtml, detailHtml, itemClass, extraBtn = '';
    // ent.isFuzzy: 파서가 fuzzy 매칭 → 말한 것(ent.spoken)과 DB명(ent.item)이 다름
    const isMismatch = ent.isFuzzy && matched;
    if (matched && !isMismatch) {
      itemClass  = 'known-item';
      badgeHtml  = `<span class="preview-item-badge badge-known">기존</span>`;
      detailHtml = `${ent.qty}${ent.unit} → ${ent.cmd}`;
    } else if (isMismatch) {
      // 파서 오매칭: 말한 건 "${ent.spoken}"인데 DB에선 "${ent.item}"으로 처리됨
      itemClass  = 'new-item';
      badgeHtml  = `<span class="preview-item-badge badge-queue">혹시 "${ent.item}"?</span>`;
      detailHtml = `"${ent.spoken}" 입력 → ${ent.qty}${ent.unit}`;
      extraBtn   = `<button class="btn-force-new" id="fn_${idx}" onclick="forceNewItem(${idx}, '${ent.item.replace(/'/g,"\'")}')">신규로 등록 (${ent.spoken})</button>`;
    } else if (similar) {
      itemClass  = 'new-item';
      badgeHtml  = `<span class="preview-item-badge badge-queue">혹시 "${similar.item_name}"?</span>`;
      detailHtml = `신규탭 대기`;
      // ✅ "신규로 등록" 버튼 — 클릭하면 유사도 무시하고 신규 강제 등록
      extraBtn = `<button class="btn-force-new" id="fn_${idx}" onclick="forceNewItem(${idx}, '${similar.item_name.replace(/'/g,"\'")}')">신규로 등록</button>`;
    } else {
      itemClass  = 'new-item';
      badgeHtml  = `<span class="preview-item-badge badge-new">신규→대기</span>`;
      detailHtml = `${ent.qty}${ent.unit} · 신규탭에서 승인 필요`;
    }

    const div = document.createElement('div');
    div.className = `preview-item ${itemClass}`;
    div.id = `pi_${idx}`;
    div.innerHTML = `
      <div class="preview-item-info">
        <div class="preview-item-name">${ent.item}</div>
        <div class="preview-item-detail" id="pd_${idx}">${detailHtml}</div>
        ${extraBtn}
      </div>
      ${badgeHtml}
      <button class="preview-del-btn" onclick="removePreviewItem(${idx})" title="이 항목 제외">✕</button>
    `;
    list.appendChild(div);
  });

  document.getElementById('previewOverlay').classList.add('open');
}

// 유사도 무시하고 신규로 강제 등록 표시
function forceNewItem(idx, matchedName) {
  _previewData.forceNew.add(idx);
  // spoken 이름으로 item을 교체 (DB에서 오매칭된 이름 → 실제 말한 이름)
  const ent = _previewData.entries[idx];
  if (ent && ent.spoken && ent.spoken !== ent.item) {
    ent.item      = ent.spoken;
    ent.item_name = ent.spoken;
    ent.isFuzzy   = false;
  }
  const card = document.getElementById('pi_' + idx);
  card.classList.add('force-new');
  const badge = card.querySelector('.preview-item-badge');
  if (badge) { badge.className = 'preview-item-badge badge-new'; badge.textContent = '신규 등록'; }
  const detail = document.getElementById('pd_' + idx);
  if (detail) detail.textContent = `"${ent ? ent.item : ''}" — 신규 품목으로 직접 등록`;
  const btn = document.getElementById('fn_' + idx);
  if (btn) btn.remove();
}

function removePreviewItem(idx) {
  _previewData.entries[idx] = null;
  if (_previewData.forceNew) _previewData.forceNew.delete(idx);
  const el = document.getElementById('pi_' + idx);
  if (el) el.style.opacity = '0.3';
  const delBtn = el.querySelector('.preview-del-btn');
  if (delBtn) delBtn.disabled = true;
  const forceBtn = document.getElementById('fn_' + idx);
  if (forceBtn) forceBtn.remove();
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  _previewData = null;
}

async function confirmPreview() {
  if (!_previewData) return;
  const { rawText, entries, itemMap, items, forceNew } = _previewData;

  const confirmBtn = document.querySelector('.preview-confirm-btn');
  confirmBtn.disabled = true;
  confirmBtn.innerHTML = '<span class="spinner"></span>';

  try {
    const activeEntries = entries.filter(e => e !== null);
    const msgs = [];

    for (const ent of activeEntries) {
      const key     = normalizeKey(ent.item);
      const matched = itemMap.get(key);

      const origIdx    = entries.indexOf(ent);
      const isForceNew = forceNew && forceNew.has(origIdx);
      const isMismatch = ent.isFuzzy && matched;  // 파서 fuzzy 오매칭

      if (!matched || (isMismatch && isForceNew)) {
        // 신규 품목 → items에 바로 등록
        const similar = (!isForceNew && !matched) ? (items || []).find(it => {
          const a = normalizeKey(it.item_name);
          const b = normalizeKey(ent.item);
          if (a === b) return false;
          if (Math.abs(a.length - b.length) >= 3) return false;
          if (a.includes(b) || b.includes(a)) return true;
          return editDistance(a, b) <= 2;
        }) : null;

        if (similar && !isForceNew) {
          // 유사 품목 있고 강제 신규 아님 → 신규탭 대기
          const { data: existingQ } = await db
            .from('new_items_queue').select('id')
            .eq('candidate_item', ent.item).eq('status', 'PENDING').limit(1);
          if (!existingQ || existingQ.length === 0) {
            await db.from('new_items_queue').insert({
              raw_text: rawText, candidate_item: ent.item,
              parsed_qty: ent.qty, unit: ent.unit,
              cmd: ent.cmd, status: 'PENDING'
            });
          }
          msgs.push({ text: `🔍 "${ent.item}" → 혹시 "${similar.item_name}"? 신규 탭에서 확인`, type: 'warn' });
        } else {
          // 바로 items에 직접 등록
          const initQty = ent.cmd === '입고' ? ent.qty
                        : ent.cmd === '사용' ? -ent.qty
                        : ent.cmd === '발주' ? 0 : ent.qty;
          const { data: newItem, error: insertErr } = await db.from('items').insert({
            item_name: ent.item, unit: ent.unit || '개',
            pack_factor: 1, target_qty: 0, current_qty: initQty
          }).select().single();
          if (!insertErr && newItem) {
            await db.from('inventory_log').insert({
              item_id: newItem.id, item_name: newItem.item_name,
              qty: ent.qty, unit: ent.unit, cmd: '재고',
              actor: 'owner', raw_text: rawText
            });
            msgs.push({ text: `🆕 ${ent.item} ${ent.qty}${ent.unit||''} — 신규 등록 완료`, type: 'ok' });
          } else {
            msgs.push({ text: `❌ "${ent.item}" 등록 실패`, type: 'err' });
          }
        }
        continue;
      }

      // 파서 오매칭이지만 forceNew 아님 → 유사 품목으로 처리 (기존 흐름)
      if (isMismatch && !isForceNew) {
        const { data: existingQ } = await db
          .from('new_items_queue').select('id')
          .eq('candidate_item', ent.item).eq('status', 'PENDING').limit(1);
        if (!existingQ || existingQ.length === 0) {
          await db.from('new_items_queue').insert({
            raw_text: rawText, candidate_item: ent.item,
            parsed_qty: ent.qty, unit: ent.unit,
            cmd: ent.cmd, status: 'PENDING'
          });
        }
        msgs.push({ text: `🔍 "${ent.item}" → 혹시 "${matched.item_name}"? 신규 탭에서 확인`, type: 'warn' });
        continue;
      }

      // 기존 품목 → 재고 반영
      const cur  = Number(matched.current_qty) || 0;
      const mode = ent.mode || 'SET';
      let newQty = cur, modeLabel = '';

      if (ent.cmd === '입고')      { newQty = cur + ent.qty; modeLabel = '입고'; }
      else if (ent.cmd === '사용') { newQty = cur - ent.qty; modeLabel = '사용'; }
      else if (ent.cmd === '발주') { newQty = cur;           modeLabel = '발주'; }
      else if (mode === 'FIX')     { newQty = ent.qty;       modeLabel = '수정'; }
      else if (mode === 'ADD')     { newQty = cur + ent.qty; modeLabel = '추가'; }
      else                         { newQty = ent.qty;       modeLabel = '재고'; }

      if (ent.cmd !== '발주') {
        await db.from('items')
          .update({ current_qty: newQty, updated_at: new Date().toISOString() })
          .eq('id', matched.id);
      }
      await db.from('inventory_log').insert({
        item_id: matched.id, item_name: matched.item_name,
        qty: ent.qty, unit: ent.unit, cmd: modeLabel,
        actor: 'owner', raw_text: rawText
      });

      const icon = ent.cmd==='입고'?'📦':ent.cmd==='사용'?'🍳':ent.cmd==='발주'?'🧾':mode==='FIX'?'✏️':mode==='ADD'?'➕':'✅';
      msgs.push({
        text: `${icon} ${matched.item_name} ${ent.qty}${ent.unit} → ${newQty}${matched.unit} (${modeLabel})`,
        type: 'ok', itemId: matched.id, itemName: matched.item_name,
        prevQty: cur, newQty, unit: matched.unit
      });
    }

    closePreview();
    msgs.forEach(m => addResult(rawText, m.text, m.type, m.itemId, m.itemName, m.prevQty, m.newQty, m.unit));

  } catch(err) {
    showToast('저장 실패: ' + err.message);
  } finally {
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✅ 저장하기';
  }
}

let resultIdCounter = 0;

function addResult(raw, msg, type, itemId, itemName, prevQty, newQty, unit) {
  const list   = document.getElementById('resultList');
  const now    = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const rid    = 'r' + (++resultIdCounter);
  const header = list.querySelector('.result-header');
  const div    = document.createElement('div');
  div.className = `result-item ${type}`;
  div.id = rid;

  const canEdit = type === 'ok' && itemId !== undefined;
  const canUndo = canEdit && prevQty !== undefined;

  const actionBtns = canEdit ? `
    <button class="edit-btn" onclick="toggleResultEdit('${rid}', ${itemId}, '${(itemName||'').replace(/'/g,"\\'")}', ${newQty??0}, '${unit||''}', ${prevQty??0})">✏️</button>
    ${canUndo ? `<button class="undo-btn" onclick="undoEntry('${rid}', ${itemId}, ${prevQty}, '${(itemName||'').replace(/'/g,"\\'")}')">↩️</button>` : ''}
  ` : '';

  div.innerHTML = `
    <div style="flex:1">
      <div class="result-raw">${raw}</div>
      <div class="result-msg" id="${rid}-msg">${msg}</div>
      <div class="result-edit-row" id="${rid}-edit"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      ${actionBtns}
      <div class="result-time">${now}</div>
    </div>
  `;
  header.after(div);
}

function toggleResultEdit(rid, itemId, itemName, curQty, unit, prevQty) {
  const row = document.getElementById(rid + '-edit');
  if (row.children.length > 0) {
    row.innerHTML = '';
    return;
  }
  row.innerHTML = `
    <span class="edit-label">품목명</span>
    <input class="edit-input wide" id="${rid}-ename" value="${itemName}">
    <span class="edit-label">수량</span>
    <input class="edit-input" id="${rid}-eqty" type="number" value="${curQty}" style="width:64px">
    <input class="edit-input" id="${rid}-eunit" value="${unit}" style="width:52px">
    <button class="btn-edit-save" onclick="saveResultEdit('${rid}', ${itemId}, ${prevQty})">저장</button>
    <button class="btn-edit-cancel" onclick="document.getElementById('${rid}-edit').innerHTML=''">취소</button>
  `;
  document.getElementById(rid + '-ename').focus();
}

async function saveResultEdit(rid, itemId, prevQty) {
  const newName = document.getElementById(rid + '-ename').value.trim();
  const newQty  = parseFloat(document.getElementById(rid + '-eqty').value);
  const newUnit = document.getElementById(rid + '-eunit').value.trim();
  if (!newName) { showToast('품목명을 입력해 주세요.'); return; }
  try {
    await db.from('items').update({
      item_name:   newName,
      current_qty: newQty,
      unit:        newUnit,
      updated_at:  new Date().toISOString()
    }).eq('id', itemId);
    await db.from('inventory_log').insert({
      item_id: itemId, item_name: newName,
      qty: newQty, unit: newUnit,
      cmd: '수정', actor: 'owner', raw_text: '결과화면 수정'
    });
    document.getElementById(rid + '-msg').textContent = `✏️ ${newName} → ${newQty}${newUnit} (수정됨)`;
    document.getElementById(rid + '-edit').innerHTML = '';
    document.getElementById(rid).className = 'result-item ok';
    showToast(`✅ ${newName} 수정 완료`);
  } catch(e) {
    showToast('수정 실패: ' + e.message);
  }
}

async function undoEntry(rid, itemId, prevQty, itemName) {
  if (!confirm(`"${itemName}" 재고를 ${prevQty}로 되돌릴까요?`)) return;
  try {
    await db.from('items')
      .update({ current_qty: prevQty, updated_at: new Date().toISOString() })
      .eq('id', itemId);
    document.getElementById(rid).remove();
    showToast(`↩️ ${itemName} 재고 ${prevQty}로 복구됨`);
  } catch(e) {
    showToast('되돌리기 실패: ' + e.message);
  }
}

async function loadOrderList() {
  const el = document.getElementById('orderList');
  el.innerHTML = '<div class="no-order"><span class="spinner"></span></div>';

  const { data: items } = await db
    .from('items')
    .select('*, vendors(vendor_name)')
    .order('vendor_id');

  if (!items || items.length === 0) {
    el.innerHTML = '<div class="no-order">등록된 품목이 없습니다.</div>';
    return;
  }

  // 발주 필요 품목만 (current < target)
  const needOrder = items.filter(it => Number(it.current_qty) < Number(it.target_qty));
  if (needOrder.length === 0) {
    el.innerHTML = '<div class="no-order">✅ 발주 필요 품목 없음</div>';
    return;
  }

  // 거래처별 그룹
  const groups = {};
  needOrder.forEach(it => {
    const v = it.vendors?.vendor_name || '거래처 미지정';
    if (!groups[v]) groups[v] = [];
    groups[v].push(it);
  });

  let html = '<div class="vendor-section">';
  for (const [vendor, list] of Object.entries(groups)) {
    html += `<div class="vendor-name">📦 ${vendor}</div>`;
    list.forEach(it => {
      const suggest = Math.max(0, Number(it.target_qty) - Number(it.current_qty));
      html += `
        <div class="order-item">
          <div class="order-item-name">${it.item_name}</div>
          <div class="order-item-stock">현재 ${it.current_qty}/${it.target_qty}</div>
          <div class="order-qty-wrap">
            <input class="order-qty" type="number" value="${suggest}" min="0" id="qty_${it.id}">
            <span class="order-unit">${it.unit}</span>
          </div>
        </div>`;
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

async function approveItem(id) {
  const memo = document.getElementById('memo_' + id).value.trim();
  if (!memo) { showToast('품목명을 입력해 주세요.'); return; }

  // 오타사전 자동학습 (원본 후보와 다를 때)
  const { data: row } = await db.from('new_items_queue').select('*').eq('id', id).single();
  if (row && row.candidate_item !== memo) {
    const { data: existing } = await db
      .from('typo_dict')
      .select('id')
      .eq('from_text', row.candidate_item)
      .eq('to_text', memo)
      .limit(1);
    if (!existing || existing.length === 0) {
      await db.from('typo_dict').insert({
        from_text: row.candidate_item,
        to_text:   memo,
        rule_type: 'EXACT',
        enabled:   true,
        priority:  50,
        note:      'NEW_ITEMS 승인 자동학습'
      });
    }
  }

  // 발주기준(items)에 등록
  const { data: existing } = await db.from('items').select('id').eq('item_name', memo).limit(1);
  if (!existing || existing.length === 0) {
    await db.from('items').insert({
      item_name:   memo,
      unit:        row?.unit || '개',
      pack_factor: 1,
      target_qty:  1,
      current_qty: Number(row?.parsed_qty) || 0
    });
  }

  // 상태 DONE으로 변경
  await db.from('new_items_queue').update({ status: 'DONE', memo }).eq('id', id);

  document.getElementById('card_' + id).remove();
  showToast(`✅ "${memo}" 등록 완료`);

  const remaining = document.querySelectorAll('[id^="card_"]').length;
  if (remaining === 0) {
    document.getElementById('newItemList').innerHTML = '<div class="no-pending">✅ 미등록 품목 없음</div>';
  }
}

async function rejectItem(id) {
  await db.from('new_items_queue').update({ status: 'REJECTED' }).eq('id', id);
  document.getElementById('card_' + id).remove();
  showToast('거절 처리됨');
}

════════════════════════════════ */
if ('serviceWorker' in navigator) {
  // 인라인 서비스워커 (단일 파일)
  const swCode = `
    const CACHE = 'zerokitchen-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
    });
    self.addEventListener('fetch', e => {
      // Supabase API는 캐시 안 함
      if (e.request.url.includes('supabase.co')) return;
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

   목록 탭 — 전체 상품 조회 / 수정 / 삭제

let _allItems    = [];
let _vendors     = {};
let _vendorList  = [];  // [{id, vendor_name}, ...]
let _currentSort = 'name';

function _vendorOptions(selectedId) {
  return _vendorList.map(v =>
    `<option value="${v.id}" ${v.id == selectedId ? 'selected' : ''}>${v.vendor_name}</option>`
  ).join('');
}

async function loadItemList() {
  const body = document.getElementById('itemListBody');
  body.innerHTML = '<div class="no-items"><span class="spinner"></span></div>';

  const [{ data, error }, { data: vendorData }] = await Promise.all([
    db.from('items').select('*, vendors(vendor_name)').order('item_name'),
    db.from('vendors').select('id, vendor_name').order('vendor_name')
  ]);

  if (error || !data) { body.innerHTML = '<div class="no-items">로드 실패</div>'; return; }
  _allItems = data;

  // 거래처 목록 저장 (edit 폼에서 사용)
  _vendorList = (vendorData || []);

  // 거래처 드롭다운 구성
  const vendorSel = document.getElementById('vendorFilter');
  while (vendorSel.options.length > 1) vendorSel.remove(1);
  const usedVendors = new Map();
  _allItems.forEach(it => {
    const vn = it.vendors?.vendor_name || '거래처 미지정';
    if (!usedVendors.has(vn)) usedVendors.set(vn, true);
  });
  [...usedVendors.keys()].sort().forEach(vn => {
    const opt = document.createElement('option');
    opt.value = vn; opt.textContent = vn;
    vendorSel.appendChild(opt);
  });

  applyListFilter();
  checkDuplicates();
}

function checkDuplicates() {
  const nameMap = new Map();
  _allItems.forEach(it => {
    const k = normalizeKey(it.item_name);
    if (!nameMap.has(k)) nameMap.set(k, []);
    nameMap.get(k).push(it);
  });
  const dups = [...nameMap.values()].filter(arr => arr.length > 1);

  // 기존 배너 제거
  document.querySelectorAll('.dup-banner').forEach(el => el.remove());

  if (dups.length === 0) return;

  const body = document.getElementById('itemListBody');
  const banner = document.createElement('div');
  banner.className = 'dup-banner';
  banner.innerHTML = `
    <span>⚠️ 이름 같은 품목 ${dups.length}건 발견</span>
    <button onclick="showDupModal()">중복 병합</button>
  `;
  body.parentElement.insertBefore(banner, body);

  // 중복 아이템 하이라이트
  dups.flat().forEach(it => {
    const row = document.getElementById('irow_' + it.id);
    if (row) row.classList.add('dup-item');
  });

  // 모달용 저장
  window._dupGroups = dups;
}

function showDupModal() {
  const dups = window._dupGroups || [];
  if (dups.length === 0) return;

  const existing = document.getElementById('dupModal');
  if (existing) existing.remove();

  let html = `
  <div id="dupModal" style="
    position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;
    display:flex;align-items:flex-end;
  " onclick="if(event.target===this)this.remove()">
    <div style="
      width:100%;max-height:80vh;background:var(--surface);
      border-radius:16px 16px 0 0;overflow-y:auto;padding:20px;
    ">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px">⚠️ 중복 품목 병합</div>`;

  dups.forEach((group, gi) => {
    html += `<div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)">
      <div style="font-size:13px;color:var(--warn);font-weight:700;margin-bottom:8px">
        "${group[0].item_name}" — ${group.length}개 중복
      </div>`;
    group.forEach((it, ii) => {
      html += `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:14px">${it.item_name}</span>
        <span style="font-family:monospace;color:var(--accent);font-size:13px">${it.current_qty ?? 0} ${it.unit||''}</span>
        <span style="font-size:11px;color:var(--text-muted)">#${it.id}</span>
      </div>`;
    });
    const keepId   = group[0].id;
    const deleteIds = group.slice(1).map(it => it.id).join(',');
    html += `
      <div style="margin-top:10px;display:flex;gap:8px">
        <button onclick="mergeDups(${gi})" style="
          flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;
          color:#000;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer
        ">✅ 첫 번째로 합치기 (나머지 삭제)</button>
      </div>
    </div>`;
  });

  html += `
      <button onclick="document.getElementById('dupModal').remove()" style="
        width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);
        border-radius:8px;color:var(--text-dim);font-family:inherit;font-size:14px;cursor:pointer;margin-top:4px
      ">닫기</button>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

async function mergeDups(groupIdx) {
  const group = (window._dupGroups || [])[groupIdx];
  if (!group || group.length < 2) return;

  const keeper   = group[0];
  const toDelete = group.slice(1);

  try {
    // 재고 합산 (수량 합치기)
    const totalQty = group.reduce((sum, it) => sum + (Number(it.current_qty) || 0), 0);
    await db.from('items')
      .update({ current_qty: totalQty, updated_at: new Date().toISOString() })
      .eq('id', keeper.id);

    // 나머지 삭제
    for (const it of toDelete) {
      await db.from('items').delete().eq('id', it.id);
    }

    showToast(`✅ "${keeper.item_name}" 병합 완료 (재고 ${totalQty} 합산)`);
    document.getElementById('dupModal')?.remove();
    loadItemList();  // 새로고침
  } catch(e) {
    showToast('병합 실패: ' + e.message);
  }
}

function applyListFilter() {
  const q      = (document.getElementById('listSearch')?.value || '').trim();
  const vendor = document.getElementById('vendorFilter')?.value || '';
  const stock  = document.getElementById('stockFilter')?.value  || '';

  let items = [..._allItems];
  if (q)      items = items.filter(it => it.item_name.includes(q));
  if (vendor) items = items.filter(it => (it.vendors?.vendor_name || '거래처 미지정') === vendor);
  if (stock === 'low')  items = items.filter(it => Number(it.current_qty) < Number(it.target_qty));
  if (stock === 'zero') items = items.filter(it => Number(it.current_qty) <= 0);

  // 정렬
  items.sort((a, b) => {
    const aQty = Number(a.current_qty) || 0;
    const bQty = Number(b.current_qty) || 0;
    const aV   = a.vendors?.vendor_name || 'ㅎ';
    const bV   = b.vendors?.vendor_name || 'ㅎ';
    const aU   = a.updated_at || a.created_at || '';
    const bU   = b.updated_at || b.created_at || '';
    if (_currentSort === 'name')      return a.item_name < b.item_name ? -1 : a.item_name > b.item_name ? 1 : 0;
    if (_currentSort === 'vendor')    return aV < bV ? -1 : aV > bV ? 1 : (a.item_name < b.item_name ? -1 : 1);
    if (_currentSort === 'qty-asc')   return aQty - bQty;
    if (_currentSort === 'qty-desc')  return bQty - aQty;
    if (_currentSort === 'updated')   return bU < aU ? -1 : bU > aU ? 1 : 0;
    return 0;
  });

  renderItemList(items);
}

function setSort(key) {
  _currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sort-' + key);
  if (btn) btn.classList.add('active');
  applyListFilter();
}

function filterList() { applyListFilter(); }  // 하위 호환

function renderItemList(items) {
  const body  = document.getElementById('itemListBody');
  const count = document.getElementById('listCount');
  count.textContent = items.length + '개';
  if (items.length === 0) {
    body.innerHTML = '<div class="no-items">해당 품목 없음</div>';
    return;
  }

  const groupByVendor = _currentSort === 'vendor';
  let html = '', lastVendor = null;

  items.forEach(it => {
    const vName  = it.vendors?.vendor_name || '거래처 미지정';
    const qty    = Number(it.current_qty) ?? 0;
    const target = Number(it.target_qty)  ?? 0;
    const qCls   = qty <= 0 ? 'stock-zero' : (qty < target ? 'stock-low' : '');
    const safe   = it.item_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

    if (groupByVendor && vName !== lastVendor) {
      html += `<div class="vendor-group-label">📦 ${vName}</div>`;
      lastVendor = vName;
    }

    const badge = (!groupByVendor && vName !== '거래처 미지정')
      ? `<span class="item-vendor-badge">${vName}</span>` : '';

    html += `
    <div class="item-row" id="irow_${it.id}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="item-name-cell" id="iname_${it.id}">${it.item_name}</span>
          <span class="item-qty-cell ${qCls}">${qty}</span>
          <span class="item-unit-cell">${it.unit || ''}</span>
          ${badge}
        </div>
        <div class="item-edit-row" id="iedit_${it.id}">
          <input class="item-edit-input name" id="ie_name_${it.id}" value="${it.item_name}" placeholder="품목명">
          <input class="item-edit-input qty"  id="ie_qty_${it.id}"  value="${qty}" type="number" placeholder="수량">
          <input class="item-edit-input unit" id="ie_unit_${it.id}" value="${it.unit || ''}" placeholder="단위">
          <select class="item-edit-input" id="ie_vendor_${it.id}" style="flex:1;min-width:100px">
            <option value="">거래처 미지정</option>
            ${_vendorOptions(it.vendor_id)}
          </select>
          <button class="btn-edit-save"   onclick="saveItemEdit(${it.id})">저장</button>
          <button class="btn-edit-cancel" onclick="closeItemEdit(${it.id})">취소</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="item-edit-btn" onclick="openItemEdit(${it.id})">✏️</button>
        <button class="item-del-btn"  onclick="deleteItem(${it.id}, '${safe}')">🗑</button>
      </div>
    </div>`;
  });
  body.innerHTML = html;
}


function openItemEdit(id) {
  document.getElementById('iedit_' + id).classList.add('open');
  document.getElementById('irow_'  + id).classList.add('editing');
  document.getElementById('ie_name_' + id).focus();
}

function closeItemEdit(id) {
  document.getElementById('iedit_' + id).classList.remove('open');
  document.getElementById('irow_'  + id).classList.remove('editing');
}

async function saveItemEdit(id) {
  const newName     = document.getElementById('ie_name_'   + id).value.trim();
  const newQty      = parseFloat(document.getElementById('ie_qty_'    + id).value) || 0;
  const newUnit     = document.getElementById('ie_unit_'   + id).value.trim();
  const newVendorId = document.getElementById('ie_vendor_' + id)?.value || null;
  if (!newName) { showToast('품목명을 입력해 주세요.'); return; }
  try {
    await db.from('items').update({
      item_name:  newName,
      current_qty: newQty,
      unit:        newUnit,
      vendor_id:   newVendorId ? parseInt(newVendorId) : null,
      updated_at:  new Date().toISOString()
    }).eq('id', id);

    // 로컬 데이터 갱신
    const it = _allItems.find(x => x.id === id);
    if (it) {
      it.item_name   = newName;
      it.current_qty = newQty;
      it.unit        = newUnit;
      it.vendor_id   = newVendorId ? parseInt(newVendorId) : null;
      // vendors 조인 데이터도 갱신
      const vEntry = _vendorList.find(v => v.id === parseInt(newVendorId));
      it.vendors = vEntry ? { vendor_name: vEntry.vendor_name } : null;
    }

    document.getElementById('iname_' + id).textContent = newName;
    document.getElementById('irow_'  + id).querySelector('.item-qty-cell').textContent  = newQty;
    document.getElementById('irow_'  + id).querySelector('.item-unit-cell').textContent = newUnit;

    // 거래처 뱃지 갱신
    const badge = document.getElementById('irow_' + id).querySelector('.item-vendor-badge');
    const vName = it.vendors?.vendor_name || '';
    if (badge)          badge.textContent = vName;
    else if (vName) {
      // 뱃지 새로 추가
      const nameRow = document.getElementById('irow_' + id).querySelector('[style*="display:flex"]');
      if (nameRow) {
        const span = document.createElement('span');
        span.className = 'item-vendor-badge';
        span.textContent = vName;
        nameRow.appendChild(span);
      }
    }

    closeItemEdit(id);
    applyListFilter();  // 거래처 필터 재적용
    showToast('✅ ' + newName + ' 수정 완료');
  } catch(e) {
    showToast('수정 실패: ' + e.message);
  }
}

async function deleteItem(id, name) {
  if (!confirm('"' + name + '"을 삭제할까요?\n재고 이력은 유지됩니다.')) return;
  try {
    await db.from('items').delete().eq('id', id);
    _allItems = _allItems.filter(x => x.id !== id);
    document.getElementById('irow_' + id)?.remove();
    const count = document.getElementById('listCount');
    count.textContent = _allItems.length + '개';
    showToast('🗑 ' + name + ' 삭제됨');
  } catch(e) {
    showToast('삭제 실패: ' + e.message);
  }
}

/* ════════════════════════════════
   iOS 홈 화면 추가 배너 (Safari)
════════════════════════════════ */
function checkIOSInstall() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('zk_ios_banner');
  if (!isIOS || isStandalone || dismissed) return;

  const banner = document.createElement('div');
  banner.style.cssText = `
    position:fixed; bottom:0; left:0; right:0;
    background:#1e1e1e; border-top:1px solid #2a2a2a;
    padding:16px 20px; display:flex; align-items:center;
    gap:12px; z-index:200; font-family:'Noto Sans KR',sans-serif;
  `;
  banner.innerHTML = `
    <span style="font-size:22px">📲</span>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700;color:#f0f0f0">홈 화면에 추가하기</div>
      <div style="font-size:12px;color:#666;margin-top:2px">Safari 하단 공유 버튼 → "홈 화면에 추가"</div>
    </div>
    <button onclick="this.parentElement.remove();localStorage.setItem('zk_ios_banner','1')"
      style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px">✕</button>
  `;
  document.body.appendChild(banner);
}
setTimeout(checkIOSInstall, 1500);
</script>
