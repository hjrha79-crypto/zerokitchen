function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'order') loadOrderList();
  if (name === 'new')   loadNewItems();

/* ════════════════════════════════
   토스트
════════════════════════════════ */
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ════════════════════════════════
   음성 입력 (Web Speech API)
════════════════════════════════ */
let recognition = null;
let isRecording = false;
let micTimer = null;
let micDuration = 15; // 기본 15초

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'ko-KR';
  r.continuous = false;      // 한 문장씩 받기 (중복 누적 방지)
  r.interimResults = false;  // 최종 결과만 사용

  r.onresult = (e) => {
    // 이번 인식 결과만 가져옴
    const newText = e.results[e.results.length - 1][0].transcript.trim();
    if (!newText) return;

    const input = document.getElementById('textInput');
    const existing = input.value.trim();
    // 기존 텍스트에 이어붙임
    input.value = existing ? existing + ' ' + newText : newText;

    // ✅ 말이 들어오면 타이머 리셋
    resetMicTimer();
  };
  r.onerror = (e) => {
    if (e.error === 'no-speech') {
      // 무음 → 그냥 재시작
      if (isRecording) { try { r.start(); } catch(_) {} }
      return;
    }
    stopMic();
    showToast('음성 인식 오류. 직접 입력해 주세요.');
  };
  r.onend = () => {
    // 녹음 중이면 자동 재시작 (타이머 끝나기 전까지)
    if (isRecording) {
      try { r.start(); } catch(_) {}
    }
  };
  return r;
}

function toggleMic() {
  if (isRecording) {
    // 수동으로 멈추면 바로 입력 처리
    const text = document.getElementById('textInput').value.trim();
    stopMic();
    if (text) handleSend();
    return;
  }
  recognition = initSpeech();
  if (!recognition) { showToast('이 브라우저는 음성 인식을 지원하지 않습니다.'); return; }
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micStatus').classList.add('recording');
  recognition.start();

  // 카운트다운 타이머 시작
  resetMicTimer();
}

function resetMicTimer() {
  if (!isRecording) return;
  // 기존 타이머 제거
  if (micTimer) { clearInterval(micTimer); micTimer = null; }

  let remaining = micDuration;
  updateMicStatus(remaining);
  micTimer = setInterval(() => {
    remaining--;
    updateMicStatus(remaining);
    if (remaining <= 0) {
      const text = document.getElementById('textInput').value.trim();
      stopMic();
      if (text) handleSend();
    }
  }, 1000);
}

function updateMicStatus(remaining) {
  const el = document.getElementById('micStatus');
  el.textContent = `듣는 중... ${remaining}초 (탭하면 즉시 입력)`;
}

function stopMic() {
  isRecording = false;
  if (micTimer) { clearInterval(micTimer); micTimer = null; }
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = `탭하면 음성 입력 (${micDuration}초)`;
  document.getElementById('micStatus').classList.remove('recording');
  if (recognition) { try { recognition.stop(); } catch(_) {} }
}

function setDuration(sec) {
  micDuration = sec;
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === sec + '초');
  });
  if (!isRecording) {
    document.getElementById('micStatus').textContent = `탭하면 음성 입력 (${sec}초)`;
  }
}

════════════════════════════════ */
const QTY_TINY        = 0.1;
const QTY_ALMOST_NONE = 0.2;

function preprocessInput(t) {
  let s = String(t || '');
  s = s.replace(/[.,·•:;!?'"()\[\]{}<>\\/|@#%^&*_+=~`]/g, ' ');
  s = s.replace(/\s+/g, ' ').trim();
  s = s.replace(/(하나|한|둘|두|셋|세|넷|네|내|다섯|여섯|일곱|여덟|아홉|열)(개|게)(요|를|을|가|이|만|랑|하고|도)?/g, '$1 $2');
  s = s.replace(/\b반\s*(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '0.5$1');
  s = s.replace(/([가-힣A-Za-z])\s*반\s*(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '$1 0.5$2');
  s = s.replace(/([가-힣A-Za-z])반(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '$1 0.5$2');
  s = s.replace(/삼분의일\s*(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '0.333$1');
  s = s.replace(/사분의일\s*(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '0.25$1');
  s = s.replace(/오분의일\s*(봉지|봉|박스|팩|캔|병|개|kg|g|통)\b/g, '0.2$1');
  s = s.replace(/\b아주약간\b/g, String(QTY_TINY));
  s = s.replace(/\b거의없음\b/g, String(QTY_ALMOST_NONE));
  s = s.replace(/\b없음\b/g, '0');
  return s;
}

function parseEntries(text) {
  let s = String(text || '').replace(/\s+/g, '');
  const numMap = {
    '한':1,'하나':1,'두':2,'둘':2,'세':3,'셋':3,'네':4,'넷':4,'내':4,
    '다섯':5,'여섯':6,'일곱':7,'여덟':8,'아홉':9,'열':10,
    '열한':11,'열두':12,'열세':13,'열네':14,'열다섯':15,'스무':20,'스물':20
  };
  const unitRe  = '(?:kg|g|봉지|봉|개|팩|통|박스|병|캔|권)';
  const kwordRe = '(?:열한|열두|열세|열네|열다섯|스무|스물|하나|둘|셋|넷|다섯|여섯|일곱|여덟|아홉|열|한|두|세|네|내)';
  const qtyRe   = '(?:\\d+(?:\\.\\d+)?|' + kwordRe + ')';
  const cmdRe   = '(?:발주|주문|구매|시켜줘|입고|입구|입고오|입고요|입고로|구매완료|사용|출고)';
  const addRe   = '(?:추가로|추가|더해|더|한번더)';
  // 수정 패턴: "브로콜리 두 봉지로 수정" / "브로콜리 두 봉지 수정"
  const fixRe   = '(?:로수정|수정|으로수정|로바꿔|로변경)';
  const cmdAlias = {
    '발주':'발주','주문':'발주','구매':'발주','시켜줘':'발주',
    '입고':'입고','입구':'입고','입고오':'입고','입고요':'입고','입고로':'입고','구매완료':'입고',
    '사용':'사용','출고':'사용'
  };
  const reNorm = new RegExp('^([가-힣A-Za-z]+?)(' + qtyRe + ')(' + unitRe + ')?(' + fixRe + '|' + cmdRe + ')?(' + addRe + ')?');
  const results = [];
  let iter = 0;
  while (s.length > 0) {
    if (++iter > 400) break;
    const addMatch = s.match(new RegExp('^' + addRe));
    if (addMatch) { s = s.slice(addMatch[0].length); continue; }
    const mm = s.match(reNorm);
    if (mm) {
      const item   = mm[1];
      const qtyRaw = mm[2];
      const unit   = mm[3] || '개';
      const cmdRaw = mm[4] || '';  // fixRe | cmdRe
      const addRaw = mm[5] || '';  // addRe (추가/추가로/더 등)
      // 수정 키워드 감지 (mm[4]에 잡힘)
      const isFix = /수정|바꿔|변경/.test(cmdRaw);
      // 추가 키워드 감지 (mm[5]에 잡힘)
      const isAdd = /추가|더해|더|한번더/.test(addRaw);
      const cmd    = isFix ? '재고' : (cmdAlias[cmdRaw] || '재고');
      const mode   = isFix ? 'FIX' : isAdd ? 'ADD' : 'SET';
      let qty = /^\d+(\.\d+)?$/.test(qtyRaw) ? Number(qtyRaw) : (numMap[qtyRaw] || 0);
      if (!item || (qty === 0 && qtyRaw !== '0')) { s = s.slice(mm[0].length || 1); continue; }

      // ✅ 품목명 필터
      // 1) 수량 단어 자체가 품목명으로 파싱되는 경우 차단
      const numWords = ['하나','한','둘','두','셋','세','넷','네','내','다섯','여섯','일곱','여덟','아홉','열',
                        '열한','열두','열세','열네','열다섯','스무','스물','없음','약간'];
      if (numWords.includes(item)) { s = s.slice(mm[0].length || 1); continue; }

      // 2) 1글자 품목명 차단 (소음/오인식)
      if (item.length < 2) { s = s.slice(mm[0].length || 1); continue; }

      results.push({ item, qty, unit, cmd, mode });
      s = s.slice(mm[0].length);
      continue;
    }
    s = s.slice(1);
  }
  return results;
}


// 같은 발화 내 동일 품목 합산
// - SET 모드: 같은 품목 여러 번 → 합산 (외부 냉장고 + 내부 냉장고)
// - FIX 모드: 마지막 값으로 덮어쓰기
// - ADD 모드: 그대로 유지 (나중에 DB값에 합산)
function mergeSameUtterance(entries) {
  const map = new Map();
  for (const e of entries) {
    const key = normalizeKey(e.item) + '|||' + e.cmd + '|||' + e.unit;
    const prev = map.get(key);
    if (!prev) {
      map.set(key, { ...e });
    } else {
      if (e.mode === 'FIX') {
        // 수정은 마지막 값으로
        prev.qty  = e.qty;
        prev.mode = 'FIX';
      } else if (e.mode === 'SET') {
        // 재고 조사 중 같은 품목 다시 나오면 합산
        prev.qty += e.qty;
      } else if (e.mode === 'ADD') {
        prev.qty += e.qty;
      }
    }
  }
  return Array.from(map.values());
}

// 편집 거리(Levenshtein Distance)
function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = new Array(n + 1).fill(0);
    dp[i][0] = i;
  }
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function normalizeKey(x) {
  return String(x || '').replace(/\s+/g, '').trim().toLowerCase();
}

function applyTypoRules(text, rules) {
  let s = String(text || '');
  for (const rule of rules) {
    if (!rule.enabled) continue;
    if (rule.rule_type === 'EXACT') {
      const f = rule.from_text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      s = s.replace(new RegExp('(^|\\s)' + f + '(?=\\s|$)', 'g'), '$1' + rule.to_text);
    } else if (rule.rule_type === 'CONTAINS') {
      s = s.split(rule.from_text).join(rule.to_text);
    }
  }
  return s;
}

/* ════════════════════════════════
   메인 입력 처리
════════════════════════════════ */
async function handleSend() {
  const input = document.getElementById('textInput');
  const rawText = input.value.trim();
  if (!rawText) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';

  try {
    // 오타사전 로드
    const { data: typoRules } = await db
      .from('typo_dict')
      .select('*')
      .eq('enabled', true)
      .order('priority');

    // 전처리 + 오타 교정
    const corrected = applyTypoRules(rawText, typoRules || []);
    const cleaned   = preprocessInput(corrected);

    // 파싱
    const entries = parseEntries(cleaned);
    if (entries.length === 0) {
      addResult(rawText, '❌ 분리 실패 — 품목명과 수량을 확인해 주세요', 'err');
      return;
    }

    // 같은 발화 내 동일 품목 합산
    // 규칙: SET 모드에서 같은 품목이 여러 번 나오면 합산 (냉장고 두 곳에서 발견한 경우)
    // FIX 모드는 마지막 값으로 덮어쓰기
    const mergedEntries = mergeSameUtterance(entries);

    // 품목 목록 가져오기
    const { data: items } = await db.from('items').select('*');
    const itemMap = new Map();
    (items || []).forEach(it => itemMap.set(normalizeKey(it.item_name), it));

    // 처리
    const msgs = [];
    for (const ent of mergedEntries) {
      const key      = normalizeKey(ent.item);
      const matched  = itemMap.get(key);

      if (!matched) {
        // ── 유사 품목 체크 (오타 의심 시에만 NEW_ITEMS로 보냄) ──
        // 기존 품목명 중 입력값을 포함하거나, 입력값이 기존 품목명을 포함하는 경우 → 오타 의심
        const similar = (items || []).find(it => {
          const a = normalizeKey(it.item_name);
          const b = normalizeKey(ent.item);
          if (a === b) return false;
          if (Math.abs(a.length - b.length) >= 3) return false;
          if (a.includes(b) || b.includes(a)) return true;
          return editDistance(a, b) <= 2;
        });

        if (similar) {
          // 오타 의심 → NEW_ITEMS로 보내서 확인
          const { data: existingQ } = await db
            .from('new_items_queue')
            .select('id')
            .eq('candidate_item', ent.item)
            .eq('status', 'PENDING')
            .limit(1);

          if (!existingQ || existingQ.length === 0) {
            await db.from('new_items_queue').insert({
              raw_text:       rawText,
              candidate_item: ent.item,
              parsed_qty:     ent.qty,
              unit:           ent.unit,
              cmd:            ent.cmd,
              status:         'PENDING'
            });
          }
          msgs.push({
            text: `🔍 "${ent.item}" → 혹시 "${similar.item_name}"? 신규 탭에서 확인`,
            type: 'warn'
          });
          continue;
        }

        // 완전히 새로운 품목 → 바로 등록 + 재고 반영
        const initQty = ent.cmd === '입고' ? ent.qty
                      : ent.cmd === '사용' ? -ent.qty
                      : ent.cmd === '발주' ? 0
                      : ent.qty; // 재고(SET)

        const { data: newItem } = await db.from('items').insert({
          item_name:   ent.item,
          unit:        ent.unit,
          pack_factor: 1,
          target_qty:  0,
          current_qty: initQty
        }).select().single();

        // 이력 기록
        if (newItem) {
          await db.from('inventory_log').insert({
            item_id:   newItem.id,
            item_name: newItem.item_name,
            qty:       ent.qty,
            unit:      ent.unit,
            cmd:       ent.cmd,
            actor:     'owner',
            raw_text:  rawText
          });
        }

        msgs.push({ text: `🆕 ${ent.item} ${ent.qty}${ent.unit} — 신규 등록 완료`, type: 'ok' });
        continue;
      }

      const cur  = Number(matched.current_qty) || 0;
      const mode = ent.mode || 'SET';
      let newQty = cur;
      let modeLabel = '';

      if (ent.cmd === '입고') {
        newQty = cur + ent.qty;
        modeLabel = '입고';
      } else if (ent.cmd === '사용') {
        newQty = cur - ent.qty;
        modeLabel = '사용';
      } else if (ent.cmd === '발주') {
        newQty = cur;
        modeLabel = '발주';
      } else if (mode === 'FIX') {
        // 수정 → 무조건 덮어쓰기
        newQty = ent.qty;
        modeLabel = '수정';
      } else if (mode === 'ADD') {
        // 추가 → 합산
        newQty = cur + ent.qty;
        modeLabel = '추가';
      } else {
        // 기본 재고(SET) → 덮어쓰기
        newQty = ent.qty;
        modeLabel = '재고';
      }

      // 재고 업데이트
      if (ent.cmd !== '발주') {
        await db.from('items')
          .update({ current_qty: newQty, updated_at: new Date().toISOString() })
          .eq('id', matched.id);
      }

      // 이력 기록
      await db.from('inventory_log').insert({
        item_id:   matched.id,
        item_name: matched.item_name,
        qty:       ent.qty,
        unit:      ent.unit,
        cmd:       modeLabel,
        actor:     'owner',
        raw_text:  rawText
      });

      const icon = ent.cmd === '입고' ? '📦'
                 : ent.cmd === '사용' ? '🍳'
                 : ent.cmd === '발주' ? '🧾'
                 : mode === 'FIX'     ? '✏️'
                 : mode === 'ADD'     ? '➕'
                 : '✅';
      msgs.push({
        text:     `${icon} ${matched.item_name} ${ent.qty}${ent.unit} → ${newQty}${matched.unit} (${modeLabel})`,
        type:     'ok',
        itemId:   matched.id,
        itemName: matched.item_name,
        prevQty:  cur   // 되돌리기용 이전 값
      });
    }

    msgs.forEach(m => addResult(rawText, m.text, m.type, m.itemId, m.itemName, m.prevQty));
    input.value = '';

  } catch(err) {
    addResult(rawText, '❌ 오류: ' + err.message, 'err');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '입력';
  }
}

let resultIdCounter = 0;

function addResult(raw, msg, type, itemId, itemName, prevQty) {
  const list   = document.getElementById('resultList');
  const now    = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const rid    = 'r' + (++resultIdCounter);
  const header = list.querySelector('.result-header');
  const div    = document.createElement('div');
  div.className = `result-item ${type}`;
  div.id = rid;

  // 삭제(되돌리기) 버튼 — 재고 반영된 항목만
  const canUndo = type === 'ok' && itemId && prevQty !== undefined;
  const undoBtn = canUndo
    ? `<button class="undo-btn" onclick="undoEntry('${rid}', ${itemId}, ${prevQty}, '${itemName}')">↩️</button>`
    : '';

  div.innerHTML = `
    <div style="flex:1">
      <div class="result-raw">${raw}</div>
      <div class="result-msg">${msg}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      ${undoBtn}
      <div class="result-time">${now}</div>
    </div>
  `;
  header.after(div);
}

async function undoEntry(rid, itemId, prevQty, itemName) {
  if (!confirm(`"${itemName}" 재고를 ${prevQty}로 되돌릴까요?`)) return;
  try {
    await db.from('items')
      .update({ current_qty: prevQty, updated_at: new Date().toISOString() })
      .eq('id', itemId);
    document.getElementById(rid).remove();
    showToast(`↩️ ${itemName} 재고 ${prevQty}로 복구됨`);
  } catch(e) {
    showToast('되돌리기 실패: ' + e.message);
  }
}

/* ════════════════════════════════
   발주 화면
════════════════════════════════ */
async function loadOrderList() {
  const el = document.getElementById('orderList');
  el.innerHTML = '<div class="no-order"><span class="spinner"></span></div>';

  const { data: items } = await db
    .from('items')
    .select('*, vendors(vendor_name)')
    .order('vendor_id');

  if (!items || items.length === 0) {
    el.innerHTML = '<div class="no-order">등록된 품목이 없습니다.</div>';
    return;
  }

  // 발주 필요 품목만 (current < target)
  const needOrder = items.filter(it => Number(it.current_qty) < Number(it.target_qty));
  if (needOrder.length === 0) {
    el.innerHTML = '<div class="no-order">✅ 발주 필요 품목 없음</div>';
    return;
  }

  // 거래처별 그룹
  const groups = {};
  needOrder.forEach(it => {
    const v = it.vendors?.vendor_name || '거래처 미지정';
    if (!groups[v]) groups[v] = [];
    groups[v].push(it);
  });

  let html = '<div class="vendor-section">';
  for (const [vendor, list] of Object.entries(groups)) {
    html += `<div class="vendor-name">📦 ${vendor}</div>`;
    list.forEach(it => {
      const suggest = Math.max(0, Number(it.target_qty) - Number(it.current_qty));
      html += `
        <div class="order-item">
          <div class="order-item-name">${it.item_name}</div>
          <div class="order-item-stock">현재 ${it.current_qty}/${it.target_qty}</div>
          <div class="order-qty-wrap">
            <input class="order-qty" type="number" value="${suggest}" min="0" id="qty_${it.id}">
            <span class="order-unit">${it.unit}</span>
          </div>
        </div>`;
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

   NEW_ITEMS 화면
════════════════════════════════ */
async function loadNewItems() {
  const el = document.getElementById('newItemList');
  el.innerHTML = '<div class="no-pending"><span class="spinner"></span></div>';

  const { data: pending } = await db
    .from('new_items_queue')
    .select('*')
    .eq('status', 'PENDING')
    .order('created_at', { ascending: false });

  if (!pending || pending.length === 0) {
    el.innerHTML = '<div class="no-pending">✅ 미등록 품목 없음</div>';
    return;
  }

  el.innerHTML = pending.map(item => `
    <div class="new-item-card" id="card_${item.id}">
      <div class="new-item-top">
        <div>
          <div class="new-item-candidate">${item.candidate_item}</div>
          <div class="new-item-raw">${item.raw_text || ''}</div>
        </div>
        <div class="new-item-badge">PENDING</div>
      </div>
      <input
        class="new-item-memo"
        id="memo_${item.id}"
        placeholder="품목명 수정 (맞으면 그대로)"
        value="${item.candidate_item}"
      >
      <div class="new-item-actions">
        <button class="btn-approve" onclick="approveItem(${item.id})">✅ 승인 + 등록</button>
        <button class="btn-reject"  onclick="rejectItem(${item.id})">거절</button>
      </div>
    </div>
  `).join('');
}

async function approveItem(id) {
  const memo = document.getElementById('memo_' + id).value.trim();
  if (!memo) { showToast('품목명을 입력해 주세요.'); return; }

  // 오타사전 자동학습 (원본 후보와 다를 때)
  const { data: row } = await db.from('new_items_queue').select('*').eq('id', id).single();
  if (row && row.candidate_item !== memo) {
    const { data: existing } = await db
      .from('typo_dict')
      .select('id')
      .eq('from_text', row.candidate_item)
      .eq('to_text', memo)
      .limit(1);
    if (!existing || existing.length === 0) {
      await db.from('typo_dict').insert({
        from_text: row.candidate_item,
        to_text:   memo,
        rule_type: 'EXACT',
        enabled:   true,
        priority:  50,
        note:      'NEW_ITEMS 승인 자동학습'
      });
    }
  }

  // 발주기준(items)에 등록
  const { data: existing } = await db.from('items').select('id').eq('item_name', memo).limit(1);
  if (!existing || existing.length === 0) {
    await db.from('items').insert({
      item_name:   memo,
      unit:        row?.unit || '개',
      pack_factor: 1,
      target_qty:  1,
      current_qty: Number(row?.parsed_qty) || 0
    });
  }

  // 상태 DONE으로 변경
  await db.from('new_items_queue').update({ status: 'DONE', memo }).eq('id', id);

  document.getElementById('card_' + id).remove();
  showToast(`✅ "${memo}" 등록 완료`);

  const remaining = document.querySelectorAll('[id^="card_"]').length;
  if (remaining === 0) {
    document.getElementById('newItemList').innerHTML = '<div class="no-pending">✅ 미등록 품목 없음</div>';
  }
}

async function rejectItem(id) {
  await db.from('new_items_queue').update({ status: 'REJECTED' }).eq('id', id);
  document.getElementById('card_' + id).remove();
  showToast('거절 처리됨');
}

/* ════════════════════════════════
   엔터키 입력
════════════════════════════════ */
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

/* ════════════════════════════════
   PWA 서비스워커 등록
════════════════════════════════ */
if ('serviceWorker' in navigator) {
  // 인라인 서비스워커 (단일 파일)
  const swCode = `
    const CACHE = 'zerokitchen-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
    });
    self.addEventListener('fetch', e => {
      // Supabase API는 캐시 안 함
      if (e.request.url.includes('supabase.co')) return;
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

/* ════════════════════════════════
   iOS 홈 화면 추가 배너 (Safari)
════════════════════════════════ */
function checkIOSInstall() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('zk_ios_banner');
  if (!isIOS || isStandalone || dismissed) return;

  const banner = document.createElement('div');
  banner.style.cssText = `
    position:fixed; bottom:0; left:0; right:0;
    background:#1e1e1e; border-top:1px solid #2a2a2a;
    padding:16px 20px; display:flex; align-items:center;
    gap:12px; z-index:200; font-family:'Noto Sans KR',sans-serif;
  `;
  banner.innerHTML = `
    <span style="font-size:22px">📲</span>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700;color:#f0f0f0">홈 화면에 추가하기</div>
      <div style="font-size:12px;color:#666;margin-top:2px">Safari 하단 공유 버튼 → "홈 화면에 추가"</div>
    </div>
    <button onclick="this.parentElement.remove();localStorage.setItem('zk_ios_banner','1')"
      style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px">✕</button>
  `;
  document.body.appendChild(banner);
}
setTimeout(checkIOSInstall, 1500);
</script>
