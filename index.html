<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>ZeroKitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f1; --surface:#fff; --surface2:#e8ede9; --border:#d4ddd6;
  --text:#1a2b1e; --dim:#4a6650; --muted:#8aa090;
  --accent:#1a7a4a; --accent-lt:#e6f4ec; --accent-dim:rgba(26,122,74,.1);
  --warn:#c0540a; --warn-dim:rgba(192,84,10,.1); --red:#d93025;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
/* 헤더 */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:8px;height:52px;flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{font-size:18px;font-weight:700;color:var(--accent)}
.store-nm{font-size:12px;color:var(--muted);font-weight:500}
.navs{display:flex;gap:5px;margin-left:auto}
.nav{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* 탭 */
.tab-wrap{flex:1;overflow:hidden}
.tab{display:none;height:calc(100dvh - 52px - 62px);overflow-y:auto;padding:14px 14px 80px;flex-direction:column;gap:12px}
.tab.active{display:flex}
/* 입력탭: 채팅 구조 */
#tab-input{display:none;flex-direction:column;padding:0 14px 14px;padding-bottom:80px}
#tab-input.active{display:flex}
#tab-input .chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:14px 0}
.chat-bubble{max-width:85%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
.chat-bubble.system{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-bubble.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-bubble .chat-time{font-size:10px;opacity:.5;margin-top:4px;display:block}
.chat-bubble.system .chat-time{text-align:left}
.chat-bubble.user .chat-time{text-align:right}
.chat-bubble .res-undo{margin-top:6px}
.chat-guide{align-self:flex-start;max-width:90%}
/* 공통 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:12px}
/* 입력탭 — 마이크 */
.mic-zone{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px}
.mic-btn{width:76px;height:76px;border-radius:50%;border:2.5px solid var(--border);background:var(--surface2);font-size:28px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mic-btn.rec{border-color:var(--warn);background:var(--warn-dim);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,84,10,.3)}50%{box-shadow:0 0 0 12px rgba(192,84,10,0)}}
.mic-st{font-size:13px;color:var(--muted);font-weight:500;text-align:center}
.mic-st.rec{color:var(--warn)}
.mic-im{font-size:13px;color:var(--accent);font-style:italic;min-height:18px;text-align:center}
.dur-row{display:flex;align-items:center;gap:8px}
.dur-lbl{font-size:12px;color:var(--muted)}
.dur-btns{display:flex;gap:5px}
.dur{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.dur.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
/* 텍스트 입력 */
.inp-row{display:flex;gap:8px}
.txt-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.txt-inp:focus{border-color:var(--accent)}
.txt-inp::placeholder{color:var(--muted);font-size:13px}
.send-btn{padding:12px 18px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.send-btn:disabled{opacity:.5}
/* 결과 */
.res-hdr{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;padding:2px 0}
.res-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:12px;padding:11px 13px}
.res-card.ok{border-left-color:var(--accent)}
.res-card.warn{border-left-color:var(--warn)}
.res-card.err{border-left-color:var(--red)}
.res-raw{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.res-msg{font-size:14px;font-weight:600;line-height:1.4}
.res-time{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
.res-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.res-undo{font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;color:var(--text);font-family:inherit;transition:opacity .2s}
.res-undo:hover{background:var(--bg)}
.res-undo:disabled{opacity:.4;cursor:default}
/* 재고 그리드 */
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.inv-card:active{transform:scale(0.98)}
.inv-card.low{border-left:3px solid var(--warn);background:rgba(192,84,10,.04)}
.inv-card.zero{border-left:3px solid var(--red);background:rgba(217,48,37,.04)}
.inv-card-main{display:flex;justify-content:space-between;align-items:center}
.inv-card-main .inv-name{font-size:15px;font-weight:600;line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-card-main .inv-qty-wrap{display:flex;align-items:baseline;gap:3px;flex-shrink:0}
.inv-card-main .inv-qty{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.inv-card-main .inv-qty.low{color:var(--warn)}
.inv-card-main .inv-qty.zero{color:var(--red)}
.inv-card-main .inv-unit{font-size:12px;color:var(--dim)}
.inv-card-detail{display:none;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);animation:fadeIn .15s ease}
.inv-card.expanded .inv-card-detail{display:flex}
.inv-card-detail-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim)}
.inv-card-detail-row span:last-child{font-weight:600;color:var(--text)}
.inv-card-detail-acts{display:flex;gap:8px;margin-top:4px}
.inv-card-detail-acts button{flex:1;padding:8px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.inv-card-detail-acts .inv-act-edit{background:var(--accent-lt);border:1px solid var(--accent);color:var(--accent)}
.inv-card-detail-acts .inv-act-del{background:var(--surface2);border:1px solid var(--border);color:var(--dim)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.inv-unit{font-size:13px;color:var(--dim)}
/* 발주 */
.ord-recommend-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ord-recommend-card.urgent{border-left:3px solid var(--red);background:rgba(217,48,37,.03)}
.ord-rec-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.ord-rec-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ord-rec-info{font-size:11px;color:var(--dim)}
.ord-rec-source{font-size:10px;color:var(--muted);font-style:italic}
.ord-rec-right{display:flex;align-items:center;gap:0;flex-shrink:0}
.ord-stepper-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface2);font-size:16px;font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
.ord-stepper-btn:first-child{border-radius:8px 0 0 8px}
.ord-stepper-btn:last-child{border-radius:0 8px 8px 0}
.ord-stepper-btn:active{background:var(--accent-lt);color:var(--accent)}
.ord-stepper-val{width:44px;height:34px;border:1px solid var(--border);border-left:none;border-right:none;background:var(--surface);font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;color:var(--accent);outline:none}
.ord-rec-unit{font-size:12px;color:var(--dim);margin-left:4px}
.ord-today-header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 10px}
.ord-today-title{font-size:16px;font-weight:700;color:var(--text)}
.ord-today-date{font-size:12px;color:var(--muted)}
.ord-today-actions{display:flex;gap:8px;margin-top:10px}
.ord-today-actions button{flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.ord-btn-confirm-all{background:var(--accent);border:none;color:#fff}
.ord-btn-kakao{background:#FEE500;border:none;color:#3C1E1E;font-weight:700}
.ord-empty-good{text-align:center;padding:40px 20px;color:var(--dim)}
.ord-empty-good .ord-empty-icon{font-size:32px;margin-bottom:8px}
.ord-empty-good .ord-empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.ord-empty-good .ord-empty-sub{font-size:12px;color:var(--muted)}
.ord-defer-tag{font-size:10px;background:rgba(192,84,10,.1);color:var(--warn);padding:2px 6px;border-radius:4px;font-weight:600}
.ord-defer-blocked{font-size:10px;background:rgba(217,48,37,.1);color:var(--red);padding:2px 6px;border-radius:4px;font-weight:600}
.ord-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:12px;padding:13px}
.ord-name{font-size:15px;font-weight:600}
.ord-detail{font-size:13px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace}
.ord-section{margin-bottom:20px}
.ord-section-title{font-size:14px;font-weight:800;padding:14px 2px 10px;display:flex;align-items:center;gap:8px}
.ord-section-title .ord-icon{font-size:16px}
.ord-pending-badge{font-size:11px;background:var(--accent);color:#fff;border-radius:10px;padding:2px 10px;font-weight:700}
.ord-suggest-badge{font-size:11px;background:var(--surface2);color:var(--dim);border-radius:10px;padding:2px 10px;font-weight:600;border:1px solid var(--border)}
.ord-vendor-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.ord-vendor-hdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ord-vendor-name{font-size:14px;font-weight:700}
.ord-vendor-method{font-size:11px;color:var(--muted);margin-left:4px}
.ord-method-badge{font-size:12px;color:var(--dim);margin-left:6px}
.ord-method-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;cursor:pointer}
.ord-item-row{padding:10px 14px;border-top:1px solid var(--surface2);display:flex;align-items:center;gap:10px}
.ord-item-name{font-size:14px;font-weight:600;min-width:0;flex-shrink:1}
.ord-item-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ord-item-qty{font-size:13px;color:var(--dim);white-space:nowrap}
.ord-item-qty strong{color:var(--warn);font-weight:700}
.ord-status-btns{display:flex;gap:6px}
.ord-btn-done{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#1a7a4a;color:#fff;white-space:nowrap}
.ord-btn-cancel{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--dim);border:1px solid var(--border);white-space:nowrap}
.ord-btn-register{padding:6px 14px;border-radius:8px;border:1px solid var(--accent);font-size:12px;font-weight:700;cursor:pointer;background:var(--accent-lt);color:var(--accent);white-space:nowrap}
.ord-btn-done:active,.ord-btn-cancel:active,.ord-btn-register:active{opacity:.7}
.ord-action-row{padding:10px 14px;border-top:1px solid var(--border)}
.ord-action-btn{padding:10px 20px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ord-action-btn.sms{background:#1a7a4a;color:#fff}
.ord-action-btn.kakao{background:#fee500;color:#191919}
.ord-action-btn.call{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.ord-suggest-group{opacity:.65}
.ord-suggest-group .ord-vendor-hdr{background:transparent;border-bottom:1px solid var(--surface2)}
.ord-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.ord-item-name[data-editable]{cursor:pointer;border-bottom:1px dashed var(--border)}
.ord-item-name[data-editable]:hover{color:var(--accent)}
.ord-inline-input{background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:3px 8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:auto;min-width:60px;max-width:140px}
.ord-vendor-assign{font-size:11px;color:var(--accent);cursor:pointer;border:1px dashed var(--accent);border-radius:6px;padding:2px 8px;background:transparent;font-family:inherit;white-space:nowrap}
.ord-vendor-assign:hover{background:var(--accent-lt)}
.ord-vendor-label{font-size:11px;color:var(--muted);white-space:nowrap}
/* 테스트 패널 */
.json-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text);outline:none;resize:vertical;min-height:160px;line-height:1.5}
.json-inp:focus{border-color:var(--accent)}
.json-result{background:#1a2b1e;border-radius:8px;padding:14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#7fffb0;white-space:pre-wrap;word-break:break-all;min-height:80px;max-height:300px;overflow-y:auto}
.tpl-btns{display:flex;gap:6px;flex-wrap:wrap}
.tpl{padding:6px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent-lt);color:var(--accent);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
/* 공통 버튼 */
.btn-run{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-run:disabled{opacity:.5}
/* no item */
.no-item{text-align:center;padding:40px;color:var(--muted);font-size:14px;grid-column:1/-1}
/* ResultCard */
#reviewPanel{position:fixed;bottom:62px;left:0;right:0;z-index:19;padding:0 10px 6px;max-height:60dvh;overflow-y:auto}
.result-card-wrap{background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.result-card-title{font-size:15px;font-weight:700;color:var(--text);padding-bottom:10px;border-bottom:1px solid var(--border)}
.result-card-body{display:flex;flex-direction:column;gap:6px}
.rc-row{display:flex;align-items:baseline;gap:10px;padding:12px 0;border-bottom:1px solid var(--surface2)}
.rc-row:last-child{border-bottom:none}
.rc-item-name{font-size:20px;font-weight:700;color:var(--text);flex:1}
.rc-item-qty{font-size:20px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.rc-vendor{font-size:12px;color:var(--text-muted);background:var(--surface2);border-radius:4px;padding:1px 6px;white-space:nowrap}
.rc-item-action{font-size:12px;color:var(--text-muted);white-space:nowrap}
.rc-default-badge{font-size:11px;color:var(--muted);background:var(--surface2);border-radius:4px;padding:2px 6px;white-space:nowrap}
/* 유사 품목 선택 카드 */
.similar-card{background:var(--surface);border:1.5px solid var(--warn);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:10px;position:relative}
.similar-card-title{font-size:14px;font-weight:700;color:var(--text)}
/* 카드 닫기 X 버튼 */
.card-close-x{position:absolute;top:10px;right:10px;width:30px;height:30px;border:none;background:var(--surface2);border-radius:50%;cursor:pointer;font-size:16px;color:var(--dim);display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:1}
.card-close-x:hover{background:var(--border);color:var(--text)}
.similar-card-btns{display:flex;gap:8px}
.similar-card-btns button{flex:1;padding:13px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.similar-btn-link{background:var(--accent);border:none;color:#fff}
.similar-btn-new{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
/* Just Talk 유도 */
.just-talk{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin-bottom:0}
.just-talk-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.5}
.just-talk-sub{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:600}
.just-talk-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
.just-talk-item{font-size:14px;color:var(--accent);cursor:pointer;padding:8px 12px;background:var(--accent-lt);border-radius:8px;transition:background .15s}
.just-talk-item:hover{background:var(--accent);color:#fff}
/* 묶음 확인 타이틀 */
.rc-summary{font-size:15px;font-weight:700;color:var(--text);padding-bottom:8px}
.result-add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--text-muted);font-family:inherit;font-size:13px;cursor:pointer;display:none}
.result-card-btns{display:flex;gap:8px}
.rc-btn-primary{flex:2;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.rc-btn-secondary{flex:1;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.rc-btn-cancel{flex:1;padding:14px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:inherit;font-size:14px;cursor:pointer}
.rc-btn-primary:disabled{opacity:.5}

/* 자연어 입력존 — 하단 고정 */
.global-input-zone{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;position:fixed;bottom:0;left:0;right:0;z-index:20}
.nl-input-zone{display:flex;gap:8px;align-items:center}
.nl-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.nl-input:focus{border-color:var(--accent)}
.nl-input::placeholder{color:var(--text-muted);font-size:14px}
.nl-mic-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--accent);background:var(--accent-lt);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.nl-mic-btn.rec{border-color:var(--red);background:rgba(217,48,37,.08);animation:none}
.nl-mic-btn .mic-countdown{font-size:14px;font-weight:700;color:var(--red);line-height:1}
.mic-wave{display:flex;align-items:center;gap:3px;height:22px}
.mic-wave-bar{width:3px;border-radius:2px;background:var(--red);animation:mic-wave-anim 0.8s ease-in-out infinite}
.mic-wave-bar:nth-child(1){height:8px;animation-delay:0s}
.mic-wave-bar:nth-child(2){height:16px;animation-delay:0.15s}
.mic-wave-bar:nth-child(3){height:12px;animation-delay:0.3s}
@keyframes mic-wave-anim{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.mic-hint{position:fixed;bottom:76px;left:14px;background:var(--text);color:var(--bg);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;pointer-events:none;animation:mic-hint-fade 0.3s ease;z-index:25}
.mic-hint::after{content:'';position:absolute;bottom:-5px;left:20px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--text)}
@keyframes mic-hint-fade{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mic-settings-popup{position:absolute;bottom:54px;left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:0 -4px 16px rgba(0,0,0,.12);z-index:30;min-width:180px;display:none}
.mic-settings-popup.open{display:block}
.mic-settings-popup .msp-title{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:8px}
.mic-settings-popup .msp-opts{display:flex;gap:6px;flex-wrap:wrap}
.mic-settings-popup .msp-opt{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-family:inherit;cursor:pointer;color:var(--text)}
.mic-settings-popup .msp-opt.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:600}
.nl-send-btn{padding:14px 20px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s;flex-shrink:0}
.nl-send-btn:disabled{opacity:.5}
.inv-dup-bar{padding:10px 14px;background:rgba(217,48,37,.06);border:1px solid rgba(217,48,37,.15);border-radius:10px;cursor:pointer;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.inv-dup-bar span{font-size:13px;font-weight:600;color:var(--red)}
.inv-dup-bar button{font-size:12px;padding:5px 12px;border:1px solid var(--red);border-radius:6px;background:rgba(217,48,37,.08);color:var(--red);font-family:inherit;font-weight:600;cursor:pointer}
.last-input-chip{display:none;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;font-size:12px;color:var(--dim);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;transition:all .15s}
.last-input-chip:hover{border-color:var(--accent);color:var(--accent)}
.last-input-chip.visible{display:inline-block}
/* 동일 품목 재입력 확인 카드 */
.dup-card{background:var(--surface);border:1.5px solid var(--warn);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;position:relative}
.dup-card-title{font-size:14px;font-weight:700;color:var(--text)}
.dup-card-detail{font-size:13px;color:var(--dim);line-height:1.5}
.dup-card-btns{display:flex;gap:8px}
.dup-card-btns button{flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.dup-btn-merge{background:var(--accent);border:none;color:#fff}
.dup-btn-replace{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.dup-btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}
/* 설정 변경 카드 */
.config-card{background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px;position:relative}
.config-card-title{font-size:15px;font-weight:700;color:var(--text)}
.config-card-opts{display:flex;gap:8px;flex-wrap:wrap}
.config-card-opts button{padding:12px 16px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent-lt);border:1px solid var(--accent);color:var(--accent)}
.config-card-opts button:hover{background:var(--accent);color:#fff}
.config-vendor-list{display:flex;flex-direction:column;gap:6px}
.config-vendor-btn{padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-family:inherit;font-size:14px;cursor:pointer;text-align:left;transition:all .15s}
.config-vendor-btn:hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.config-vendor-btn.current{border-color:var(--accent);background:var(--accent);color:#fff}
/* 발주 리스트 인라인 버튼 */
.order-action-inline{display:flex;gap:8px;margin-top:10px}
.order-action-inline button{padding:10px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.oai-create{background:var(--accent);border:none;color:#fff}
.oai-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.oai-cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}

/* Table Review */
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.review-title{font-size:15px;font-weight:700;color:var(--text)}
.review-hint{font-size:12px;color:var(--text-muted)}
.review-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.review-table{width:100%;border-collapse:collapse;background:var(--surface)}
.review-table th{background:var(--surface2);padding:9px 8px;font-size:12px;font-weight:700;color:var(--text-muted);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
.review-table td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.review-table tr:last-child td{border-bottom:none}
.rt-name{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:14px;font-family:inherit;color:var(--text);outline:none;min-width:80px}
.rt-name:focus{border-color:var(--accent)}
.rt-qty-wrap{display:flex;align-items:center;gap:3px}
.rt-qty-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.rt-qty{width:48px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 4px;font-size:14px;font-family:inherit;color:var(--text);outline:none;text-align:center}
.rt-qty:focus{border-color:var(--accent)}
.rt-sel{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 6px;font-size:13px;font-family:inherit;color:var(--text);outline:none;cursor:pointer;width:100%}
.rt-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rt-del:hover{border-color:var(--red);color:var(--red)}
.review-add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--text-muted);font-family:inherit;font-size:13px;cursor:pointer;margin-top:8px;transition:all .15s}
.review-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.review-actions{display:flex;gap:8px;margin-top:10px}
.btn-review-cancel{padding:13px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:inherit;font-size:14px;cursor:pointer}
.btn-review-confirm{flex:1;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.btn-review-confirm:disabled{opacity:.5}
.parsing-indicator{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;font-size:13px;color:var(--accent);font-weight:500;align-self:flex-start;max-width:60%}

/* Vita 연동 안내 */
.vita-notice{background:var(--accent-lt);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.vita-notice-icon{font-size:24px;flex-shrink:0}
.vita-notice-text{display:flex;flex-direction:column;gap:3px}
.vita-notice-text strong{font-size:14px;color:var(--accent)}
.vita-notice-text span{font-size:12px;color:var(--dim);line-height:1.5}

/* 재고 카드 수정 */
/* legacy inv-card-top/acts removed — replaced by inv-card-main/detail */
.inv-vendor-badge{font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;width:fit-content;margin-top:2px}
.inv-vendor-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.inv-vendor-group-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-bottom:1px solid var(--border)}
.inv-vendor-group-hdr span{font-size:14px;font-weight:700;color:var(--text)}
.inv-vendor-group-hdr select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;color:var(--text);background:var(--surface);outline:none}
.inv-vendor-group-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.inv-vendor-group-body .inv-card{border:1px solid var(--border)}
.inv-edit-form{display:none;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.inv-edit-form.open{display:flex}
.inv-edit-inp{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:100%}
.inv-edit-inp:focus{border-color:var(--accent)}
.inv-stepper{display:flex;align-items:center;gap:0}
.inv-stepper-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);font-size:18px;font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.inv-stepper-btn:first-child{border-radius:6px 0 0 6px}
.inv-stepper-btn:last-child{border-radius:0 6px 6px 0}
.inv-stepper-btn:active{background:var(--accent-lt);color:var(--accent)}
.inv-stepper .inv-edit-inp{border-radius:0;border-left:none;border-right:none;text-align:center;width:60px;flex:0 0 60px}
.inv-edit-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.inv-save-btn{flex:1;padding:8px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.inv-cancel-btn{padding:8px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer}

/* 발주 그룹 */
.ord-vendor-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:0}
.ord-vendor-hdr{background:var(--accent-lt);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ord-vendor-name{font-size:14px;font-weight:700;color:var(--accent)}
.ord-method-badge{font-size:12px;color:var(--dim);margin-left:6px}
.ord-method-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--text);outline:none;cursor:pointer}
.ord-item-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ord-item-name{font-size:14px;font-weight:600}
.ord-item-qty{font-size:13px;color:var(--dim)}
.ord-item-qty strong{color:var(--warn);font-weight:700}

/* pending 카드 */
.pending-card { border-left-color: var(--warn) !important; }
.pending-bar-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin: 8px 0 4px; overflow: hidden; }
.pending-bar { height: 100%; background: var(--warn); border-radius: 2px; width: 0%; transition: width 1s linear; }
.pending-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-pend-cancel { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; }
.btn-pend-edit   { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: inherit; font-size: 12px; cursor: pointer; }
.btn-pend-now    { padding: 6px 12px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
/* 발주 실행 버튼 */
.ord-action-row { padding: 10px 14px; border-top: 1px solid var(--border); }
.ord-action-btn { padding: 10px 20px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.ord-action-btn.sms   { background: #1a7a4a; color: #fff; }
.ord-action-btn.kakao { background: #fee500; color: #191919; }
.ord-action-btn.call  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.ord-item-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.ord-item-vendor { font-size:12px; color:var(--muted); }
.item-vendor-sel { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; font-family:inherit; color:var(--text); outline:none; cursor:pointer; }

/* 토스트 */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:500;color:var(--bg);transition:transform .25s ease,opacity .25s ease;opacity:0;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .6s linear infinite;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <span class="logo" id="logoBtn" style="cursor:pointer">ZeroKitchen</span>
  <span class="store-nm" id="storeNm">로딩 중...</span>
  <div class="navs">
    <button class="nav active" onclick="switchTab('input',this)">입력</button>
    <button class="nav" onclick="switchTab('inventory',this)">재고</button>
    <button class="nav" onclick="switchTab('order',this)">발주</button>
    <button class="nav" id="testTabBtn" onclick="switchTab('test',this)" style="display:none">테스트</button>
  </div>
</div>

<div class="tab-wrap">

<!-- 입력탭 (채팅 구조) -->
<div id="tab-input" class="tab active">
  <div class="chat-area" id="chatArea">
    <!-- 가이드 메시지 -->
    <div id="justTalk" class="chat-bubble system chat-guide">
      <div style="font-weight:700;margin-bottom:6px">재고 확인과 발주를 말로 빠르게 처리합니다</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">따라해 보세요</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <span class="just-talk-item" onclick="fillExample(this)">치즈 몇 봉 남았지?</span>
        <span class="just-talk-item" onclick="fillExample(this)">오늘 발주 뭐 해야 돼?</span>
        <span class="just-talk-item" onclick="fillExample(this)">토마토소스 3봉 추가</span>
      </div>
    </div>
    <div id="resList"></div>
  </div>
</div>

<!-- 재고탭 -->
<div id="tab-inventory" class="tab">
  <div id="invAlertBar" style="display:none;padding:10px 14px;background:rgba(192,84,10,.08);border:1px solid rgba(192,84,10,.2);border-radius:10px;cursor:pointer;margin-bottom:4px" onclick="document.getElementById('invFilter').value='low_stock';renderInventory()">
    <span style="font-size:13px;font-weight:600;color:var(--warn)" id="invAlertText"></span>
  </div>
  <div id="invDupBar" style="display:none" class="inv-dup-bar">
    <span id="invDupText"></span>
    <button onclick="_showDupCleanup()">정리하기</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input id="invSearch" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--text);outline:none" placeholder="품목명 검색..." oninput="renderInventory()">
    <select id="invFilter" onchange="renderInventory()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none">
      <option value="all">전체</option>
      <option value="low_stock">부족만</option>
    </select>
    <select id="invSort" onchange="renderInventory()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none">
      <option value="updated">업데이트순</option>
      <option value="name">이름순</option>
      <option value="qty_asc">수량 적은순</option>
      <option value="qty_desc">수량 많은순</option>
      <option value="vendor">거래처순</option>
    </select>
    <span id="invCount" style="font-size:12px;color:var(--muted);white-space:nowrap"></span>
  </div>
  <div class="inv-grid" id="invGrid"></div>
  <!-- 거래처 관리 -->
  <div class="card" style="margin-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="card-title" style="margin:0">거래처 관리</span>
      <button onclick="toggleVendorMgmt()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--dim);cursor:pointer" id="vendorMgmtToggle">펼치기</button>
    </div>
    <div id="vendorMgmtBody" style="display:none">
      <div id="vendorList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px"></div>
      <div style="display:flex;gap:8px">
        <input id="newVendorInp" class="nl-input" style="font-size:14px;padding:10px 12px" placeholder="새 거래처 이름">
        <button onclick="addVendor()" style="padding:10px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 발주탭 -->
<div id="tab-order" class="tab">
  <div id="orderList"><div class="no-item">로딩 중...</div></div>
</div>

<!-- 테스트 패널 -->
<div id="tab-test" class="tab">
  <div class="card">
    <div class="card-title">템플릿</div>
    <div class="tpl-btns">
      <button class="tpl" onclick="loadTpl('update')">재고 입력</button>
      <button class="tpl" onclick="loadTpl('read_all')">전체 조회</button>
      <button class="tpl" onclick="loadTpl('read_low')">부족 조회</button>
      <button class="tpl" onclick="loadTpl('order')">발주 계산</button>
      <button class="tpl" onclick="loadTpl('stock_config')">기준 설정</button>
      <button class="tpl" onclick="loadTpl('add_vendor')">거래처 연결</button>
      <button class="tpl" onclick="loadTpl('update_vendor')">거래처 변경</button>
      <button class="tpl" onclick="loadTpl('remove_vendor')">거래처 해제</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">JSON 직접 실행</div>
    <textarea class="json-inp" id="jsonInp" spellcheck="false"></textarea>
    <button class="btn-run" id="runBtn" onclick="runJson()">▶ 실행</button>
  </div>
  <div class="card">
    <div class="card-title">결과</div>
    <div class="json-result" id="jsonResult">결과가 여기에 표시됩니다.</div>
  </div>
</div>

</div><!-- /tab-wrap -->

<!-- 확인 카드 (입력창 바로 위, 고정) -->
<div id="reviewPanel" style="display:none">
  <div class="result-card-wrap" style="position:relative">
    <button class="card-close-x" onclick="cancelReview()">✕</button>
    <div class="result-card-title" id="resultCardTitle"></div>
    <div class="result-card-body" id="reviewBody"></div>
    <button class="result-add-btn" onclick="addReviewRow()">+ 품목 추가</button>
    <div class="result-card-btns">
      <button class="rc-btn-primary"   id="confirmReviewBtn" onclick="confirmReview()">확인 · 실행</button>
      <button class="rc-btn-secondary" onclick="editReview()">수정</button>
      <button class="rc-btn-cancel"    onclick="cancelReview()">취소</button>
    </div>
  </div>
</div>

<!-- 입력창 하단 고정 -->
<div class="global-input-zone">
  <div id="lastInputRow" style="display:none;padding:0 0 6px;overflow-x:auto">
    <span class="last-input-chip visible" id="lastInputChip" onclick="_fillLastInput()"></span>
